<!DOCTYPE html>
<html lang="tr" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Highly — Feed</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

[data-theme="dark"]{
  --bg:#06070f;--s1:#0b0d1c;--s2:#0f1125;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);
  --text:#e8e8ff;--muted:#4a4d6a;--text2:#9ca3c8;
  --nav:#06070f;--a1:#6366f1;--a2:#a78bfa;
}
[data-theme="glass"]{
  --bg:linear-gradient(135deg,#0a0f2e,#0d1635);
  --s1:rgba(255,255,255,0.06);--s2:rgba(255,255,255,0.1);
  --border:rgba(255,255,255,0.12);--border2:rgba(255,255,255,0.2);
  --text:#f0f4ff;--muted:rgba(255,255,255,0.45);--text2:rgba(255,255,255,0.7);
  --nav:rgba(10,15,46,0.8);--a1:#818cf8;--a2:#c4b5fd;
}
[data-theme="light"]{
  --bg:#f5f6fa;--s1:#ffffff;--s2:#f0f1f8;
  --border:rgba(0,0,0,0.08);--border2:rgba(0,0,0,0.14);
  --text:#1a1b2e;--muted:#9095b0;--text2:#6b6f8e;
  --nav:#ffffff;--a1:#6366f1;--a2:#4f46e5;
}

html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;overflow-x:hidden}

.nav{position:sticky;top:0;z-index:100;background:var(--nav);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 16px;height:54px;display:flex;align-items:center;gap:10px}
.nav-avatar{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--a1),var(--a2));display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:14px;color:#fff;text-decoration:none;flex-shrink:0}
.nav-title{font-family:'Syne',sans-serif;font-size:17px;font-weight:800;flex:1}
.nav-dash{width:32px;height:32px;background:var(--s2);border:1px solid var(--border);border-radius:9px;display:flex;align-items:center;justify-content:center;text-decoration:none;color:var(--muted);font-size:14px;transition:all .2s;flex-shrink:0}
.nav-dash:hover{color:var(--text);border-color:var(--border2)}

.page{max-width:640px;margin:0 auto;padding:16px}

/* COMPOSE */
.compose{background:var(--s1);border:1px solid var(--border);border-radius:16px;padding:16px;margin-bottom:16px;transition:border-color .2s}
.compose:focus-within{border-color:var(--a1)}
.compose-top{display:flex;gap:12px;align-items:flex-start}
.compose-av{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--a1),var(--a2));display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:14px;color:#fff;flex-shrink:0}
.compose-ta{flex:1;background:none;border:none;outline:none;color:var(--text);font-family:'DM Sans',sans-serif;font-size:15px;resize:none;min-height:56px;line-height:1.5}
.compose-ta::placeholder{color:var(--muted)}
.compose-bot{display:flex;align-items:center;justify-content:space-between;margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}
.char-c{font-size:12px;color:var(--muted);font-variant-numeric:tabular-nums}
.char-c.warn{color:#f59e0b}
.char-c.over{color:#ef4444}
.post-btn{background:linear-gradient(135deg,var(--a1),var(--a2));color:#fff;border:none;padding:8px 20px;border-radius:20px;font-family:'Syne',sans-serif;font-weight:700;font-size:13px;cursor:pointer;transition:opacity .2s,transform .15s}
.post-btn:hover{opacity:.9;transform:translateY(-1px)}
.post-btn:disabled{opacity:.35;cursor:not-allowed;transform:none}

/* TABS */
.tabs{display:flex;gap:4px;margin-bottom:14px;background:var(--s1);border:1px solid var(--border);border-radius:12px;padding:4px}
.tab{flex:1;background:none;border:none;color:var(--text2);font-family:'Syne',sans-serif;font-weight:700;font-size:12px;padding:8px;border-radius:9px;cursor:pointer;transition:all .2s}
.tab.active{background:var(--s2);color:var(--text)}

/* POST */
.post{background:var(--s1);border:1px solid var(--border);border-radius:16px;padding:14px;margin-bottom:10px;animation:fadeUp .25s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
.post-head{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.post-av{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--a1),var(--a2));display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:13px;color:#fff;flex-shrink:0}
.post-meta{flex:1}
.post-name{font-family:'Syne',sans-serif;font-weight:700;font-size:14px}
.post-time{font-size:11px;color:var(--muted);margin-top:1px}
.post-body{font-size:14px;line-height:1.6;margin-bottom:10px;word-break:break-word}
.post-actions{display:flex;gap:12px}
.act-btn{background:none;border:none;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:12px;cursor:pointer;display:flex;align-items:center;gap:5px;padding:4px 8px;border-radius:8px;transition:all .2s}
.act-btn:hover{background:var(--s2);color:var(--text2)}
.act-btn.liked{color:#f43f5e}
.act-btn.liked svg{fill:#f43f5e;stroke:#f43f5e}
.act-btn.del:hover{color:#ef4444;background:rgba(239,68,68,.08)}
.act-btn svg{width:14px;height:14px;fill:none;stroke:currentColor;stroke-width:2}

/* EMPTY / LOADING */
.empty{text-align:center;padding:60px 20px;color:var(--muted)}
.empty-ico{font-size:2rem;margin-bottom:10px;opacity:.5}
.spinner-wrap{display:flex;justify-content:center;padding:40px}
.spinner{width:26px;height:26px;border:2px solid var(--border);border-top-color:var(--a1);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* AUTH GATE */
.gate{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;text-align:center;gap:12px}
.gate h2{font-family:'Syne',sans-serif;font-size:1.4rem;font-weight:800}
.gate p{color:var(--muted);font-size:14px}
.gate a{margin-top:8px;background:linear-gradient(135deg,var(--a1),var(--a2));color:#fff;text-decoration:none;padding:10px 28px;border-radius:20px;font-family:'Syne',sans-serif;font-weight:700;font-size:14px}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--s2);border:1px solid var(--border);color:var(--text);padding:9px 18px;border-radius:20px;font-size:13px;transition:transform .3s;z-index:999;white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0)}

.load-more{width:100%;background:var(--s1);border:1px solid var(--border);color:var(--muted);padding:11px;border-radius:12px;font-family:'Syne',sans-serif;font-weight:700;font-size:13px;cursor:pointer;transition:all .2s;margin-top:6px}
.load-more:hover{border-color:var(--a1);color:var(--a1)}
</style>
</head>
<body>

<nav class="nav">
  <a class="nav-avatar" id="navAvatar" href="highly-profil.html">?</a>
  <span class="nav-title">💬 Feed</span>
  <a class="nav-dash" href="index.html" title="Dashboard">⊞</a>
</nav>

<div class="page">
  <div class="gate" id="gateEl" style="display:none">
    <div style="font-size:2rem">💬</div>
    <h2>Feed'e katıl</h2>
    <p>Gönderi görmek için giriş yapman gerekiyor.</p>
    <a href="highly-giris.html">Giriş Yap</a>
  </div>

  <div id="mainEl" style="display:none">
    <div class="compose" id="composeBox">
      <div class="compose-top">
        <div class="compose-av" id="composeAv">?</div>
        <textarea class="compose-ta" id="postTa" placeholder="Ne düşünüyorsun?" rows="3" maxlength="280"></textarea>
      </div>
      <div class="compose-bot">
        <span class="char-c" id="charC">280</span>
        <button class="post-btn" id="postBtn" disabled>Paylaş</button>
      </div>
    </div>

    <div class="tabs">
      <button class="tab active" id="tabAll" onclick="switchTab('all')">Herkesten</button>
      <button class="tab" id="tabFriends" onclick="switchTab('friends')">Arkadaşlar</button>
      <button class="tab" id="tabMine" onclick="switchTab('mine')">Benim</button>
    </div>

    <div id="feedEl"><div class="spinner-wrap"><div class="spinner"></div></div></div>
  </div>
</div>

<div class="toast" id="toastEl"></div>

<script>
// ── CONFIG ──────────────────────────────────────────────
var SB_URL = 'SUPABASE_URL_BURAYA';
var SB_KEY = 'SUPABASE_ANON_KEY_BURAYA';
var _sb = window.supabase.createClient(SB_URL, SB_KEY);

// ── STATE ────────────────────────────────────────────────
var _user = null;
var _tab = 'all';
var _friendIds = [];
var _liked = new Set();
var _page = 0;
var PAGE_SIZE = 20;

// ── THEME ────────────────────────────────────────────────
(function(){
  var t = localStorage.getItem('highly_theme') || 'dark';
  document.documentElement.setAttribute('data-theme', t);
})();

// ── UTILS ────────────────────────────────────────────────
function formatTR(d) {
  var date = new Date(d);
  var now = new Date();
  var diff = Math.floor((now - date) / 1000);
  if (diff < 60) return 'şimdi';
  if (diff < 3600) return Math.floor(diff/60) + ' dk önce';
  if (diff < 86400) return Math.floor(diff/3600) + ' sa önce';
  return date.toLocaleString('tr-TR', {timeZone:'Europe/Istanbul', day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit'});
}

function initial(email) { return (email || '?')[0].toUpperCase(); }

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

function toast(msg) {
  var el = document.getElementById('toastEl');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(function(){ el.classList.remove('show'); }, 2500);
}

// ── AUTH ─────────────────────────────────────────────────
async function init() {
  var res = await _sb.auth.getSession();
  _user = res.data.session ? res.data.session.user : null;

  if (!_user) {
    document.getElementById('gateEl').style.display = 'flex';
    return;
  }

  document.getElementById('mainEl').style.display = 'block';

  // Avatar
  var u = {};
  try { u = JSON.parse(localStorage.getItem('highly_user') || '{}'); } catch(e){}
  var av1 = document.getElementById('navAvatar');
  var av2 = document.getElementById('composeAv');
  if (u.avatarEmoji) {
    av1.textContent = u.avatarEmoji; av1.style.background = 'transparent'; av1.style.fontSize = '20px';
    av2.textContent = u.avatarEmoji; av2.style.background = 'transparent'; av2.style.fontSize = '20px';
  } else {
    var ini = u.name ? u.name[0].toUpperCase() : initial(_user.email);
    av1.textContent = ini; av2.textContent = ini;
  }

  await loadFriends();
  loadLiked();
  await loadFeed();
  setupCompose();
}

// ── FRIENDS ───────────────────────────────────────────────
async function loadFriends() {
  var res = await _sb.from('friends').select('friend_id,user_id')
    .or('user_id.eq.' + _user.id + ',friend_id.eq.' + _user.id)
    .eq('status', 'accepted');
  if (res.data) {
    _friendIds = res.data.map(function(f){ return f.user_id === _user.id ? f.friend_id : f.user_id; });
  }
}

// ── LIKES (localStorage) ──────────────────────────────────
function loadLiked() {
  try { _liked = new Set(JSON.parse(localStorage.getItem('highly_liked') || '[]')); } catch(e){}
}
function saveLiked() {
  localStorage.setItem('highly_liked', JSON.stringify(Array.from(_liked)));
}

// ── FEED ──────────────────────────────────────────────────
async function loadFeed(append) {
  if (!append) {
    _page = 0;
    document.getElementById('feedEl').innerHTML = '<div class="spinner-wrap"><div class="spinner"></div></div>';
  }

  var q = _sb.from('posts').select('id,user_id,content,likes_count,created_at')
    .order('created_at', {ascending: false})
    .range(_page * PAGE_SIZE, (_page + 1) * PAGE_SIZE - 1);

  if (_tab === 'friends') {
    var ids = _friendIds.concat([_user.id]);
    q = q.in('user_id', ids);
  } else if (_tab === 'mine') {
    q = q.eq('user_id', _user.id);
  }

  var res = await q;
  if (res.error) {
    document.getElementById('feedEl').innerHTML = '<div class="empty"><p>Yüklenemedi 😕</p></div>';
    return;
  }

  var data = res.data;

  // Profil bilgileri
  var uids = [];
  data.forEach(function(p){ if (uids.indexOf(p.user_id) === -1) uids.push(p.user_id); });
  var userMap = {};
  if (uids.length) {
    var pr = await _sb.from('profiles').select('id,email,username').in('id', uids);
    if (pr.data) pr.data.forEach(function(p){ userMap[p.id] = p; });
  }

  var container = document.getElementById('feedEl');
  if (!append) container.innerHTML = '';
  else { var lb = document.getElementById('lmBtn'); if (lb) lb.remove(); }

  if (!data.length && !append) {
    container.innerHTML = '<div class="empty"><div class="empty-ico">🌿</div><p>Henüz gönderi yok!</p></div>';
    return;
  }

  data.forEach(function(post) {
    var prof = userMap[post.user_id] || {};
    var name = prof.username || (prof.email ? prof.email.split('@')[0] : 'kullanıcı');
    var ini = initial(prof.email || name);
    var isOwn = post.user_id === _user.id;
    var isLiked = _liked.has(post.id);

    var div = document.createElement('div');
    div.className = 'post';
    div.id = 'post_' + post.id;
    div.innerHTML =
      '<div class="post-head">' +
        '<div class="post-av">' + ini + '</div>' +
        '<div class="post-meta">' +
          '<div class="post-name">@' + escHtml(name) + '</div>' +
          '<div class="post-time">' + formatTR(post.created_at) + '</div>' +
        '</div>' +
      '</div>' +
      '<div class="post-body">' + escHtml(post.content) + '</div>' +
      '<div class="post-actions">' +
        '<button class="act-btn' + (isLiked ? ' liked' : '') + '" onclick="toggleLike(\'' + post.id + '\',' + post.likes_count + ')">' +
          '<svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z" ' + (isLiked ? 'fill="#f43f5e" stroke="#f43f5e"' : '') + '/></svg>' +
          '<span id="lc_' + post.id + '">' + post.likes_count + '</span>' +
        '</button>' +
        (isOwn ? '<button class="act-btn del" onclick="delPost(\'' + post.id + '\')">' +
          '<svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>Sil' +
        '</button>' : '') +
      '</div>';
    container.appendChild(div);
  });

  if (data.length === PAGE_SIZE) {
    var btn = document.createElement('button');
    btn.className = 'load-more'; btn.id = 'lmBtn';
    btn.textContent = 'Daha fazla yükle';
    btn.onclick = function(){ _page++; loadFeed(true); };
    container.appendChild(btn);
  }
}

// ── TABS ──────────────────────────────────────────────────
function switchTab(t) {
  _tab = t;
  ['all','friends','mine'].forEach(function(x){
    var id = 'tab' + x.charAt(0).toUpperCase() + x.slice(1);
    document.getElementById(id).classList.toggle('active', x === t);
  });
  loadFeed();
}

// ── COMPOSE ───────────────────────────────────────────────
function setupCompose() {
  var ta = document.getElementById('postTa');
  var cc = document.getElementById('charC');
  var btn = document.getElementById('postBtn');

  ta.addEventListener('input', function() {
    var rem = 280 - ta.value.length;
    cc.textContent = rem;
    cc.className = 'char-c' + (rem < 20 ? ' warn' : '') + (rem < 0 ? ' over' : '');
    btn.disabled = ta.value.trim().length === 0 || rem < 0;
  });

  btn.addEventListener('click', submitPost);
}

async function submitPost() {
  var ta = document.getElementById('postTa');
  var content = ta.value.trim();
  if (!content || content.length > 280) return;
  var btn = document.getElementById('postBtn');
  btn.disabled = true; btn.textContent = '...';

  var res = await _sb.from('posts').insert({user_id: _user.id, content: content});
  btn.textContent = 'Paylaş';

  if (res.error) { toast('Gönderilemedi 😕'); btn.disabled = false; return; }

  ta.value = '';
  document.getElementById('charC').textContent = '280';
  document.getElementById('charC').className = 'char-c';
  toast('Paylaşıldı! 🎉');
  if (_tab !== 'friends') loadFeed(); else { _tab = 'all'; switchTab('all'); }
}

// ── LIKE ──────────────────────────────────────────────────
async function toggleLike(id, cur) {
  var isLiked = _liked.has(id);
  var newC = isLiked ? cur - 1 : cur + 1;
  var lcEl = document.getElementById('lc_' + id);
  var btn = lcEl ? lcEl.parentElement : null;
  if (lcEl) lcEl.textContent = newC;
  if (btn) {
    btn.classList.toggle('liked', !isLiked);
    var path = btn.querySelector('path');
    if (path) { path.setAttribute('fill', !isLiked ? '#f43f5e' : 'none'); path.setAttribute('stroke', !isLiked ? '#f43f5e' : 'currentColor'); }
  }
  if (isLiked) _liked.delete(id); else _liked.add(id);
  saveLiked();
  await _sb.from('posts').update({likes_count: Math.max(0, newC)}).eq('id', id);
}

// ── DELETE ────────────────────────────────────────────────
async function delPost(id) {
  if (!confirm('Bu gönderiyi silmek istediğine emin misin?')) return;
  var res = await _sb.from('posts').delete().eq('id', id).eq('user_id', _user.id);
  if (res.error) { toast('Silinemedi 😕'); return; }
  var el = document.getElementById('post_' + id);
  if (el) { el.style.opacity = '0'; el.style.transform = 'translateX(-8px)'; el.style.transition = 'all .2s'; setTimeout(function(){ el.remove(); }, 200); }
  toast('Silindi.');
}

init();
</script>
</body>
</html>
