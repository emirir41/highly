<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Highly AI</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#06070f;--s1:#0b0d1c;--s2:#0f1125;--border:rgba(255,255,255,0.07);--a1:#6366f1;--a2:#4f46e5;--text:#e8e8ff;--muted:#4a4d6a}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;background:radial-gradient(ellipse at 20% 20%,rgba(99,102,241,0.08) 0%,transparent 50%),radial-gradient(ellipse at 80% 80%,rgba(167,139,250,0.06) 0%,transparent 50%)}
nav{position:relative;z-index:20;display:flex;align-items:center;justify-content:space-between;padding:12px 24px;background:rgba(6,7,15,0.95);border-bottom:1px solid var(--border);backdrop-filter:blur(20px);flex-shrink:0}
.n-logo{display:flex;align-items:center;gap:9px;text-decoration:none;color:var(--text)}
.n-icon{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,var(--a1),var(--a2));display:flex;align-items:center;justify-content:center;font-size:16px}
.n-title{font-family:'Syne',sans-serif;font-weight:800;font-size:17px}
.n-right{display:flex;align-items:center;gap:10px}
.n-user{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:999px;padding:5px 12px 5px 6px;text-decoration:none;color:var(--text);font-size:13px}
.n-avatar{width:24px;height:24px;border-radius:50%;background:linear-gradient(135deg,var(--a1),var(--a2));display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:11px}
.n-back{color:var(--muted);text-decoration:none;font-size:13px;transition:color .2s}
.n-back:hover{color:var(--text)}
.n-clear{background:none;border:1px solid var(--border);border-radius:8px;color:var(--muted);font-size:12px;padding:5px 12px;cursor:pointer;transition:all .2s;font-family:'DM Sans',sans-serif}
.n-clear:hover{border-color:rgba(248,113,113,.4);color:#f87171}
.chat-wrap{flex:1;overflow-y:auto;padding:24px;display:flex;flex-direction:column;gap:16px;position:relative;z-index:2;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
.welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;text-align:center;padding:40px;gap:16px}
.welcome-icon{width:72px;height:72px;border-radius:20px;background:linear-gradient(135deg,var(--a1),var(--a2));display:flex;align-items:center;justify-content:center;font-size:36px;box-shadow:0 8px 32px rgba(99,102,241,.3)}
.welcome h2{font-family:'Syne',sans-serif;font-size:24px;font-weight:800}
.welcome p{color:var(--muted);font-size:14px;max-width:400px;line-height:1.7}
.suggestions{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:8px}
.sug-btn{padding:9px 16px;background:var(--s1);border:1px solid var(--border);border-radius:999px;color:var(--text);font-size:13px;cursor:pointer;transition:all .2s;font-family:'DM Sans',sans-serif}
.sug-btn:hover{background:rgba(99,102,241,.1);border-color:rgba(99,102,241,.3);color:#a78bfa}
.msg{display:flex;gap:12px;max-width:780px;animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.msg.user{flex-direction:row-reverse;margin-left:auto}
.msg-avatar{width:32px;height:32px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;font-family:'Syne',sans-serif}
.msg.user .msg-avatar{background:linear-gradient(135deg,var(--a1),var(--a2))}
.msg.ai .msg-avatar{background:linear-gradient(135deg,#1e1b4b,#312e81);border:1px solid rgba(99,102,241,.3);font-size:18px}
.msg-bubble{padding:14px 18px;border-radius:16px;font-size:14px;line-height:1.7;max-width:100%}
.msg.user .msg-bubble{background:linear-gradient(135deg,var(--a1),var(--a2));color:#fff;border-radius:16px 4px 16px 16px}
.msg.ai .msg-bubble{background:var(--s1);border:1px solid var(--border);border-radius:4px 16px 16px 16px}
.msg.ai .msg-bubble pre{background:rgba(0,0,0,.3);border-radius:8px;padding:12px;overflow-x:auto;margin:10px 0;font-size:13px}
.msg.ai .msg-bubble code{background:rgba(99,102,241,.15);padding:2px 6px;border-radius:4px;font-size:13px}
.typing{display:flex;align-items:center;gap:5px;padding:6px 0}
.typing span{width:7px;height:7px;border-radius:50%;background:var(--muted);animation:t .9s ease-in-out infinite}
.typing span:nth-child(2){animation-delay:.15s}
.typing span:nth-child(3){animation-delay:.3s}
@keyframes t{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-6px);opacity:1}}
.input-wrap{position:relative;z-index:10;padding:16px 24px;background:rgba(6,7,15,0.95);border-top:1px solid var(--border);flex-shrink:0}
.input-box{display:flex;align-items:flex-end;gap:10px;background:var(--s1);border:1px solid var(--border);border-radius:16px;padding:12px 14px;transition:border-color .2s}
.input-box:focus-within{border-color:rgba(99,102,241,.4)}
.msg-input{flex:1;background:none;border:none;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;line-height:1.6;outline:none;resize:none;max-height:120px;min-height:24px}
.msg-input::placeholder{color:var(--muted)}
.send-btn{width:38px;height:38px;border-radius:10px;border:none;background:linear-gradient(135deg,var(--a1),var(--a2));color:#fff;font-size:16px;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.send-btn:hover{opacity:.9;transform:scale(1.05)}
.send-btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
.input-hint{text-align:center;font-size:11px;color:var(--muted);margin-top:8px}
</style>
</head>
<body>
<nav>
  <a href="dashboard.html" class="n-logo">
    <div class="n-icon">🤖</div>
    <span class="n-title">Highly AI</span>
  </a>
  <div class="n-right">
    <div style="display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:8px;padding:5px 12px;font-size:12px;color:var(--muted)">🧠 <select id="modelSel" style="background:transparent;border:none;color:#e8e8ff;font-family:DM Sans,sans-serif;font-size:12px;outline:none;cursor:pointer"><option value="wiki">Gene 1.0</option><option value="gene2">Gene 2.0 ✨</option><option value="gene25">Gene 2.5 🧠</option></select></div><button class="n-clear" id="clearBtn">🗑 Temizle</button>
    <a href="dashboard.html" class="n-user">
      <div class="n-avatar" id="navAvatar">?</div>
      <span id="navName">...</span>
    </a>
    <a href="dashboard.html" class="n-back">← Dashboard</a>
  </div>
</nav>

<div class="chat-wrap" id="chatWrap">
  <div class="welcome" id="welcome">
    <div class="welcome-icon">🤖</div>
    <h2>Highly AI'ya hoş geldin!</h2>
    <p>Herhangi bir konuyu sor, Wikipedia'dan araştırayım!</p>
    <div style="display:flex;align-items:center;gap:8px;background:rgba(99,102,241,.08);border:1px solid rgba(99,102,241,.2);border-radius:999px;padding:7px 16px;font-size:12px;color:#a78bfa;margin-top:4px">
      🧠 <strong id="modelBadge">Gene 1.0</strong> · <span id="modelDesc">Wikipedia destekli</span>
    </div>
  </div>
</div>

<div class="input-wrap">
  <div class="input-box">
    <textarea class="msg-input" id="msgInput" placeholder="Bir şey sor... (Enter ile gönder)" rows="1"></textarea>
    <button class="send-btn" id="sendBtn">↑</button>
  </div>
  <div class="input-hint">Highly AI hata yapabilir. Sonuçları kontrol edin.</div>
</div>

<script>
const saved = localStorage.getItem('highly_user');
if (!saved) location.href = 'highly-id.html';
const user = JSON.parse(saved || '{"name":"?"}');
document.getElementById('navAvatar').textContent = user.avatarEmoji || user.name[0].toUpperCase();
document.getElementById('navName').textContent   = user.name.split(' ')[0];

const chatWrap = document.getElementById('chatWrap');
const msgInput = document.getElementById('msgInput');
const sendBtn  = document.getElementById('sendBtn');
const welcome  = document.getElementById('welcome');
let history = [];

// Son context - bağlam hafızası
let lastContext = { type: null, data: null };

msgInput.addEventListener('input', () => {
  msgInput.style.height = 'auto';
  msgInput.style.height = Math.min(msgInput.scrollHeight, 120) + 'px';
});
msgInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
});
sendBtn.addEventListener('click', send);
document.getElementById('clearBtn').addEventListener('click', () => {
  history = []; lastContext = { type: null, data: null };
  chatWrap.innerHTML = ''; chatWrap.appendChild(welcome); welcome.style.display = 'flex';
});
document.getElementById('modelSel').addEventListener('change', function() {
  const g = this.value;
  const b = document.getElementById('modelBadge');
  const d = document.getElementById('modelDesc');
  const labels = { wiki:'Gene 1.0', gene2:'Gene 2.0 ✨', gene25:'Gene 2.5 🧠' };
  const descs  = { wiki:'Wikipedia destekli', gene2:'Matematik · Hava · Döviz · Sohbet', gene25:'Akıllı bağlam · Hafıza · Cümle analizi' };
  if (b) b.textContent = labels[g] || g;
  if (d) d.textContent = descs[g]  || '';
  history = []; lastContext = { type: null, data: null };
  chatWrap.innerHTML = ''; chatWrap.appendChild(welcome); welcome.style.display = 'flex';
});

// UI
function rmTyping() { const t = document.getElementById('typing'); if (t) t.remove(); }
function addTyping() {
  welcome.style.display = 'none'; rmTyping();
  const d = document.createElement('div');
  d.className = 'msg ai'; d.id = 'typing';
  d.innerHTML = '<div class="msg-avatar">🤖</div><div class="msg-bubble"><div class="typing"><span></span><span></span><span></span></div></div>';
  chatWrap.appendChild(d); chatWrap.scrollTop = chatWrap.scrollHeight;
}
function addMsg(role, text) {
  welcome.style.display = 'none';
  const d = document.createElement('div');
  d.className = 'msg ' + role;
  d.innerHTML = '<div class="msg-avatar">' + (role === 'user' ? (user.avatarEmoji || user.name[0].toUpperCase()) : '🤖') + '</div>'
    + '<div class="msg-bubble">' + (role === 'ai' ? fmt(text) : esc(text)) + '</div>';
  chatWrap.appendChild(d); chatWrap.scrollTop = chatWrap.scrollHeight;
}
function fmt(t) {
  return esc(t)
    .replace(/```[\w]*\n?([\s\S]*?)```/g, '<pre><code>$1</code></pre>')
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
    .replace(/\*([^*]+)\*/g, '<em>$1</em>')
    .replace(/\n/g, '<br>');
}
function esc(t) { return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function pick(arr) { return arr[Math.floor(Math.random()*arr.length)]; }

// ============================================================
// ORTAK MODÜLLER
// ============================================================

// 1. MATEMATİK
function solveMath(raw) {
  try {
    let e = raw.trim()
      .replace(/,/g, '.')
      .replace(/[x×]/g, '*').replace(/÷/g, '/')
      .replace(/karekök\s*([\d.]+(?:\([^)]+\))?)/gi, 'Math.sqrt($1)')
      .replace(/sqrt\s*([\d.]+)/gi, 'Math.sqrt($1)')
      .replace(/([\d.]+)\s*\^\s*([\d.]+)/g, 'Math.pow($1,$2)')
      .replace(/pi/gi, 'Math.PI')
      .replace(/(\d+)!/g, function(_, n) {
        const num = parseInt(n); if (num > 20) return '2432902008176640000';
        let f = 1; for (let i = 2; i <= num; i++) f *= i; return f;
      })
      .replace(/[^0-9+\-*\/.()'%MathsqrpowPIE\s]/g, '').trim();
    if (!e) return null;
    const r = Function('"use strict"; return (' + e + ')')();
    if (typeof r !== 'number' || isNaN(r) || !isFinite(r)) return null;
    if (Number.isInteger(r)) return r.toLocaleString('tr-TR');
    return parseFloat(r.toFixed(10)).toString().replace('.', ',');
  } catch { return null; }
}

// 2. TARİH/SAAT
function tarihCevap() {
  const n = new Date();
  const D = ['Pazar','Pazartesi','Salı','Çarşamba','Perşembe','Cuma','Cumartesi'];
  const M = ['Ocak','Şubat','Mart','Nisan','Mayıs','Haziran','Temmuz','Ağustos','Eylül','Ekim','Kasım','Aralık'];
  const hh = String(n.getHours()).padStart(2,'0');
  const mm = String(n.getMinutes()).padStart(2,'0');
  const ss = String(n.getSeconds()).padStart(2,'0');
  return '🕐 Şu an **' + hh + ':' + mm + ':' + ss + '**\n📅 **' + D[n.getDay()] + ', ' + n.getDate() + ' ' + M[n.getMonth()] + ' ' + n.getFullYear() + '**';
}

// 3. HAVA
async function havaCevap(sehir) {
  const ICONS = {'01d':'☀️','01n':'🌙','02d':'⛅','02n':'⛅','03d':'☁️','03n':'☁️','04d':'☁️','04n':'☁️','09d':'🌧','09n':'🌧','10d':'🌦','10n':'🌦','11d':'⛈','11n':'⛈','13d':'❄️','13n':'❄️','50d':'🌫','50n':'🌫'};
  let url;
  if (sehir) {
    url = 'https://api.openweathermap.org/data/2.5/weather?q=' + encodeURIComponent(sehir) + '&appid=bd5e378503939ddaee76f12ad7a97608&units=metric&lang=tr';
  } else {
    const gd = await (await fetch('https://ipapi.co/json/')).json();
    url = 'https://api.openweathermap.org/data/2.5/weather?lat=' + gd.latitude + '&lon=' + gd.longitude + '&appid=bd5e378503939ddaee76f12ad7a97608&units=metric&lang=tr';
  }
  const d = await (await fetch(url)).json();
  if (d.cod === '404') return '❌ "' + sehir + '" bulunamadı.';
  const icon = ICONS[d.weather[0].icon] || '🌤';
  lastContext = { type: 'hava', data: sehir || d.name };
  return icon + ' **' + d.name + ' — ' + Math.round(d.main.temp) + '°C**\n\n'
    + '🌡 Hissedilen: ' + Math.round(d.main.feels_like) + '°C\n'
    + '☁️ ' + d.weather[0].description + '\n'
    + '💧 Nem: %' + d.main.humidity + '\n'
    + '💨 Rüzgar: ' + Math.round(d.wind.speed*3.6) + ' km/s\n'
    + '🌡 Min/Max: ' + Math.round(d.main.temp_min) + '°C / ' + Math.round(d.main.temp_max) + '°C';
}

// 4. DÖVİZ
async function dovizCevap(birim) {
  const data = await (await fetch('https://api.frankfurter.app/latest?from=USD&to=TRY,EUR,GBP,CHF,JPY')).json();
  const TRY = data.rates.TRY;
  const R = { USD:TRY, EUR:TRY/data.rates.EUR, GBP:TRY/data.rates.GBP, CHF:TRY/data.rates.CHF, JPY:TRY/data.rates.JPY };
  const saat = new Date().toLocaleTimeString('tr-TR',{hour:'2-digit',minute:'2-digit'});
  let ana = '';
  if (!birim || /dolar|usd/i.test(birim)) ana = '💵 **1 Dolar = ' + R.USD.toFixed(2) + ' TL**';
  else if (/euro|eur/i.test(birim))       ana = '💶 **1 Euro = ' + R.EUR.toFixed(2) + ' TL**';
  else if (/sterlin|gbp|pound/i.test(birim)) ana = '💷 **1 Sterlin = ' + R.GBP.toFixed(2) + ' TL**';
  else if (/frank|chf/i.test(birim))      ana = '🇨🇭 **1 Frank = ' + R.CHF.toFixed(2) + ' TL**';
  else if (/yen|jpy/i.test(birim))        ana = '🇯🇵 **100 Yen = ' + (R.JPY*100).toFixed(2) + ' TL**';
  else ana = '💵 **1 Dolar = ' + R.USD.toFixed(2) + ' TL**';
  lastContext = { type: 'doviz', data: birim };
  return ana + '\n\n💵 Dolar: ' + R.USD.toFixed(2) + ' TL\n💶 Euro: ' + R.EUR.toFixed(2) + ' TL\n💷 Sterlin: ' + R.GBP.toFixed(2) + ' TL\n🕐 _' + saat + ' — frankfurter.app_';
}

// 5. WİKİPEDİA
async function searchWiki(q) {
  try {
    const trS = await (await fetch('https://tr.wikipedia.org/w/api.php?action=query&list=search&srsearch=' + encodeURIComponent(q) + '&format=json&origin=*&srlimit=1')).json();
    const trR = trS.query && trS.query.search;
    let lang = 'tr', title;
    if (trR && trR.length) { title = trR[0].title; }
    else {
      const enS = await (await fetch('https://en.wikipedia.org/w/api.php?action=query&list=search&srsearch=' + encodeURIComponent(q) + '&format=json&origin=*&srlimit=1')).json();
      const enR = enS.query && enS.query.search;
      if (!enR || !enR.length) return null;
      title = enR[0].title; lang = 'en';
    }
    const base = lang === 'tr' ? 'https://tr.wikipedia.org' : 'https://en.wikipedia.org';
    const ext = await (await fetch(base + '/w/api.php?action=query&titles=' + encodeURIComponent(title) + '&prop=extracts&exintro=true&explaintext=true&format=json&origin=*')).json();
    const page = Object.values(ext.query.pages)[0];
    if (!page || !page.extract) return null;
    lastContext = { type: 'wiki', data: title };
    return { title, text: page.extract.slice(0, 700).trim(), url: base + '/wiki/' + encodeURIComponent(title) };
  } catch { return null; }
}

// ============================================================
// GENE 1.0 & 2.0 (önceki basit sistem)
// ============================================================
const SOHBET = {
  selam:    ['Selam! 👋', 'Merhaba! 😊', 'Hey! 👋 Nasıl yardımcı olabilirim?'],
  nasilsin: ['İyiyim, teşekkürler! Sen nasılsın? 😊', 'Gayet iyiyim! 🚀', 'İyi sayılırım, sen?'],
  tesekkur: ['Rica ederim! 😊', 'Ne demek! 🙌', 'Her zaman! 😄'],
  gunaydın: ['Günaydın! ☀️', 'Günaydın! Güzel bir gün olsun ☀️'],
  geceler:  ['İyi geceler! 🌙', 'İyi geceler, yarın görüşürüz 🌙'],
  default:  ['Anlıyorum 😊', 'Tamam! Başka bir şey var mı?', 'Sana nasıl yardımcı olabilirim?']
};
function basicSohbet(t) {
  const tl = t.toLowerCase();
  if (/selam|merhaba|hey|^hi|^hello/.test(tl)) return pick(SOHBET.selam);
  if (/nasılsın|naber/.test(tl))               return pick(SOHBET.nasilsin);
  if (/teşekkür|sağol|eyvallah/.test(tl))      return pick(SOHBET.tesekkur);
  if (/günaydın/.test(tl))                     return pick(SOHBET.gunaydın);
  if (/gece/.test(tl))                         return pick(SOHBET.geceler);
  return pick(SOHBET.default);
}
function isSohbetBasic(t) {
  return /^(selam|merhaba|hey|hi|hello|nasılsın|naber|teşekkür|sağol|günaydın|iyi gece|evet|hayır|tamam|haha)/i.test(t.trim());
}
function isMathBasic(t) {
  return /^[\d\s+\-*/().%,^x×÷]+$/.test(t.trim()) && /\d/.test(t) && /[+\-*/x×÷^]/.test(t);
}

// ============================================================
// GENE 2.5 — AKILLI BAĞLAM ANALİZİ
// ============================================================
const INTENT_PATTERNS = {
  // Sohbet
  selam:    [/^(selam|merhaba|hey|hi|hello|yo)/i],
  nasilsin: [/nasıl(sın|sınız)?|naber|ne haber|ne var ne yok/i],
  tesekkur: [/teşekkür|sağol|eyvallah|thanks|ty/i],
  gunaydın: [/günaydın|good morning/i],
  geceler:  [/(iyi )?geceler?|good night/i],
  iyi:      [/^(iyi|süper|harika|muhteşem|güzel|bravo|aferin)/i],
  kim:      [/sen kimsin|adın ne|ne iş yapıyorsun|neler yapabilirsin|ne yapabilirsin|highly ai|gene/i],
  nasıl:    [/nasıl (kullan|çalış|yapılır)/i],

  // Fonksiyonel
  tarih:    [/saat kaç|bugün (ne|hangi)|hangi gün|tarih ne|ay kaç|yıl kaç|gün kaç/i],
  matematik:[/^\s*[\d(].*[+\-*/^%].*[\d)]\s*$/, /karekök|sqrt|faktöriyel|\d+!/i, /(\d+)\s*(çarpı|bölü|artı|eksi|kere)\s*(\d+)/i],
  hava:     [/hava|derece|sıcaklık|yağmur|kar yağ|fırtına|nem oranı|iklim/i],
  doviz:    [/dolar|euro|sterlin|pound|frank|yen|döviz|kur|kaç tl|tl kaç|usd|eur|gbp|chf/i],
  arama:    [/nedir|kimdir|ne zaman|nerede|nasıl|kaç yıl|tarih(i|te|te)?|hakkında|anlat|açıkla/i],

  // Bağlam devamı
  devam_hava:  [/^(peki|ya|bide|bir de|şimdi)?\s*([\w\sğüşöçıİĞÜŞÖÇ]+?)(\s*ya da\s*[\w]+)?\s*(\?|$)/i],
  devam_doviz: [/^(peki|ya|bide)?\s*(euro|dolar|sterlin|pound|frank|yen)\s*(\?|$)/i],
};

function detectIntent(text, ctx) {
  const t = text.trim();
  const tl = t.toLowerCase();

  // Önce bağlam kontrolü — "peki londra?" gibi kısa devam sorular
  if (ctx.type === 'hava' && t.length < 30 && !/\d{3,}/.test(t)) {
    // Eğer sadece şehir adı gibi görünüyorsa
    if (/^(peki|ya|ee|bide)?\s*[A-Za-züçğışöÜÇĞİŞÖ]{2,20}\s*(\?)?$/.test(t)) {
      const sehir = t.replace(/^(peki|ya|ee|bide|bir de)\s*/i,'').replace('?','').trim();
      if (sehir.length > 1) return { intent:'hava', sehir };
    }
  }
  if (ctx.type === 'doviz' && /^(peki|ya)?\s*(euro|dolar|sterlin|pound|frank|yen)\s*\??$/i.test(t)) {
    return { intent:'doviz', birim: t };
  }

  // Sohbet
  if (/^(selam|merhaba|hey|^hi|hello)/i.test(tl)) return { intent:'selam' };
  if (/nasıl(sın)?|naber/.test(tl))               return { intent:'nasilsin' };
  if (/teşekkür|sağol|eyvallah/.test(tl))         return { intent:'tesekkur' };
  if (/günaydın/.test(tl))                        return { intent:'gunaydın' };
  if (/gece/.test(tl))                            return { intent:'geceler' };
  if (/^(iyi|süper|harika|bravo|aferin|tamam|ok|evet|hayır|haha|😂|👍)/i.test(tl)) return { intent:'genel_sohbet' };
  if (/sen kimsin|adın ne|neler yapabilirsin|ne yapabilirsin/i.test(tl)) return { intent:'kim' };

  // Tarih/Saat
  if (/saat kaç|bugün ne|hangi gün|tarih ne|ay kaç|gün kaç/i.test(tl)) return { intent:'tarih' };

  // Matematik — parantezli işlemler dahil
  const mathClean = t.replace(/çarpı/gi,'*').replace(/bölü/gi,'/').replace(/artı/gi,'+').replace(/eksi/gi,'-').replace(/kere/gi,'*').replace(/[x×]/g,'*').replace(/÷/g,'/').replace(/,/g,'.');
  if (/^[\d\s+\-*\/().%^MathsqrtpowPI]+$/.test(mathClean) && /\d/.test(mathClean) && /[+\-*\/^]/.test(mathClean)) return { intent:'matematik', expr: mathClean };
  if (/karekök|sqrt/.test(tl)) return { intent:'matematik', expr: t };
  if (/\d+\s*!/.test(t))       return { intent:'matematik', expr: t };

  // Hava — şehir çıkar
  if (/hava|derece|sıcaklık|yağmur|kar yağ|fırtına/i.test(tl)) {
    const sehirMatch = t.match(/([A-Za-züçğışöÜÇĞİŞÖ][a-züçğışöA-ZÜÇĞİŞÖ ]{1,20}?)\s*(?:kaç derece|hava|'de|'da|'te|'ta)/i)
      || t.match(/([A-Za-züçğışöÜÇĞİŞÖ][a-züçğışöA-ZÜÇĞİŞÖ ]{1,20}?)\s*hava\s*(nasıl|durumu)/i);
    const sehir = sehirMatch ? sehirMatch[1].trim().replace(/^(bugün|şu an|peki|ya)\s*/i,'') : null;
    return { intent:'hava', sehir: (sehir && sehir.length > 1 && !/^(hava|bugün|dışarıda)$/i.test(sehir)) ? sehir : null };
  }

  // Döviz
  if (/dolar|euro|sterlin|pound|frank|yen|döviz|kur|kaç tl|usd|eur|gbp/i.test(tl)) {
    let birim = 'usd';
    if (/euro|eur/.test(tl)) birim = 'eur';
    else if (/sterlin|gbp|pound/.test(tl)) birim = 'gbp';
    else if (/frank|chf/.test(tl)) birim = 'chf';
    else if (/yen|jpy/.test(tl)) birim = 'jpy';
    return { intent:'doviz', birim };
  }

  // Araştırma / bilgi sorusu
  if (/nedir|kimdir|ne zaman|nerede|nasıl|hakkında|anlat|açıkla|tarih|kaç yıl/i.test(tl)) {
    return { intent:'arama', query: t };
  }

  // Varsayılan: araştır
  return { intent:'arama', query: t };
}

const SOHBET25 = {
  selam:       () => pick(['Selam! 👋 Nasıl yardımcı olabilirim?', 'Merhaba ' + user.name.split(' ')[0] + '! 😊', 'Hey! Ne öğrenmek istiyorsun? 👋', 'Selam! Bugün nasıl gidiyor? 😊']),
  nasilsin:    () => pick(['İyiyim, teşekkürler! Sen nasılsın? 😊', 'Gayet iyiyim! Sana yardımcı olmaya hazırım 🚀', 'İyi sayılırım! Bugün sana nasıl yardımcı olabilirim?']),
  tesekkur:    () => pick(['Rica ederim! 😊', 'Ne demek, her zaman! 🙌', 'Tabii tabii! 😄', 'Her zaman buradayım 🙏']),
  gunaydın:    () => pick(['Günaydın! ☀️ Güzel bir gün olsun!', 'Günaydın ' + user.name.split(' ')[0] + '! ☀️ Bugün sana nasıl yardımcı olabilirim?']),
  geceler:     () => pick(['İyi geceler! 🌙', 'İyi geceler, yarın görüşürüz! 🌙', 'Umarım güzel uyursun! 🌙']),
  genel_sohbet:() => pick(['Anlıyorum! 😊', 'Tamam! Başka bir şey var mı?', 'Harika! 🎉', '😊', 'Tabii tabii!']),
  kim:         () => 'Ben **Highly AI** — Gene 2.5 ile çalışıyorum! 🤖

Sana şunlarda yardımcı olabilirim:

🧮 **Matematik** — (15+3) * (200/4) gibi karmaşık işlemler
🌤 **Hava** — "New York kaç derece?", ardından "peki Londra?" diyebilirsin
💵 **Döviz** — Canlı kurlar, "dolar kaç?" sonra "peki euro?"
📅 **Tarih/Saat** — Anlık bilgi
📖 **Araştırma** — Herhangi bir konu hakkında Wikipedia'dan bilgi
💬 **Sohbet** — Seninle dertleşebilirim de 😊',
};

async function gene25(text) {
  const intent = detectIntent(text, lastContext);

  switch(intent.intent) {
    case 'selam':        return SOHBET25.selam();
    case 'nasilsin':     return SOHBET25.nasilsin();
    case 'tesekkur':     return SOHBET25.tesekkur();
    case 'gunaydın':     return SOHBET25.gunaydın();
    case 'geceler':      return SOHBET25.geceler();
    case 'genel_sohbet': return SOHBET25.genel_sohbet();
    case 'kim':          return SOHBET25.kim();
    case 'tarih':        return tarihCevap();

    case 'matematik': {
      const r = solveMath(intent.expr || text);
      if (r !== null) return '🧮 **' + (intent.expr || text).trim() + ' = ' + r + '**';
      return '🧮 Bu işlemi çözemedim. Şöyle deneyebilirsin: **15 * (200 + 50)**';
    }

    case 'hava': {
      try { return await havaCevap(intent.sehir); }
      catch { return '❌ Hava bilgisi alınamadı.'; }
    }

    case 'doviz': {
      try { return await dovizCevap(intent.birim); }
      catch { return '❌ Döviz bilgisi alınamadı.'; }
    }

    case 'arama':
    default: {
      const w = await searchWiki(intent.query || text);
      if (w) return '📖 **' + w.title + '**

' + w.text + '

🔗 [Wikipedia'da oku](' + w.url + ')';
      // Wiki bulunamazsa genel yardım
      return '🤔 "' + text + '" hakkında bilgi bulunamadı.

Şunları sorabilirsin:
🧮 **Matematik:** (150 + 50) * 3
🌤 **Hava:** "İstanbul hava nasıl?"
💵 **Döviz:** "Dolar kaç TL?"
📖 **Bilgi:** "Atatürk kimdir?"';
    }
  }
}

// ============================================================
// GENE 1.0 / 2.0 MODÜLLER (basit)
// ============================================================
function basicMath(t) {
  const r = solveMath(t);
  if (r !== null) return '🧮 **' + t.trim() + ' = ' + r + '**';
  return null;
}
async function basicWiki(t) {
  const w = await searchWiki(t);
  return w ? '📖 **' + w.title + '**

' + w.text + '

🔗 [Wikipedia'da oku](' + w.url + ')'
           : '❌ "' + t + '" hakkında bilgi bulunamadı.';
}

// ============================================================
// ANA SEND
// ============================================================
async function send() {
  const text = msgInput.value.trim();
  if (!text) return;
  msgInput.value = ''; msgInput.style.height = 'auto';
  sendBtn.disabled = true;
  addMsg('user', text);
  addTyping();
  const model = document.getElementById('modelSel').value;

  try {
    await new Promise(r => setTimeout(r, 350));
    rmTyping();
    let reply = null;

    if (model === 'wiki') {
      // GENE 1.0
      if (isSohbetBasic(text)) { reply = basicSohbet(text); }
      else { addTyping(); reply = await basicWiki(text); rmTyping(); }
    }
    else if (model === 'gene2') {
      // GENE 2.0
      if (isSohbetBasic(text)) { reply = basicSohbet(text); }
      else if (isMathBasic(text)) { reply = basicMath(text) || await basicWiki(text); }
      else if (/hava|derece/i.test(text)) { addTyping(); reply = await havaCevap(null); rmTyping(); }
      else if (/dolar|euro|sterlin|döviz/i.test(text)) { addTyping(); reply = await dovizCevap('usd'); rmTyping(); }
      else if (/saat kaç|bugün ne/i.test(text)) { reply = tarihCevap(); }
      else { addTyping(); reply = await basicWiki(text); rmTyping(); }
    }
    else {
      // GENE 2.5
      const needsApi = /hava|derece|dolar|euro|sterlin|döviz/i.test(text);
      if (needsApi) addTyping();
      reply = await gene25(text);
      if (needsApi) rmTyping();
    }

    addMsg('ai', reply || '🤔 Bir şeyler ters gitti, tekrar dene.');
  } catch(e) {
    rmTyping();
    addMsg('ai', '❌ Hata: ' + e.message);
  } finally {
    sendBtn.disabled = false;
    msgInput.focus();
  }
}

msgInput.focus();
