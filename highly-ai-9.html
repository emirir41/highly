<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Highly AI</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#06070f;--s1:#0b0d1c;--s2:#0f1125;--border:rgba(255,255,255,0.07);--a1:#6366f1;--a2:#4f46e5;--text:#e8e8ff;--muted:#4a4d6a}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;background:radial-gradient(ellipse at 20% 20%,rgba(99,102,241,0.08) 0%,transparent 50%),radial-gradient(ellipse at 80% 80%,rgba(167,139,250,0.06) 0%,transparent 50%)}
nav{position:relative;z-index:20;display:flex;align-items:center;justify-content:space-between;padding:12px 24px;background:rgba(6,7,15,0.95);border-bottom:1px solid var(--border);backdrop-filter:blur(20px);flex-shrink:0}
.n-logo{display:flex;align-items:center;gap:9px;text-decoration:none;color:var(--text)}
.n-icon{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,var(--a1),var(--a2));display:flex;align-items:center;justify-content:center;font-size:16px}
.n-title{font-family:'Syne',sans-serif;font-weight:800;font-size:17px}
.n-right{display:flex;align-items:center;gap:10px}
.n-user{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:999px;padding:5px 12px 5px 6px;text-decoration:none;color:var(--text);font-size:13px}
.n-avatar{width:24px;height:24px;border-radius:50%;background:linear-gradient(135deg,var(--a1),var(--a2));display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:11px}
.n-back{color:var(--muted);text-decoration:none;font-size:13px;transition:color .2s}
.n-back:hover{color:var(--text)}
.n-clear{background:none;border:1px solid var(--border);border-radius:8px;color:var(--muted);font-size:12px;padding:5px 12px;cursor:pointer;transition:all .2s;font-family:'DM Sans',sans-serif}
.n-clear:hover{border-color:rgba(248,113,113,.4);color:#f87171}
.chat-wrap{flex:1;overflow-y:auto;padding:24px;display:flex;flex-direction:column;gap:16px;position:relative;z-index:2;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
.welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;text-align:center;padding:40px;gap:16px}
.welcome-icon{width:72px;height:72px;border-radius:20px;background:linear-gradient(135deg,var(--a1),var(--a2));display:flex;align-items:center;justify-content:center;font-size:36px;box-shadow:0 8px 32px rgba(99,102,241,.3)}
.welcome h2{font-family:'Syne',sans-serif;font-size:24px;font-weight:800}
.welcome p{color:var(--muted);font-size:14px;max-width:400px;line-height:1.7}
.suggestions{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:8px}
.sug-btn{padding:9px 16px;background:var(--s1);border:1px solid var(--border);border-radius:999px;color:var(--text);font-size:13px;cursor:pointer;transition:all .2s;font-family:'DM Sans',sans-serif}
.sug-btn:hover{background:rgba(99,102,241,.1);border-color:rgba(99,102,241,.3);color:#a78bfa}
.msg{display:flex;gap:12px;max-width:780px;animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.msg.user{flex-direction:row-reverse;margin-left:auto}
.msg-avatar{width:32px;height:32px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;font-family:'Syne',sans-serif}
.msg.user .msg-avatar{background:linear-gradient(135deg,var(--a1),var(--a2))}
.msg.ai .msg-avatar{background:linear-gradient(135deg,#1e1b4b,#312e81);border:1px solid rgba(99,102,241,.3);font-size:18px}
.msg-bubble{padding:14px 18px;border-radius:16px;font-size:14px;line-height:1.7;max-width:100%}
.msg.user .msg-bubble{background:linear-gradient(135deg,var(--a1),var(--a2));color:#fff;border-radius:16px 4px 16px 16px}
.msg.ai .msg-bubble{background:var(--s1);border:1px solid var(--border);border-radius:4px 16px 16px 16px}
.msg.ai .msg-bubble pre{background:rgba(0,0,0,.3);border-radius:8px;padding:12px;overflow-x:auto;margin:10px 0;font-size:13px}
.msg.ai .msg-bubble code{background:rgba(99,102,241,.15);padding:2px 6px;border-radius:4px;font-size:13px}
.typing{display:flex;align-items:center;gap:5px;padding:6px 0}
.typing span{width:7px;height:7px;border-radius:50%;background:var(--muted);animation:t .9s ease-in-out infinite}
.typing span:nth-child(2){animation-delay:.15s}
.typing span:nth-child(3){animation-delay:.3s}
@keyframes t{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-6px);opacity:1}}
.input-wrap{position:relative;z-index:10;padding:16px 24px;background:rgba(6,7,15,0.95);border-top:1px solid var(--border);flex-shrink:0}
.input-box{display:flex;align-items:flex-end;gap:10px;background:var(--s1);border:1px solid var(--border);border-radius:16px;padding:12px 14px;transition:border-color .2s}
.input-box:focus-within{border-color:rgba(99,102,241,.4)}
.msg-input{flex:1;background:none;border:none;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;line-height:1.6;outline:none;resize:none;max-height:120px;min-height:24px}
.msg-input::placeholder{color:var(--muted)}
.send-btn{width:38px;height:38px;border-radius:10px;border:none;background:linear-gradient(135deg,var(--a1),var(--a2));color:#fff;font-size:16px;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.send-btn:hover{opacity:.9;transform:scale(1.05)}
.send-btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
.input-hint{text-align:center;font-size:11px;color:var(--muted);margin-top:8px}
</style>
</head>
<body>
<nav>
  <a href="dashboard.html" class="n-logo">
    <div class="n-icon">🤖</div>
    <span class="n-title">Highly AI</span>
  </a>
  <div class="n-right">
    <div style="display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:8px;padding:5px 12px;font-size:12px;color:var(--muted)">🧠 <select id="modelSel" style="background:transparent;border:none;color:#e8e8ff;font-family:DM Sans,sans-serif;font-size:12px;outline:none;cursor:pointer"><option value="wiki">Gene 1.0</option><option value="gene2">Gene 2.0 ✨</option><option value="gene25">Gene 2.5 🧠</option></select></div><button class="n-clear" id="clearBtn">🗑 Temizle</button>
    <a href="dashboard.html" class="n-user">
      <div class="n-avatar" id="navAvatar">?</div>
      <span id="navName">...</span>
    </a>
    <a href="dashboard.html" class="n-back">← Dashboard</a>
  </div>
</nav>

<div class="chat-wrap" id="chatWrap">
  <div class="welcome" id="welcome">
    <div class="welcome-icon">🤖</div>
    <h2>Highly AI'ya hoş geldin!</h2>
    <p>Herhangi bir konuyu sor, Wikipedia'dan araştırayım!</p>
    <div style="display:flex;align-items:center;gap:8px;background:rgba(99,102,241,.08);border:1px solid rgba(99,102,241,.2);border-radius:999px;padding:7px 16px;font-size:12px;color:#a78bfa;margin-top:4px">
      🧠 <strong id="modelBadge">Gene 1.0</strong> · <span id="modelDesc">Wikipedia destekli</span>
    </div>
  </div>
</div>

<div class="input-wrap">
  <div class="input-box">
    <textarea class="msg-input" id="msgInput" placeholder="Bir şey sor... (Enter ile gönder)" rows="1"></textarea>
    <button class="send-btn" id="sendBtn">↑</button>
  </div>
  <div class="input-hint">Highly AI hata yapabilir. Sonuçları kontrol edin.</div>
</div>

<script>
const saved = localStorage.getItem('highly_user');
if (!saved) { location.href = 'highly-id.html'; }
const user = JSON.parse(saved || '{"name":"?"}');

// Avatar
const navAv = document.getElementById('navAvatar');
if (user.avatarEmoji) { navAv.textContent = user.avatarEmoji; navAv.style.background = 'transparent'; navAv.style.fontSize = '18px'; }
else { navAv.textContent = user.name[0].toUpperCase(); if (user.avatarBg) navAv.style.background = user.avatarBg; }
document.getElementById('navName').textContent = user.name.split(' ')[0];

const chatWrap = document.getElementById('chatWrap');
const msgInput = document.getElementById('msgInput');
const sendBtn  = document.getElementById('sendBtn');
const welcome  = document.getElementById('welcome');
let lastCtx    = { type: null, data: null };

// Input auto-resize
msgInput.addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 120) + 'px';
});
msgInput.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
});
sendBtn.addEventListener('click', function() { send(); });

// Temizle
document.getElementById('clearBtn').addEventListener('click', function() {
  lastCtx = { type: null, data: null };
  chatWrap.innerHTML = '';
  chatWrap.appendChild(welcome);
  welcome.style.display = 'flex';
});

// Model değiştir
document.getElementById('modelSel').addEventListener('change', function() {
  var v = this.value;
  var b = document.getElementById('modelBadge');
  var d = document.getElementById('modelDesc');
  if (v === 'wiki')   { if(b) b.textContent = 'Gene 1.0'; if(d) d.textContent = 'Wikipedia destekli'; }
  if (v === 'gene2')  { if(b) b.textContent = 'Gene 2.0'; if(d) d.textContent = 'Hava, Doviz, Matematik, Sohbet'; }
  if (v === 'gene25') { if(b) b.textContent = 'Gene 2.5'; if(d) d.textContent = 'Akilli baglam, hafiza, cumle analizi'; }
  lastCtx = { type: null, data: null };
  chatWrap.innerHTML = '';
  chatWrap.appendChild(welcome);
  welcome.style.display = 'flex';
});

// UI fonksiyonları
function rmTyping() {
  var t = document.getElementById('typing');
  if (t) t.remove();
}

function addTyping() {
  welcome.style.display = 'none';
  rmTyping();
  var d = document.createElement('div');
  d.className = 'msg ai';
  d.id = 'typing';
  d.innerHTML = '<div class="msg-avatar">🤖</div><div class="msg-bubble"><div class="typing"><span></span><span></span><span></span></div></div>';
  chatWrap.appendChild(d);
  chatWrap.scrollTop = chatWrap.scrollHeight;
}

function escHtml(t) {
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function fmtText(t) {
  var s = escHtml(t);
  s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  s = s.replace(/\*([^*]+)\*/g, '<em>$1</em>');
  s = s.replace(/\n/g, '<br>');
  return s;
}

function addMsg(role, text) {
  welcome.style.display = 'none';
  var d = document.createElement('div');
  d.className = 'msg ' + role;
  var av = role === 'user'
    ? (user.avatarEmoji || user.name[0].toUpperCase())
    : '🤖';
  d.innerHTML = '<div class="msg-avatar">' + av + '</div>'
    + '<div class="msg-bubble">' + (role === 'ai' ? fmtText(text) : escHtml(text)) + '</div>';
  chatWrap.appendChild(d);
  chatWrap.scrollTop = chatWrap.scrollHeight;
}

function rnd(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

// ---- MATEMATİK ----
function solveMath(raw) {
  try {
    var e = raw.trim()
      .replace(/,/g, '.')
      .replace(/x/gi, '*')
      .replace(/\u00d7/g, '*')
      .replace(/\u00f7/g, '/')
      .replace(/karek\u00f6k\s*([\d.]+)/gi, 'Math.sqrt($1)')
      .replace(/([\d.]+)\s*\^\s*([\d.]+)/g, 'Math.pow($1,$2)')
      .replace(/pi/gi, 'Math.PI');
    // faktöriyel
    e = e.replace(/(\d+)!/g, function(_, n) {
      var num = parseInt(n);
      if (num > 20) return '9999999999999999';
      var f = 1; for (var i = 2; i <= num; i++) f *= i; return f;
    });
    // sadece güvenli karakterler
    e = e.replace(/[^0-9+\-*\/.()% MathsqrpowPIE]/g, '').trim();
    if (!e) return null;
    var r = Function('"use strict"; return (' + e + ')')();
    if (typeof r !== 'number' || isNaN(r) || !isFinite(r)) return null;
    if (Number.isInteger(r)) return r.toLocaleString('tr-TR');
    return parseFloat(r.toFixed(8)).toString().replace('.', ',');
  } catch(err) { return null; }
}

function isMathExpr(t) {
  var c = t.trim()
    .replace(/\u00e7arp\u0131|kere/gi,'*')
    .replace(/b\u00f6l\u00fc/gi,'/')
    .replace(/art\u0131/gi,'+')
    .replace(/eksi/gi,'-')
    .replace(/[x\u00d7]/g,'*')
    .replace(/\u00f7/g,'/')
    .replace(/,/g,'.');
  return /^[\d\s+\-*\/.()%^]+$/.test(c) && /\d/.test(c) && /[+\-*\/^]/.test(c);
}

// ---- TARİH/SAAT ----
function tarihCevap() {
  var n = new Date();
  var D = ['Pazar','Pazartesi','Sali','Carsamba','Persembe','Cuma','Cumartesi'];
  var M = ['Ocak','Subat','Mart','Nisan','Mayis','Haziran','Temmuz','Agustos','Eylul','Ekim','Kasim','Aralik'];
  var hh = String(n.getHours()).padStart(2,'0');
  var mm = String(n.getMinutes()).padStart(2,'0');
  var ss = String(n.getSeconds()).padStart(2,'0');
  return 'Su an **' + hh + ':' + mm + ':' + ss + '**\n**' + D[n.getDay()] + ', ' + n.getDate() + ' ' + M[n.getMonth()] + ' ' + n.getFullYear() + '**';
}

// ---- HAVA ----
var WICONS = {'01d':'☀️','01n':'🌙','02d':'⛅','02n':'⛅','03d':'☁️','03n':'☁️','04d':'☁️','04n':'☁️','09d':'🌧','09n':'🌧','10d':'🌦','10n':'🌦','11d':'⛈','11n':'⛈','13d':'❄️','13n':'❄️','50d':'🌫','50n':'🌫'};

function extractCity(text) {
  var pats = [
    /([A-Za-z\u00c0-\u024f\u011e\u011f\u015e\u015f\u0130\u0131\u00d6\u00f6\u00dc\u00fc\u00c7\u00e7][A-Za-z\u00c0-\u024f\u011e\u011f\u015e\u015f\u0130\u0131\u00d6\u00f6\u00dc\u00fc\u00c7\u00e7 ]{1,20}?)\s*(?:ka\u00e7\s+derece|hava\s+durumu|hava\s+nas\u0131l)/i,
    /([A-Za-z\u00c0-\u024f\u011e\u011f\u015e\u015f\u0130\u0131\u00d6\u00f6\u00dc\u00fc\u00c7\u00e7][A-Za-z\u00c0-\u024f\u011e\u011f\u015e\u015f\u0130\u0131\u00d6\u00f6\u00dc\u00fc\u00c7\u00e7 ]{1,20}?)\s*(?:'de|'da|'te|'ta)?\s*(?:hava|derece|s\u0131cakl\u0131k)/i,
  ];
  var skip = /^(bug\u00fcn|\u015fu an|hava|genel|d\u0131\u015far\u0131)$/i;
  for (var i = 0; i < pats.length; i++) {
    var m = text.match(pats[i]);
    if (m && m[1]) {
      var c = m[1].trim();
      if (c.length > 1 && c.length < 25 && !skip.test(c)) return c;
    }
  }
  return null;
}

async function havaCevap(city) {
  var url;
  if (city) {
    url = 'https://api.openweathermap.org/data/2.5/weather?q=' + encodeURIComponent(city) + '&appid=bd5e378503939ddaee76f12ad7a97608&units=metric&lang=tr';
  } else {
    var gd = await (await fetch('https://ipapi.co/json/')).json();
    url = 'https://api.openweathermap.org/data/2.5/weather?lat=' + gd.latitude + '&lon=' + gd.longitude + '&appid=bd5e378503939ddaee76f12ad7a97608&units=metric&lang=tr';
  }
  var d = await (await fetch(url)).json();
  if (d.cod === '404') return '"' + city + '" sehri bulunamadi.';
  lastCtx = { type: 'hava', data: d.name };
  var icon = WICONS[d.weather[0].icon] || '🌤';
  return icon + ' **' + d.name + ' - ' + Math.round(d.main.temp) + 'C**\n\n'
    + 'Hissedilen: ' + Math.round(d.main.feels_like) + 'C\n'
    + d.weather[0].description + '\n'
    + 'Nem: %' + d.main.humidity + '\n'
    + 'Ruzgar: ' + Math.round(d.wind.speed * 3.6) + ' km/s\n'
    + 'Min/Max: ' + Math.round(d.main.temp_min) + 'C / ' + Math.round(d.main.temp_max) + 'C';
}

// ---- DÖVİZ ----
async function dovizCevap(birim) {
  var data = await (await fetch('https://api.frankfurter.app/latest?from=USD&to=TRY,EUR,GBP,CHF,JPY')).json();
  var TRY = data.rates.TRY;
  var R = {
    usd: TRY,
    eur: TRY / data.rates.EUR,
    gbp: TRY / data.rates.GBP,
    chf: TRY / data.rates.CHF,
    jpy: TRY / data.rates.JPY
  };
  var saat = new Date().toLocaleTimeString('tr-TR', {hour:'2-digit', minute:'2-digit'});
  lastCtx = { type: 'doviz', data: birim };
  var ana = '💵 **1 Dolar = ' + R.usd.toFixed(2) + ' TL**';
  if (birim === 'eur') ana = '💶 **1 Euro = ' + R.eur.toFixed(2) + ' TL**';
  else if (birim === 'gbp') ana = '💷 **1 Sterlin = ' + R.gbp.toFixed(2) + ' TL**';
  else if (birim === 'chf') ana = '**1 Frank = ' + R.chf.toFixed(2) + ' TL**';
  else if (birim === 'jpy') ana = '**100 Yen = ' + (R.jpy * 100).toFixed(2) + ' TL**';
  return ana + '\n\nDolar: ' + R.usd.toFixed(2) + ' TL\nEuro: ' + R.eur.toFixed(2) + ' TL\nSterlin: ' + R.gbp.toFixed(2) + ' TL\nFrank: ' + R.chf.toFixed(2) + ' TL\n\n' + saat + ' - frankfurter.app';
}

// ---- WİKİPEDİA ----
async function searchWiki(q) {
  try {
    var trS = await (await fetch('https://tr.wikipedia.org/w/api.php?action=query&list=search&srsearch=' + encodeURIComponent(q) + '&format=json&origin=*&srlimit=1')).json();
    var trR = trS.query && trS.query.search;
    var lang = 'tr', title;
    if (trR && trR.length) {
      title = trR[0].title;
    } else {
      var enS = await (await fetch('https://en.wikipedia.org/w/api.php?action=query&list=search&srsearch=' + encodeURIComponent(q) + '&format=json&origin=*&srlimit=1')).json();
      var enR = enS.query && enS.query.search;
      if (!enR || !enR.length) return null;
      title = enR[0].title; lang = 'en';
    }
    var base = lang === 'tr' ? 'https://tr.wikipedia.org' : 'https://en.wikipedia.org';
    var ext = await (await fetch(base + '/w/api.php?action=query&titles=' + encodeURIComponent(title) + '&prop=extracts&exintro=true&explaintext=true&format=json&origin=*')).json();
    var page = Object.values(ext.query.pages)[0];
    if (!page || !page.extract) return null;
    lastCtx = { type: 'wiki', data: title };
    return { title: title, text: page.extract.slice(0, 700).trim(), url: base + '/wiki/' + encodeURIComponent(title) };
  } catch(e) { return null; }
}

// ---- GENE 2.5 INTENT ----
function detectIntent(text) {
  var t = text.trim();
  var tl = t.toLowerCase();

  // Bagiam devami
  if (lastCtx.type === 'hava' && t.length < 30) {
    var devam = t.replace(/^(peki|ya|ee|bide)\s*/i, '').replace(/\?$/, '').trim();
    if (devam.length > 1 && devam.length < 25 && !/dolar|euro|nedir|kimdir/.test(devam)) {
      return { type: 'hava', city: devam };
    }
  }
  if (lastCtx.type === 'doviz' && /^(peki|ya)?\s*(euro|dolar|sterlin|frank|yen)\s*\??$/i.test(t)) {
    var b2 = 'usd';
    if (/euro/i.test(t)) b2 = 'eur';
    else if (/sterlin/i.test(t)) b2 = 'gbp';
    else if (/frank/i.test(t)) b2 = 'chf';
    else if (/yen/i.test(t)) b2 = 'jpy';
    return { type: 'doviz', birim: b2 };
  }

  // Sohbet
  if (/^(selam|merhaba|hey|hi|hello)/i.test(tl)) return { type: 'selam' };
  if (/nas\u0131ls\u0131n|naber|ne haber/i.test(tl)) return { type: 'nasilsin' };
  if (/te\u015fekk\u00fcr|sa\u011fol|eyvallah/i.test(tl)) return { type: 'tesekkur' };
  if (/g\u00fcnayd\u0131n/i.test(tl)) return { type: 'gunaydın' };
  if (/iyi gece|geceler/i.test(tl)) return { type: 'geceler' };
  if (/^(iyi|s\u00fcper|harika|bravo|tamam|evet|hay\u0131r|haha|ok)/i.test(tl)) return { type: 'genel' };
  if (/sen kimsin|ne yapabilirsin|neler yapabilirsin|highly ai|gene/i.test(tl)) return { type: 'kim' };

  // Tarih
  if (/saat ka\u00e7|bug\u00fcn ne|hangi g\u00fcn|tarih ne/i.test(tl)) return { type: 'tarih' };

  // Matematik
  if (isMathExpr(t)) {
    var me = t.replace(/\u00e7arp\u0131|kere/gi,'*').replace(/b\u00f6l\u00fc/gi,'/').replace(/art\u0131/gi,'+').replace(/eksi/gi,'-').replace(/,/g,'.');
    return { type: 'matematik', expr: me };
  }
  if (/karek\u00f6k|\d+!/i.test(t)) return { type: 'matematik', expr: t };

  // Hava
  if (/hava|derece|s\u0131cakl\u0131k|ya\u011fmur|f\u0131rt\u0131na/i.test(tl)) {
    return { type: 'hava', city: extractCity(t) };
  }

  // Doviz
  if (/dolar|euro|sterlin|frank|yen|d\u00f6viz|kur|ka\u00e7 tl|usd|eur|gbp/i.test(tl)) {
    var b = 'usd';
    if (/euro|eur/i.test(tl)) b = 'eur';
    else if (/sterlin|gbp/i.test(tl)) b = 'gbp';
    else if (/frank|chf/i.test(tl)) b = 'chf';
    else if (/yen|jpy/i.test(tl)) b = 'jpy';
    return { type: 'doviz', birim: b };
  }

  return { type: 'arama', query: t };
}

// Sohbet cevapları
var SOHBET = {
  selam: ['Selam! 👋 Nasil yardimci olabilirim?', 'Merhaba! 😊 Ne ogrenmen istiyorsun?', 'Hey! 👋'],
  nasilsin: ['İyiyim, tesekkurler! Sen nasilsin? 😊', 'Gayet iyiyim! 🚀', 'Iyi sayilirim, sen?'],
  tesekkur: ['Rica ederim! 😊', 'Ne demek! 🙌', 'Her zaman! 😄'],
  gunaydın: ['Gunaydın! ☀️ Guzel bir gun olsun!', 'Gunaydın! ☀️'],
  geceler: ['İyi geceler! 🌙', 'İyi geceler, yarin gorusuraz! 🌙'],
  genel: ['Anlıyorum! 😊', 'Tamam! Baska bir sey var mi? 🙂', 'Harika! 🎉', '😊'],
  kim: 'Ben Highly AI, Gene 2.5 ile calısıyorum! 🤖\n\n🧮 Matematik - (15+3)*200 gibi\n🌤 Hava - "New York kac derece?"\n💵 Doviz - "Dolar kac TL?"\n📅 Tarih/Saat\n📖 Arastirma\n💬 Sohbet 😊'
};

// ---- GENE 2.5 CEVAP ----
async function gene25(text) {
  var intent = detectIntent(text);
  var type = intent.type;

  if (type === 'selam')    return rnd(SOHBET.selam);
  if (type === 'nasilsin') return rnd(SOHBET.nasilsin);
  if (type === 'tesekkur') return rnd(SOHBET.tesekkur);
  if (type === 'gunaydın') return rnd(SOHBET.gunaydın);
  if (type === 'geceler')  return rnd(SOHBET.geceler);
  if (type === 'genel')    return rnd(SOHBET.genel);
  if (type === 'kim')      return SOHBET.kim;
  if (type === 'tarih')    return tarihCevap();

  if (type === 'matematik') {
    var r = solveMath(intent.expr || text);
    if (r !== null) return '🧮 **' + (intent.expr || text).trim() + ' = ' + r + '**';
    return '🧮 Bu islemi cozemedim. Ornek: (15 + 3) * 200';
  }

  if (type === 'hava') {
    try { return await havaCevap(intent.city || null); }
    catch(e) { return 'Hava bilgisi alinamadi.'; }
  }

  if (type === 'doviz') {
    try { return await dovizCevap(intent.birim); }
    catch(e) { return 'Doviz bilgisi alinamadi.'; }
  }

  // Arama
  var w = await searchWiki(intent.query || text);
  if (w) return '📖 **' + w.title + '**\n\n' + w.text + '\n\nWikipedia: ' + w.url;
  return '🤔 "' + text + '" hakkinda bilgi bulunamadi.\n\nSunlari deneyebilirsin:\n🧮 (150+50)*3\n🌤 Istanbul hava nasil?\n💵 Dolar kac TL?\n📖 Ataturk kimdir?';
}

// ---- BASIT SOHBET (1.0/2.0) ----
function isSohbetBasic(t) {
  return /^(selam|merhaba|hey|hi|nasılsın|naber|teşekkür|sağol|günaydın|evet|hayır|tamam|haha)/i.test(t.trim());
}
function basicSohbet(t) {
  var tl = t.toLowerCase();
  if (/selam|merhaba|hey|hi/.test(tl)) return rnd(SOHBET.selam);
  if (/nasılsın|naber/.test(tl)) return rnd(SOHBET.nasilsin);
  if (/teşekkür|sağol/.test(tl)) return rnd(SOHBET.tesekkur);
  return rnd(SOHBET.genel);
}

// ---- ANA SEND ----
async function send() {
  var text = msgInput.value.trim();
  if (!text) return;
  msgInput.value = '';
  msgInput.style.height = 'auto';
  sendBtn.disabled = true;
  addMsg('user', text);
  addTyping();
  var model = document.getElementById('modelSel').value;

  try {
    await new Promise(function(resolve) { setTimeout(resolve, 350); });
    rmTyping();
    var reply = null;

    if (model === 'wiki') {
      if (isSohbetBasic(text)) {
        reply = basicSohbet(text);
      } else {
        addTyping();
        var w1 = await searchWiki(text);
        rmTyping();
        reply = w1 ? '📖 **' + w1.title + '**\n\n' + w1.text + '\n\nWikipedia: ' + w1.url
                   : '"' + text + '" hakkinda bilgi bulunamadi.';
      }
    }
    else if (model === 'gene2') {
      if (isSohbetBasic(text)) {
        reply = basicSohbet(text);
      } else if (/saat kaç|bugün ne/i.test(text)) {
        reply = tarihCevap();
      } else if (/hava|derece/i.test(text)) {
        addTyping(); reply = await havaCevap(extractCity(text)); rmTyping();
      } else if (/dolar|euro|sterlin|döviz/i.test(text)) {
        addTyping(); reply = await dovizCevap('usd'); rmTyping();
      } else {
        var r2 = solveMath(text);
        if (r2 !== null) {
          reply = '🧮 **' + text.trim() + ' = ' + r2 + '**';
        } else {
          addTyping();
          var w2 = await searchWiki(text);
          rmTyping();
          reply = w2 ? '📖 **' + w2.title + '**\n\n' + w2.text + '\n\nWikipedia: ' + w2.url
                     : '"' + text + '" hakkinda bilgi bulunamadi.';
        }
      }
    }
    else {
      // GENE 2.5
      var needsApi = /hava|derece|dolar|euro|sterlin|döviz/i.test(text) || lastCtx.type === 'hava' || lastCtx.type === 'doviz';
      if (needsApi) addTyping();
      reply = await gene25(text);
      if (needsApi) rmTyping();
    }

    addMsg('ai', reply || 'Bir seyler ters gitti, tekrar dene.');
  } catch(e) {
    rmTyping();
    addMsg('ai', 'Hata: ' + e.message);
  } finally {
    sendBtn.disabled = false;
    msgInput.focus();
  }
}

msgInput.focus();
