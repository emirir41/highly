<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#06070f;--s1:#0b0d1c;--s2:#0f1125;--border:rgba(255,255,255,0.07);--a1:#6366f1;--a2:#4f46e5;--text:#e8e8ff;--muted:#4a4d6a}

body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;background:radial-gradient(ellipse at 20% 20%,rgba(99,102,241,0.08) 0%,transparent 50%),radial-gradient(ellipse at 80% 80%,rgba(167,139,250,0.06) 0%,transparent 50%)}

.n-logo{display:flex;align-items:center;gap:9px;text-decoration:none;color:var(--text)}
.n-icon{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,var(--a1),var(--a2));display:flex;align-items:center;justify-content:center;font-size:16px}

.n-right{display:flex;align-items:center;gap:10px}

.n-back{color:var(--muted);text-decoration:none;font-size:13px;transition:color .2s}
.n-back:hover{color:var(--text)}
.n-clear{background:none;border:1px solid var(--border);border-radius:8px;color:var(--muted);font-size:12px;padding:5px 12px;cursor:pointer;transition:all .2s;font-family:'DM Sans',sans-serif}

.sug-btn{padding:9px 16px;background:var(--s1);border:1px solid var(--border);border-radius:999px;color:var(--text);font-size:13px;cursor:pointer;transition:all .2s;font-family:'DM Sans',sans-serif}

.msg.user{flex-direction:row-reverse;margin-left:auto}
.msg-avatar{width:32px;height:32px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;font-family:'Syne',sans-serif}
.msg.user .msg-avatar{background:linear-gradient(135deg,var(--a1),var(--a2))}
.msg.ai .msg-avatar{background:linear-gradient(135deg,#1e1b4b,#312e81);border:1px solid rgba(99,102,241,.3);font-size:18px}
.msg-bubble{padding:14px 18px;border-radius:16px;font-size:14px;line-height:1.7;max-width:100%}

.typing span:nth-child(3){animation-delay:.3s}
@keyframes t{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-6px);opacity:1}}
.input-wrap{position:relative;z-index:10;padding:16px 24px;background:rgba(6,7,15,0.95);border-top:1px solid var(--border);flex-shrink:0}
.input-box{display:flex;align-items:flex-end;gap:10px;background:var(--s1);border:1px solid var(--border);border-radius:16px;padding:12px 14px;transition:border-color .2s}
.input-box:focus-within{border-color:rgba(99,102,241,.4)}
.msg-input{flex:1;background:none;border:none;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;line-height:1.6;outline:none;resize:none;max-height:120px;min-height:24px}

.send-btn{width:38px;height:38px;border-radius:10px;border:none;background:linear-gradient(135deg,var(--a1),var(--a2));color:#fff;font-size:16px;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.send-btn:hover{opacity:.9;transform:scale(1.05)}
.send-btn:disabled{opacity:.4;cursor:not-allowed;transform:none}

</style>

<body>

<div class="chat-wrap" id="chatWrap">

<script>
const WORKER = 'https://highly-ai-proxy.emrir41.workers.dev/ai';

const saved = localStorage.getItem('highly_user');
if (!saved) location.href = 'highly-id.html';
const user = JSON.parse(saved || '{"name":"?"}');
document.getElementById('navAvatar').textContent = user.name[0].toUpperCase();
document.getElementById('navName').textContent = user.name.split(' ')[0];

let history = [];
const chatWrap = document.getElementById('chatWrap');
const msgInput = document.getElementById('msgInput');
const sendBtn  = document.getElementById('sendBtn');
const welcome  = document.getElementById('welcome');

msgInput.addEventListener('input', () => {
  msgInput.style.height = 'auto';
  msgInput.style.height = Math.min(msgInput.scrollHeight, 120) + 'px';
});
msgInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
});
sendBtn.addEventListener('click', send);

document.getElementById('clearBtn').addEventListener('click', () => {
  history = [];
  chatWrap.innerHTML = '';
  chatWrap.appendChild(welcome);
  welcome.style.display = 'flex';
});

function addMsg(role, text) {
  welcome.style.display = 'none';
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.innerHTML = `
    <div class="msg-avatar">${role === 'user' ? user.name[0].toUpperCase() : 'рЯ§Ц'}</div>
    <div class="msg-bubble">${role === 'ai' ? fmt(text) : esc(text)}</div>`;
  chatWrap.appendChild(div);
  chatWrap.scrollTop = chatWrap.scrollHeight;
}

function addTyping() {
  welcome.style.display = 'none';
  const div = document.createElement('div');
  div.className = 'msg ai'; div.id = 'typing';
  div.innerHTML = `<div class="msg-avatar">рЯ§Ц</div><div class="msg-bubble"><div class="typing"><span></span><span></span><span></span></div></div>`;
  chatWrap.appendChild(div);
  chatWrap.scrollTop = chatWrap.scrollHeight;
}

function fmt(t) {
  return esc(t)
    .replace(/```[\w]*\n?([\s\S]*?)```/g, '<pre><code>$1</code></pre>')
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
    .replace(/\*([^*]+)\*/g, '<em>$1</em>')
    .replace(/\n/g, '<br>');
}
function esc(t) {
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// Sohbet kalƒ±plarƒ± вАФ bunlar Wikipedia'ya gitmesin
const CHAT_PATTERNS = [
  /^(selam|merhaba|hey|hi|hello)/i,
  /^(nasƒ±lsƒ±n|naber|ne haber|ne var ne yok)/i,
  /^(te≈Яekk√Љr|saƒЯol|eyvallah|tamam|ok|iyi)/i,
  /^(kim|sen kimsin|adƒ±n ne|highly ai)/i,
  /^(g√Љnaydƒ±n|iyi geceler|iyi ak≈Яamlar|iyi g√Љnler)/i,
  /^(evet|hayƒ±r|yok|var|olur|olmaz)/i,
  /^(рЯША|рЯШВ|рЯСН|вЭ§пЄП|рЯЩВ)/,
];

const CHAT_RESPONSES = {
  selam: [`Selam ${user.name}! рЯСЛ Nasƒ±l yardƒ±mcƒ± olabilirim?`, `Merhaba! рЯШК Ne √ґƒЯrenmek istiyorsun?`, `Hey! рЯСЛ Sana nasƒ±l yardƒ±mcƒ± olabilirim?`],
  nasƒ±l: [`ƒ∞yiyim, te≈Яekk√Љrler! рЯШК Sen nasƒ±lsƒ±n?`, `Gayet iyiyim! Sana yardƒ±mcƒ± olmaya hazƒ±rƒ±m рЯЪА`, `S√Љper! Sen?`],
  te≈Яekk√Љr: [`Rica ederim! рЯШК`, `Ne demek! Ba≈Яka sorun var mƒ±?`, `Her zaman! рЯЩМ`],
  default: [`Anlƒ±yorum! Ba≈Яka bir ≈Яey sormak ister misin?`, `Tabii ki! Sana nasƒ±l yardƒ±mcƒ± olabilirim?`]
};

function isSohbet(text) {
  return CHAT_PATTERNS.some(p => p.test(text.trim()));
}

function sohbetCevap(text) {
  const t = text.toLowerCase();
  if (/selam|merhaba|hey/.test(t)) return CHAT_RESPONSES.selam[Math.floor(Math.random()*3)];
  if (/nasƒ±l|naber/.test(t)) return CHAT_RESPONSES.nasƒ±l[Math.floor(Math.random()*3)];
  if (/te≈Яekk√Љr|saƒЯol|eyvallah/.test(t)) return CHAT_RESPONSES.te≈Яekk√Љr[Math.floor(Math.random()*3)];
  return CHAT_RESPONSES.default[Math.floor(Math.random()*2)];
}

async function searchWikipedia(query) {
  // √Цnce T√Љrk√Іe Wikipedia'da ara
  const searchUrl = `https://tr.wikipedia.org/w/api.php?action=query&list=search&srsearch=${encodeURIComponent(query)}&format=json&origin=*&srlimit=1`;
  const searchRes = await fetch(searchUrl);
  const searchData = await searchRes.json();
  const results = searchData.query?.search;
  if (!results?.length) {
    // T√Љrk√Іe bulunamazsa ƒ∞ngilizce dene
    const enUrl = `https://en.wikipedia.org/w/api.php?action=query&list=search&srsearch=${encodeURIComponent(query)}&format=json&origin=*&srlimit=1`;
    const enRes = await fetch(enUrl);
    const enData = await enRes.json();
    const enResults = enData.query?.search;
    if (!enResults?.length) return null;
    const title = enResults[0].title;
    const sumUrl = `https://en.wikipedia.org/w/api.php?action=query&titles=${encodeURIComponent(title)}&prop=extracts&exintro=true&explaintext=true&format=json&origin=*`;
    const sumRes = await fetch(sumUrl);
    const sumData = await sumRes.json();
    const pages = sumData.query?.pages;
    const page = Object.values(pages)[0];
    if (!page?.extract) return null;
    const text = page.extract.slice(0, 800).trim();
    return { title, text, url: `https://en.wikipedia.org/wiki/${encodeURIComponent(title)}`, lang: 'en' };
  }
  const title = results[0].title;
  const sumUrl = `https://tr.wikipedia.org/w/api.php?action=query&titles=${encodeURIComponent(title)}&prop=extracts&exintro=true&explaintext=true&format=json&origin=*`;
  const sumRes = await fetch(sumUrl);
  const sumData = await sumRes.json();
  const pages = sumData.query?.pages;
  const page = Object.values(pages)[0];
  if (!page?.extract) return null;
  const text = page.extract.slice(0, 800).trim();
  return { title, text, url: `https://tr.wikipedia.org/wiki/${encodeURIComponent(title)}`, lang: 'tr' };
}

async function send() {
  const text = msgInput.value.trim();
  if (!text) return;
  msgInput.value = ''; msgInput.style.height = 'auto';
  sendBtn.disabled = true;
  addMsg('user', text);
  history.push({ role: 'user', content: text });
  addTyping();

  try {
    // Sohbet mi kontrol et
    if (isSohbet(text)) {
      await new Promise(r => setTimeout(r, 600));
      document.getElementById('typing')?.remove();
      const reply = sohbetCevap(text);
      history.push({ role: 'assistant', content: reply });
      addMsg('ai', reply);
      return;
    }

    // Wikipedia'dan ara
    const wiki = await searchWikipedia(text);
    document.getElementById('typing')?.remove();

    if (wiki) {
      const reply = `рЯУЦ **${wiki.title}**\n\n${wiki.text}\n\nрЯФЧ [Wikipedia'da oku](${wiki.url})`;
      history.push({ role: 'assistant', content: reply });
      addMsg('ai', reply);
    } else {
      addMsg('ai', `вЭМ "${text}" hakkƒ±nda bilgi bulunamadƒ±. Farklƒ± bir ≈Яekilde sormayƒ± dene!`);
    }
  } catch(e) {
    document.getElementById('typing')?.remove();
    addMsg('ai', 'вЭМ BaƒЯlantƒ± hatasƒ±: ' + e.message);
  } finally {
    sendBtn.disabled = false;
    msgInput.focus();
  }
}

// Model deƒЯi≈Яince badge g√Љncelle
document.getElementById('modelSel').addEventListener('change', function() {
  const isGene2 = this.value === 'gene2';
  const badge = document.getElementById('modelBadge');
  const desc  = document.getElementById('modelDesc');
  if (badge) badge.textContent = isGene2 ? 'Gene 2.0' : 'Gene 1.0';
  if (desc)  desc.textContent  = isGene2 ? 'Matematik ¬Ј Hava ¬Ј D√ґviz ¬Ј Sohbet' : 'Wikipedia destekli';
  history = [];
  chatWrap.innerHTML = '';
  chatWrap.appendChild(welcome);
  welcome.style.display = 'flex';
});

// ===== GENE 2.0 MOD√ЬLLERƒ∞ =====

// 1. MATEMATƒ∞K
function isMath(t) {
  return /[\d\+\-\*\/\^\%вИЪ]/.test(t) && /[\d]/.test(t) ||
    /ka√І(tƒ±r|tir|tur|t√Љr)?(\s|$)/.test(t) ||
    /(\d+)\s*(√Іarpƒ±|b√ґl√Љ|artƒ±|eksi|kere)\s*(\d+)/.test(t) ||
    /karek√ґk|fakt√ґriyel|y√Љzde|\^/.test(t);
}

function solveMath(t) {
  try {
    let expr = t.toLowerCase()
      .replace(/√Іarpƒ±|kere/g, '*')
      .replace(/b√ґl√Љ/g, '/')
      .replace(/artƒ±/g, '+')
      .replace(/eksi/g, '-')
      .replace(/karek√ґk\s*(\d+)/g, 'Math.sqrt($1)')
      .replace(/(\d+)\s*\^\s*(\d+)/g, 'Math.pow($1,$2)')
      .replace(/(\d+)!/g, (m,n) => { let f=1; for(let i=2;i<=parseInt(n);i++) f*=i; return f; })
      .replace(/y√Љzde\s*(\d+)\s*(.*?)\s*(\d+)/g, (m,p,_,v) => (parseFloat(v)*parseFloat(p)/100).toString())
      .replace(/[^0-9\+\-\*\/\.\(\)MathsqrpowE]/g, ' ').trim();
    // Basit ifadeyse eval
    const result = Function('"use strict"; return (' + expr + ')')();
    if (isNaN(result) || !isFinite(result)) return null;
    return result % 1 === 0 ? result.toString() : result.toFixed(6).replace(/\.?0+$/, '');
  } catch { return null; }
}

function mathCevap(t) {
  const result = solveMath(t);
  if (result !== null) return `рЯІЃ **Sonu√І: ${result}**`;
  return null;
}

// 2. TARƒ∞H & SAAT
function isTarih(t) {
  return /(saat ka√І|saat\s*ka√І|bug√Љn ne|bug√Љn hangi|g√Љn bug√Љn|tarih ne|today|hangi g√Љn|g√Љnlerden ne|ay ka√І|yƒ±l ka√І)/i.test(t);
}

function tarihCevap() {
  const now = new Date();
  const DAYS   = ['Pazar','Pazartesi','Salƒ±','√Зar≈Яamba','Per≈Яembe','Cuma','Cumartesi'];
  const MONTHS = ['Ocak','≈Юubat','Mart','Nisan','Mayƒ±s','Haziran','Temmuz','AƒЯustos','Eyl√Љl','Ekim','Kasƒ±m','Aralƒ±k'];
  const hh = String(now.getHours()).padStart(2,'0');
  const mm = String(now.getMinutes()).padStart(2,'0');
  return `рЯХР ≈Юu an **${hh}:${mm}**
рЯУЕ **${DAYS[now.getDay()]}, ${now.getDate()} ${MONTHS[now.getMonth()]} ${now.getFullYear()}**`;
}

// 3. HAVA DURUMU
function isHava(t) {
  return /(hava|hava durumu|bug√Љn hava|dƒ±≈Яarƒ±da|sƒ±caklƒ±k|hava nasƒ±l|yaƒЯmur|kar yaƒЯ|fƒ±rtƒ±na)/i.test(t);
}

async function havaCevap() {
  try {
    const geo = await fetch('https://ipapi.co/json/');
    const gd  = await geo.json();
    const res = await fetch(`https://api.openweathermap.org/data/2.5/weather?lat=${gd.latitude}&lon=${gd.longitude}&appid=bd5e378503939ddaee76f12ad7a97608&units=metric&lang=tr`);
    const d   = await res.json();
    const icons = {'01d':'вШАпЄП','01n':'рЯМЩ','02d':'вЫЕ','02n':'вЫЕ','03d':'вШБпЄП','04d':'вШБпЄП','09d':'рЯМІ','10d':'рЯМ¶','11d':'вЫИ','13d':'вЭДпЄП','50d':'рЯМЂ'};
    const icon = icons[d.weather[0].icon] || 'рЯМ§';
    return `${icon} **${d.name} hava durumu:**

рЯМ° Sƒ±caklƒ±k: **${Math.round(d.main.temp)}¬∞C** (hissedilen ${Math.round(d.main.feels_like)}¬∞C)
вШБпЄП Durum: ${d.weather[0].description}
рЯТІ Nem: %${d.main.humidity}
рЯТ® R√Љzgar: ${Math.round(d.wind.speed*3.6)} km/s`;
  } catch { return 'вЭМ Hava bilgisi alƒ±namadƒ±, internet baƒЯlantƒ±nƒ± kontrol et.'; }
}

// 4. D√ЦVƒ∞Z
function isDoviz(t) {
  return /(dolar|euro|sterlin|pound|d√ґviz|kur|tl ka√І|ka√І tl|usd|eur|gbp|dolar ka√І|euro ka√І)/i.test(t);
}

async function dovizCevap(t) {
  try {
    const res  = await fetch('https://api.frankfurter.app/latest?from=USD&to=TRY,EUR,GBP');
    const data = await res.json();
    const usdTry = data.rates.TRY;
    const eurTry = usdTry / data.rates.EUR;
    const gbpTry = usdTry / data.rates.GBP;
    const tl = t.toLowerCase();
    if (/euro|eur/.test(tl)) return `рЯТґ **1 Euro = ${eurTry.toFixed(2)} TL**
рЯТµ 1 Dolar = ${usdTry.toFixed(2)} TL
рЯТЈ 1 Sterlin = ${gbpTry.toFixed(2)} TL`;
    if (/sterlin|pound|gbp/.test(tl)) return `рЯТЈ **1 Sterlin = ${gbpTry.toFixed(2)} TL**
рЯТµ 1 Dolar = ${usdTry.toFixed(2)} TL
рЯТґ 1 Euro = ${eurTry.toFixed(2)} TL`;
    return `рЯТµ **1 Dolar = ${usdTry.toFixed(2)} TL**
рЯТґ 1 Euro = ${eurTry.toFixed(2)} TL
рЯТЈ 1 Sterlin = ${gbpTry.toFixed(2)} TL`;
  } catch { return 'вЭМ D√ґviz bilgisi alƒ±namadƒ±.'; }
}

// 5. Kƒ∞MLƒ∞K (AI hakkƒ±nda sorular)
function isKimlik(t) {
  return /(sen kimsin|adƒ±n ne|highly ai|gene|kim yapƒ±|nesin|ne i≈Я yapƒ±|bana yardƒ±m)/i.test(t);
}

function kimlikCevap() {
  const cevaplar = [
    `Merhaba! Ben **Highly AI** вАФ Gene 2.0 modeliyle √Іalƒ±≈Яƒ±yorum. рЯ§Ц

Sana ≈Яunlarda yardƒ±mcƒ± olabilirim:
рЯІЃ Matematik i≈Яlemleri
рЯМ§ Hava durumu
рЯТµ D√ґviz kurlarƒ±
рЯУЕ Tarih ve saat
рЯУЦ Bilgi ara≈Яtƒ±rma`,
    `Ben Highly ekosisteminin yapay zeka asistanƒ±yƒ±m! Gene 2.0 ile g√Љ√Іlendirildim. Matematik, hava, d√ґviz, tarih ve ara≈Яtƒ±rma konularƒ±nda yardƒ±mcƒ± olabilirim. рЯЪА`,
  ];
  return cevaplar[Math.floor(Math.random()*cevaplar.length)];
}

// Ana send fonksiyonunu g√Љncelle
async function send() {
  const text = msgInput.value.trim();
  if (!text) return;
  msgInput.value = ''; msgInput.style.height = 'auto';
  sendBtn.disabled = true;
  addMsg('user', text);
  history.push({ role: 'user', content: text });
  addTyping();

  const model = document.getElementById('modelSel').value;

  try {
    await new Promise(r => setTimeout(r, 400));
    document.getElementById('typing')?.remove();

    let reply = null;

    // === GENE 1.0 ===
    if (model === 'wiki') {
      if (isSohbet(text)) { reply = sohbetCevap(text); }
      else {
        const wiki = await searchWikipedia(text);
        reply = wiki
          ? `рЯУЦ **${wiki.title}**

${wiki.text}

рЯФЧ [Wikipedia'da oku](${wiki.url})`
          : `вЭМ "${text}" hakkƒ±nda bilgi bulunamadƒ±. Farklƒ± bir ≈Яekilde sormayƒ± dene!`;
      }
    }

    // === GENE 2.0 ===
    else if (model === 'gene2') {
      if (isSohbet(text))       { reply = sohbetCevap(text); }
      else if (isKimlik(text))  { reply = kimlikCevap(); }
      else if (isTarih(text))   { reply = tarihCevap(); }
      else if (isHava(text))    { addTyping(); reply = await havaCevap(); document.getElementById('typing')?.remove(); }
      else if (isDoviz(text))   { addTyping(); reply = await dovizCevap(text); document.getElementById('typing')?.remove(); }
      else if (isMath(text))    { reply = mathCevap(text); }
      
      // Math ba≈Яarƒ±sƒ±zsa veya ba≈Яka soruysa Wikipedia'ya git
      if (!reply) {
        const wiki = await searchWikipedia(text);
        reply = wiki
          ? `рЯУЦ **${wiki.title}**

${wiki.text}

рЯФЧ [Wikipedia'da oku](${wiki.url})`
          : `рЯ§Ф Bunu tam olarak anlayamadƒ±m. ≈Юunlarƒ± sorabilirsin:

рЯІЃ Matematik: "15 √Іarpƒ± 24"
рЯМ§ Hava: "Bug√Љn hava nasƒ±l?"
рЯТµ D√ґviz: "Dolar ka√І TL?"
рЯУЕ Saat: "Saat ka√І?"
рЯУЦ Bilgi: "Einstein kimdir?"`;
      }
    }

    history.push({ role: 'assistant', content: reply });
    addMsg('ai', reply);

  } catch(e) {
    document.getElementById('typing')?.remove();
    addMsg('ai', 'вЭМ Hata: ' + e.message);
  } finally {
    sendBtn.disabled = false;
    msgInput.focus();
  }
}

msgInput.focus();
</script>
