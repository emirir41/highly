<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<title>Highly — Mesajlar</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#06070f;--s1:#0b0d1c;--s2:#0f1125;--border:rgba(255,255,255,0.07);--a1:#6366f1;--a2:#4f46e5;--text:#e8e8ff;--muted:#4a4d6a}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse at 20% 20%,rgba(99,102,241,0.06) 0%,transparent 50%),
             radial-gradient(ellipse at 80% 80%,rgba(52,211,153,0.04) 0%,transparent 50%)}

.app{display:flex;height:100%;position:relative;z-index:2}

/* ===== SOL LİSTE ===== */
.sidebar{width:320px;flex-shrink:0;background:var(--s1);border-right:1px solid var(--border);display:flex;flex-direction:column;height:100%}
.sb-head{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0}
.sb-back{width:34px;height:34px;background:var(--s2);border:1px solid var(--border);border-radius:9px;display:flex;align-items:center;justify-content:center;text-decoration:none;color:var(--muted);font-size:14px;flex-shrink:0;transition:all .2s}
.sb-back:hover{color:var(--text)}
.sb-title{font-family:'Syne',sans-serif;font-size:17px;font-weight:800;flex:1}
.sb-search{padding:10px 14px;border-bottom:1px solid var(--border);flex-shrink:0}
.sb-inp{width:100%;background:var(--s2);border:1px solid var(--border);border-radius:10px;padding:9px 14px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;outline:none}
.sb-inp::placeholder{color:var(--muted)}
.sb-list{flex:1;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
.conv{display:flex;align-items:center;gap:12px;padding:13px 16px;cursor:pointer;transition:background .2s;border-bottom:1px solid rgba(255,255,255,.03)}
.conv:hover{background:rgba(255,255,255,.04)}
.conv.active{background:rgba(99,102,241,.1)}
.conv-av{width:44px;height:44px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;font-family:'Syne',sans-serif;font-weight:800;color:#fff;font-size:16px}
.conv-info{flex:1;min-width:0}
.conv-name{font-size:14px;font-weight:600;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.conv-last{font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.conv-meta{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0}
.conv-time{font-size:10px;color:var(--muted)}
.unread-badge{min-width:18px;height:18px;background:var(--a1);border-radius:9px;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;color:#fff;padding:0 4px}
.sb-empty{text-align:center;padding:40px 20px;color:var(--muted);font-size:13px;line-height:1.6}
.sb-empty a{color:#a78bfa;text-decoration:none}

/* ===== CHAT ALANI ===== */
.chat{flex:1;display:flex;flex-direction:column;height:100%;overflow:hidden}
.chat-head{padding:12px 16px;border-bottom:1px solid var(--border);background:rgba(6,7,15,.95);backdrop-filter:blur(20px);display:flex;align-items:center;gap:12px;flex-shrink:0}
.chat-back-btn{width:34px;height:34px;background:var(--s2);border:1px solid var(--border);border-radius:9px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--muted);font-size:16px;flex-shrink:0;display:none}
.chat-head-av{width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;font-family:'Syne',sans-serif;font-weight:800;color:#fff}
.chat-head-info{flex:1}
.chat-head-name{font-family:'Syne',sans-serif;font-size:15px;font-weight:700}
.chat-head-user{font-size:11px;color:var(--muted)}

.chat-msgs{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:8px;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
.msg-row{display:flex;gap:8px;max-width:75%}
.msg-row.mine{flex-direction:row-reverse;margin-left:auto}
.msg-av-wrap{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;margin-top:auto;font-family:'Syne',sans-serif;font-weight:800;color:#fff}
.msg-body{display:flex;flex-direction:column;gap:2px}
.msg-row.mine .msg-body{align-items:flex-end}
.bubble{padding:10px 14px;border-radius:16px;font-size:14px;line-height:1.55;word-break:break-word}
.mine .bubble{background:linear-gradient(135deg,var(--a1),var(--a2));color:#fff;border-radius:16px 4px 16px 16px}
.other .bubble{background:var(--s1);border:1px solid var(--border);border-radius:4px 16px 16px 16px}
.msg-meta{display:flex;align-items:center;gap:4px;padding:0 2px}
.msg-time{font-size:10px;color:var(--muted)}
.msg-tick{font-size:10px;color:rgba(167,139,250,.7)}
.day-sep{text-align:center;font-size:11px;color:var(--muted);margin:6px 0;display:flex;align-items:center;gap:8px}
.day-sep::before,.day-sep::after{content:'';flex:1;height:1px;background:var(--border)}

/* Hoşgeldin */
.welcome-screen{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:32px;gap:12px}
.ws-icon{font-size:52px}
.ws-title{font-family:'Syne',sans-serif;font-size:20px;font-weight:800}
.ws-sub{font-size:13px;color:var(--muted);max-width:260px;line-height:1.6}

/* Input */
.chat-input{padding:12px 16px;background:rgba(6,7,15,.95);border-top:1px solid var(--border);flex-shrink:0}
.input-row{display:flex;align-items:flex-end;gap:8px;background:var(--s1);border:1px solid var(--border);border-radius:16px;padding:10px 12px;transition:border-color .2s}
.input-row:focus-within{border-color:rgba(99,102,241,.4)}
.msg-ta{flex:1;background:none;border:none;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;line-height:1.5;outline:none;resize:none;max-height:100px;min-height:22px}
.msg-ta::placeholder{color:var(--muted)}
.send-btn{width:36px;height:36px;border-radius:10px;border:none;background:linear-gradient(135deg,var(--a1),var(--a2));color:#fff;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s}
.send-btn:hover{opacity:.9;transform:scale(1.05)}
.send-btn:disabled{opacity:.4;cursor:not-allowed;transform:none}

/* Toast */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(12px);background:var(--s1);border:1px solid var(--border);border-radius:10px;padding:10px 18px;font-size:13px;opacity:0;z-index:9999;transition:all .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.ok{border-color:#34d399;color:#34d399}
.toast.err{border-color:#f87171;color:#f87171}

/* ===== MOBİL ===== */
@media(max-width:640px){
  .sidebar{position:fixed;inset:0;z-index:10;width:100%;transform:translateX(0);transition:transform .3s}
  .sidebar.hidden{transform:translateX(-100%)}
  .chat{position:fixed;inset:0;z-index:10;transform:translateX(100%);transition:transform .3s}
  .chat.active{transform:translateX(0)}
  .chat-back-btn{display:flex!important}
}
</style>
</head>
<body>
<div class="app">

  <!-- Sol: Liste -->
  <div class="sidebar" id="sidebar">
    <div class="sb-head">
      <a href="dashboard.html" class="sb-back">←</a>
      <div class="sb-title">💬 Mesajlar</div>
    </div>
    <div class="sb-search">
      <input class="sb-inp" id="searchInp" placeholder="Arkadaş ara..." oninput="filterList(this.value)"/>
    </div>
    <div class="sb-list" id="convList">
      <div class="sb-empty">Yükleniyor...</div>
    </div>
  </div>

  <!-- Sağ: Chat -->
  <div class="chat" id="chat">
    <!-- Header -->
    <div class="chat-head" id="chatHead" style="display:none">
      <button class="chat-back-btn" onclick="backToList()">←</button>
      <div class="chat-head-av" id="chatAv">?</div>
      <div class="chat-head-info">
        <div class="chat-head-name" id="chatName">—</div>
        <div class="chat-head-user" id="chatUser">—</div>
      </div>
    </div>

    <!-- Hoşgeldin -->
    <div class="welcome-screen" id="welcomeScreen">
      <div class="ws-icon">💬</div>
      <div class="ws-title">Mesajlaşmaya Başla</div>
      <div class="ws-sub">Soldan bir arkadaş seçerek sohbet edebilirsin!</div>
    </div>

    <!-- Mesajlar -->
    <div class="chat-msgs" id="chatMsgs" style="display:none"></div>

    <!-- Input -->
    <div class="chat-input" id="chatInput" style="display:none">
      <div class="input-row">
        <textarea class="msg-ta" id="msgTa" placeholder="Mesaj yaz..." rows="1"></textarea>
        <button class="send-btn" id="sendBtn" onclick="sendMsg()">↑</button>
      </div>
    </div>
  </div>

</div>
<div class="toast" id="toast"></div>

<script>
const SB  = 'https://ttuxfivcwdpyvhmybbna.supabase.co';
const KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR0dXhmaXZjd2RweXZobXliYm5hIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxNjcyODAsImV4cCI6MjA4ODc0MzI4MH0.tjpNvX5iJBY4dxk3FdeO6exlGVUYOZYRuCSFNfwA5M0';
const H   = { 'Content-Type':'application/json', 'apikey': KEY, 'Authorization': 'Bearer ' + KEY };

const saved = localStorage.getItem('highly_user');
if (!saved) location.href = 'highly-id.html';
const me = JSON.parse(saved || '{}');

let friends    = [];
let activeUid  = null;
let activeFriend = null;
let pollTimer  = null;

// Textarea auto resize
const msgTa = document.getElementById('msgTa');
msgTa.addEventListener('input', function(){ this.style.height='auto'; this.style.height=Math.min(this.scrollHeight,100)+'px'; });
msgTa.addEventListener('keydown', function(e){ if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg();} });

function toast(msg,type){ const t=document.getElementById('toast'); t.textContent=msg; t.className='toast show '+(type||'ok'); setTimeout(()=>t.classList.remove('show'),3000); }

// Avatar
function avHtml(u, size){
  const s=size||44, bg=u.avatarBg||'#6366f1';
  const base='width:'+s+'px;height:'+s+'px;border-radius:'+Math.round(s*.28)+'px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:Syne,sans-serif;font-weight:800;color:#fff;';
  if(u.avatarEmoji) return '<div style="'+base+'background:transparent;font-size:'+Math.round(s*.55)+'px">'+u.avatarEmoji+'</div>';
  return '<div style="'+base+'background:'+bg+';font-size:'+Math.round(s*.38)+'px">'+(u.name?u.name[0].toUpperCase():'?')+'</div>';
}

function fmtTime(ts){
  const d=new Date(ts), now=new Date(), diff=now-d;
  if(diff<60000) return 'şimdi';
  if(diff<3600000) return Math.floor(diff/60000)+'dk';
  if(now.toDateString()===d.toDateString()) return d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0');
  return d.getDate()+'/'+(d.getMonth()+1);
}

function fmtDay(ts){
  const d=new Date(ts), now=new Date();
  if(now.toDateString()===d.toDateString()) return 'Bugün';
  const y=new Date(now-86400000);
  if(y.toDateString()===d.toDateString()) return 'Dün';
  const M=['Oca','Şub','Mar','Nis','May','Haz','Tem','Ağu','Eyl','Eki','Kas','Ara'];
  return d.getDate()+' '+M[d.getMonth()];
}

function escH(t){ return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>'); }

// Mobil: listeye dön
function backToList(){
  document.getElementById('sidebar').classList.remove('hidden');
  document.getElementById('chat').classList.remove('active');
  if(pollTimer){ clearInterval(pollTimer); pollTimer=null; }
  activeUid=null; activeFriend=null;
}

// Arkadaşları yükle
async function loadFriends(){
  try {
    const r1 = await fetch(SB+'/rest/v1/friendships?and=(status.eq.accepted)&or=(sender_id.eq.'+me.id+',receiver_id.eq.'+me.id+')&select=*',{headers:H});
    const fs  = await r1.json();
    if(!fs||!fs.length){ document.getElementById('convList').innerHTML='<div class="sb-empty">Henüz arkadaşın yok.<br><a href="highly-arkadaslar.html">Arkadaş ekle →</a></div>'; return; }

    const ids = fs.map(f=>f.sender_id==me.id?f.receiver_id:f.sender_id);
    const r2  = await fetch(SB+'/rest/v1/users?id=in.('+ids.join(',')+')&select=id,name,username,avatarEmoji,avatarBg',{headers:H});
    const us  = await r2.json();

    const r3  = await fetch(SB+'/rest/v1/messages?or=(sender_id.eq.'+me.id+',receiver_id.eq.'+me.id+')&order=created_at.desc&limit=200&select=id,sender_id,receiver_id,content,read,created_at',{headers:H});
    const msgs = await r3.json() || [];

    friends = (us||[]).map(u=>{
      const last   = msgs.find(m=>(m.sender_id==me.id&&m.receiver_id==u.id)||(m.sender_id==u.id&&m.receiver_id==me.id));
      const unread = msgs.filter(m=>m.sender_id==u.id&&m.receiver_id==me.id&&!m.read).length;
      return {...u, last, unread};
    }).sort((a,b)=>{
      const at=a.last?new Date(a.last.created_at):0;
      const bt=b.last?new Date(b.last.created_at):0;
      return bt-at;
    });

    renderList(friends);

    // URL'den uid
    const uid = new URLSearchParams(location.search).get('uid');
    if(uid){ const f=friends.find(x=>x.id==uid); if(f) openChat(f); }
  } catch(e){ console.error(e); toast('Yüklenemedi','err'); }
}

function renderList(list){
  const el=document.getElementById('convList');
  if(!list.length){ el.innerHTML='<div class="sb-empty">Arkadaş bulunamadı.</div>'; return; }
  el.innerHTML=list.map(f=>{
    const lastTxt = f.last ? ((f.last.sender_id==me.id?'Sen: ':'') + f.last.content.slice(0,40)+(f.last.content.length>40?'...':'')) : 'Henüz mesaj yok';
    const t       = f.last ? fmtTime(f.last.created_at) : '';
    const isAct   = activeUid==f.id;
    return '<div class="conv'+(isAct?' active':'')+'" onclick=\'openChat('+JSON.stringify(f).replace(/'/g,"\\'")+')\'>'
      + avHtml(f)
      + '<div class="conv-info"><div class="conv-name">'+f.name+'</div><div class="conv-last">'+escH(lastTxt)+'</div></div>'
      + '<div class="conv-meta"><span class="conv-time">'+t+'</span>'+(f.unread>0?'<span class="unread-badge">'+f.unread+'</span>':'')+'</div>'
      + '</div>';
  }).join('');
}

function filterList(q){
  if(!q){renderList(friends);return;}
  renderList(friends.filter(f=>f.name.toLowerCase().includes(q.toLowerCase())||(f.username||'').toLowerCase().includes(q.toLowerCase())));
}

// Chat aç
async function openChat(friend){
  activeUid    = friend.id;
  activeFriend = friend;

  // Mobil geçiş
  document.getElementById('sidebar').classList.add('hidden');
  document.getElementById('chat').classList.add('active');

  // Header
  document.getElementById('chatHead').style.display  = 'flex';
  document.getElementById('chatMsgs').style.display  = 'flex';
  document.getElementById('chatInput').style.display = 'block';
  document.getElementById('welcomeScreen').style.display = 'none';

  const av = document.getElementById('chatAv');
  if(friend.avatarEmoji){ av.textContent=friend.avatarEmoji; av.style.background='transparent'; av.style.fontSize='22px'; }
  else { av.textContent=friend.name[0].toUpperCase(); av.style.background=friend.avatarBg||'#6366f1'; }
  document.getElementById('chatName').textContent = friend.name;
  document.getElementById('chatUser').textContent = '@'+(friend.username||'');

  renderList(friends);
  await loadMsgs();
  msgTa.focus();

  if(pollTimer) clearInterval(pollTimer);
  pollTimer = setInterval(loadMsgs, 3000);
}

// Mesajları yükle
async function loadMsgs(){
  if(!activeUid) return;
  try {
    const r = await fetch(
      SB+'/rest/v1/messages?or=(and(sender_id.eq.'+me.id+',receiver_id.eq.'+activeUid+'),and(sender_id.eq.'+activeUid+',receiver_id.eq.'+me.id+'))&order=created_at.asc&limit=100&select=id,sender_id,receiver_id,content,read,created_at',
      {headers:H}
    );
    const msgs = await r.json() || [];
    renderMsgs(msgs);

    // Okundu işaretle
    const unread = msgs.filter(m=>m.sender_id==activeUid&&!m.read);
    if(unread.length){
      await fetch(SB+'/rest/v1/messages?sender_id=eq.'+activeUid+'&receiver_id=eq.'+me.id+'&read=eq.false',{method:'PATCH',headers:H,body:JSON.stringify({read:true})});
      const f=friends.find(x=>x.id==activeUid); if(f) f.unread=0;
      renderList(friends);
    }
  } catch(e){ console.error(e); }
}

function renderMsgs(msgs){
  const el=document.getElementById('chatMsgs');
  const atBottom = el.scrollHeight-el.scrollTop-el.clientHeight < 80;

  if(!msgs.length){ el.innerHTML='<div style="text-align:center;padding:40px;color:var(--muted);font-size:13px">Henüz mesaj yok. İlk mesajı sen gönder! 👋</div>'; return; }

  let html='', lastDay='';
  msgs.forEach(m=>{
    const isMine = m.sender_id==me.id;
    const day    = fmtDay(m.created_at);
    const time   = new Date(m.created_at).toLocaleTimeString('tr-TR',{hour:'2-digit',minute:'2-digit'});
    if(day!==lastDay){ html+='<div class="day-sep">'+day+'</div>'; lastDay=day; }

    const avStyle = isMine
      ? (me.avatarEmoji
          ? 'background:transparent;font-size:16px'
          : 'background:'+(me.avatarBg||'#6366f1')+';font-size:12px')
      : (activeFriend.avatarEmoji
          ? 'background:transparent;font-size:16px'
          : 'background:'+(activeFriend.avatarBg||'#6366f1')+';font-size:12px');
    const avTxt = isMine
      ? (me.avatarEmoji||me.name[0].toUpperCase())
      : (activeFriend.avatarEmoji||activeFriend.name[0].toUpperCase());

    html += '<div class="msg-row '+(isMine?'mine':'other')+'">'
      + '<div class="msg-av-wrap" style="'+avStyle+'">'+avTxt+'</div>'
      + '<div class="msg-body"><div class="bubble">'+escH(m.content)+'</div>'
      + '<div class="msg-meta"><span class="msg-time">'+time+'</span>'+(isMine?'<span class="msg-tick">'+(m.read?'✓✓':'✓')+'</span>':'')+'</div>'
      + '</div></div>';
  });

  el.innerHTML=html;
  if(atBottom) el.scrollTop=el.scrollHeight;
}

// Mesaj gönder
async function sendMsg(){
  const text=msgTa.value.trim();
  if(!text||!activeUid) return;
  msgTa.value=''; msgTa.style.height='auto';
  document.getElementById('sendBtn').disabled=true;
  try {
    const r    = await fetch(SB+'/rest/v1/messages',{method:'POST',headers:Object.assign({},H,{'Prefer':'return=representation'}),body:JSON.stringify({sender_id:me.id,receiver_id:activeUid,content:text,read:false})});
    const data = await r.json();
    if(data&&data[0]){
      await loadMsgs();
      const f=friends.find(x=>x.id==activeUid); if(f){f.last=data[0];f.unread=0;}
      renderList(friends);
    } else { toast('Gönderilemedi!','err'); }
  } catch(e){ toast('Hata: '+e.message,'err'); }
  document.getElementById('sendBtn').disabled=false;
  msgTa.focus();
}

loadFriends();
</script>
</body>
</html>
