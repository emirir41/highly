<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Highly ID</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #07080f;
      --surface: #0e1020;
      --border: rgba(255,255,255,0.07);
      --accent: #4f6ef7;
      --accent2: #a78bfa;
      --text: #f0f0ff;
      --muted: #6b6e8e;
      --error: #f87171;
      --success: #34d399;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Background effects */
    .bg-orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.18;
      pointer-events: none;
      animation: drift 8s ease-in-out infinite alternate;
    }
    .bg-orb.one { width: 500px; height: 500px; background: #4f6ef7; top: -100px; left: -100px; animation-duration: 9s; }
    .bg-orb.two { width: 400px; height: 400px; background: #a78bfa; bottom: -80px; right: -80px; animation-duration: 11s; animation-delay: -3s; }
    .bg-orb.three { width: 250px; height: 250px; background: #38bdf8; top: 50%; left: 50%; transform: translate(-50%,-50%); animation-duration: 7s; }

    @keyframes drift {
      from { transform: translate(0,0) scale(1); }
      to   { transform: translate(30px, 20px) scale(1.08); }
    }

    /* Grid lines */
    .grid-lines {
      position: fixed; inset: 0; pointer-events: none;
      background-image:
        linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
      background-size: 60px 60px;
    }

    /* Card */
    .card {
      position: relative;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 48px 44px;
      width: 420px;
      backdrop-filter: blur(20px);
      box-shadow: 0 0 0 1px rgba(79,110,247,0.1), 0 40px 80px rgba(0,0,0,0.6);
      animation: slideUp 0.6s cubic-bezier(0.16,1,0.3,1) both;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* Logo */
    .logo-wrap {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 36px;
    }
    .logo-icon {
      width: 38px; height: 38px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; font-weight: 800;
      font-family: 'Syne', sans-serif;
      color: #fff;
      box-shadow: 0 4px 20px rgba(79,110,247,0.4);
    }
    .logo-text {
      font-family: 'Syne', sans-serif;
      font-size: 22px; font-weight: 800;
      letter-spacing: -0.5px;
    }
    .logo-text span { color: var(--accent2); }

    /* Tabs */
    .tabs {
      display: flex; gap: 4px;
      background: rgba(255,255,255,0.04);
      border-radius: 12px; padding: 4px;
      margin-bottom: 32px;
    }
    .tab {
      flex: 1; padding: 10px;
      border: none; background: none;
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px; font-weight: 500;
      border-radius: 9px;
      cursor: pointer;
      transition: all 0.25s;
    }
    .tab.active {
      background: var(--accent);
      color: #fff;
      box-shadow: 0 4px 12px rgba(79,110,247,0.35);
    }

    /* Forms */
    .form { display: none; flex-direction: column; gap: 16px; }
    .form.active { display: flex; animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:none; } }

    .field { display: flex; flex-direction: column; gap: 7px; }
    .field label {
      font-size: 12px; font-weight: 500;
      color: var(--muted);
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }
    .field input {
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 13px 16px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .field input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(79,110,247,0.15);
    }
    .field input::placeholder { color: var(--muted); }

    /* Password strength */
    .strength-bar { display: flex; gap: 4px; margin-top: 6px; }
    .strength-bar span {
      flex: 1; height: 3px; border-radius: 4px;
      background: rgba(255,255,255,0.08);
      transition: background 0.3s;
    }
    .strength-bar span.weak   { background: var(--error); }
    .strength-bar span.medium { background: #fbbf24; }
    .strength-bar span.strong { background: var(--success); }

    /* Checkbox */
    .checkbox-row {
      display: flex; align-items: center; gap: 10px;
      font-size: 13px; color: var(--muted); cursor: pointer;
    }
    .checkbox-row input[type="checkbox"] { accent-color: var(--accent); width: 15px; height: 15px; cursor: pointer; }
    .checkbox-row a { color: var(--accent2); text-decoration: none; }

    /* Button */
    .btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      border-radius: 12px;
      color: #fff;
      font-family: 'Syne', sans-serif;
      font-size: 15px; font-weight: 700;
      letter-spacing: 0.3px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: transform 0.15s, box-shadow 0.15s;
      margin-top: 4px;
    }
    .btn:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(79,110,247,0.4); }
    .btn:active { transform: translateY(0); }
    .btn::after {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(rgba(255,255,255,0.15), transparent);
    }

    /* Divider */
    .divider {
      display: flex; align-items: center; gap: 12px;
      color: var(--muted); font-size: 12px; margin: 4px 0;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1;
      height: 1px; background: var(--border);
    }

    /* Social */
    .social-btn {
      display: flex; align-items: center; justify-content: center; gap: 10px;
      padding: 12px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text); font-size: 14px;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
      font-family: 'DM Sans', sans-serif;
    }
    .social-btn:hover { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.15); }

    /* Toast */
    .toast {
      position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(20px);
      background: #1a1d2e;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 24px;
      font-size: 14px;
      opacity: 0;
      transition: all 0.4s;
      pointer-events: none;
      white-space: nowrap;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      z-index: 100;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .toast.success { border-color: var(--success); color: var(--success); }
    .toast.error   { border-color: var(--error);   color: var(--error); }

    /* Badge */
    .id-badge {
      display: none;
      flex-direction: column; align-items: center;
      text-align: center; gap: 16px;
      animation: fadeIn 0.5s ease;
    }
    .id-badge.show { display: flex; }
    .avatar {
      width: 72px; height: 72px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex; align-items: center; justify-content: center;
      font-family: 'Syne', sans-serif;
      font-size: 28px; font-weight: 800;
      box-shadow: 0 0 0 4px rgba(79,110,247,0.2);
    }
    .id-name { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 700; }
    .id-email { font-size: 13px; color: var(--muted); }
    .id-chip {
      background: rgba(79,110,247,0.12);
      border: 1px solid rgba(79,110,247,0.25);
      color: var(--accent2);
      font-size: 11px; font-weight: 600;
      letter-spacing: 1px;
      padding: 5px 14px; border-radius: 999px;
      text-transform: uppercase;
    }
  </style>
</head>
<body>

<div class="bg-orb one"></div>
<div class="bg-orb two"></div>
<div class="bg-orb three"></div>
<div class="grid-lines"></div>

<div class="card">
  <div class="logo-wrap">
    <div class="logo-icon">H</div>
    <div class="logo-text">Highly <span>ID</span></div>
  </div>

  <!-- Success State -->
  <div class="id-badge" id="badge">
    <div class="avatar" id="avatarLetter">?</div>
    <div>
      <div class="id-name" id="badgeName">Ad Soyad</div>
      <div class="id-email" id="badgeEmail">email@highly.com</div>
    </div>
    <div class="id-chip">✦ Doğrulandı</div>
    <button class="btn" onclick="logout()" style="margin-top:8px;">Çıkış Yap</button>
  </div>

  <!-- Auth Forms -->
  <div id="authArea">
    <div class="tabs">
      <button class="tab active" onclick="switchTab('login')">Giriş Yap</button>
      <button class="tab" onclick="switchTab('register')">Kayıt Ol</button>
    </div>

    <!-- Login Form -->
    <div class="form active" id="loginForm">
      <div class="field">
        <label>E-posta</label>
        <input type="email" id="loginEmail" placeholder="ornek@highly.com" />
      </div>
      <div class="field">
        <label>Şifre</label>
        <input type="password" id="loginPass" placeholder="••••••••" />
      </div>
      <button class="btn" onclick="login()">Giriş Yap →</button>
      <div class="divider">ya da</div>
      <button class="social-btn" onclick="showToast('Google ile giriş yakında!', 'error')">
        <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Google ile devam et
      </button>
    </div>

    <!-- Register Form -->
    <div class="form" id="registerForm">
      <div class="field">
        <label>Ad Soyad</label>
        <input type="text" id="regName" placeholder="Adın ve Soyadın" />
      </div>
      <div class="field">
        <label>E-posta</label>
        <input type="email" id="regEmail" placeholder="ornek@highly.com" />
      </div>
      <div class="field">
        <label>Şifre</label>
        <input type="password" id="regPass" placeholder="••••••••" oninput="checkStrength(this.value)" />
        <div class="strength-bar">
          <span id="s1"></span><span id="s2"></span><span id="s3"></span><span id="s4"></span>
        </div>
      </div>
      <label class="checkbox-row">
        <input type="checkbox" id="terms" />
        <span><a href="#">Kullanım koşullarını</a> kabul ediyorum</span>
      </label>
      <button class="btn" onclick="register()">Hesap Oluştur →</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  // --- In-memory user store ---
  const users = [];

  function switchTab(tab) {
    document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', (i===0 && tab==='login')||(i===1 && tab==='register')));
    document.getElementById('loginForm').classList.toggle('active', tab==='login');
    document.getElementById('registerForm').classList.toggle('active', tab==='register');
  }

  function showToast(msg, type='success') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = `toast ${type} show`;
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  function checkStrength(val) {
    const bars = [document.getElementById('s1'), document.getElementById('s2'), document.getElementById('s3'), document.getElementById('s4')];
    bars.forEach(b => b.className = '');
    let score = 0;
    if (val.length >= 6) score++;
    if (val.length >= 10) score++;
    if (/[A-Z]/.test(val) && /[0-9]/.test(val)) score++;
    if (/[^A-Za-z0-9]/.test(val)) score++;
    const cls = score <= 1 ? 'weak' : score <= 2 ? 'medium' : 'strong';
    for (let i = 0; i < score; i++) bars[i].className = cls;
  }

  function login() {
    const email = document.getElementById('loginEmail').value.trim();
    const pass  = document.getElementById('loginPass').value;
    if (!email || !pass) return showToast('Lütfen tüm alanları doldurun.', 'error');
    const user = users.find(u => u.email === email && u.pass === pass);
    if (!user) return showToast('E-posta veya şifre hatalı.', 'error');
    showBadge(user);
  }

  function register() {
    const name  = document.getElementById('regName').value.trim();
    const email = document.getElementById('regEmail').value.trim();
    const pass  = document.getElementById('regPass').value;
    const terms = document.getElementById('terms').checked;
    if (!name || !email || !pass) return showToast('Lütfen tüm alanları doldurun.', 'error');
    if (!terms) return showToast('Kullanım koşullarını kabul edin.', 'error');
    if (pass.length < 6) return showToast('Şifre en az 6 karakter olmalı.', 'error');
    if (users.find(u => u.email === email)) return showToast('Bu e-posta zaten kayıtlı.', 'error');
    const user = { name, email, pass };
    users.push(user);
    showToast('Hesap oluşturuldu! 🎉', 'success');
    setTimeout(() => showBadge(user), 1000);
  }

  function showBadge(user) {
    document.getElementById('authArea').style.display = 'none';
    document.getElementById('badge').classList.add('show');
    document.getElementById('avatarLetter').textContent = user.name[0].toUpperCase();
    document.getElementById('badgeName').textContent = user.name;
    document.getElementById('badgeEmail').textContent = user.email;
    showToast(`Hoş geldin, ${user.name.split(' ')[0]}! ✦`, 'success');
  }

  function logout() {
    document.getElementById('badge').classList.remove('show');
    document.getElementById('authArea').style.display = 'block';
    document.getElementById('loginEmail').value = '';
    document.getElementById('loginPass').value = '';
    switchTab('login');
    showToast('Çıkış yapıldı.', 'success');
  }
</script>
</body>
</html>
