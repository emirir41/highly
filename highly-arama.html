<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Highly Arama</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#06070f;--s1:#0b0d1c;--s2:#0f1125;--border:rgba(255,255,255,0.07);--a1:#6366f1;--a2:#4f46e5;--text:#e8e8ff;--muted:#4a4d6a}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse at 50% 20%,rgba(99,102,241,0.08) 0%,transparent 50%)}
nav{position:relative;z-index:20;display:flex;align-items:center;justify-content:space-between;
    padding:12px 24px;background:rgba(6,7,15,0.95);border-bottom:1px solid var(--border);backdrop-filter:blur(20px)}
.n-logo{display:flex;align-items:center;gap:9px;text-decoration:none;color:var(--text)}
.n-icon{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,var(--a1),var(--a2));display:flex;align-items:center;justify-content:center;font-size:16px}
.n-title{font-family:'Syne',sans-serif;font-weight:800;font-size:17px}
.n-right{display:flex;align-items:center;gap:10px}
.n-user{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:999px;padding:5px 12px 5px 6px;text-decoration:none;color:var(--text);font-size:13px}
.n-avatar{width:24px;height:24px;border-radius:50%;background:linear-gradient(135deg,var(--a1),var(--a2));display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:11px}
.n-back{color:var(--muted);text-decoration:none;font-size:13px;transition:color .2s}
.n-back:hover{color:var(--text)}

main{position:relative;z-index:2;max-width:760px;margin:0 auto;padding:40px 24px 80px}

/* Search box */
.search-wrap{margin-bottom:28px}
.search-box{display:flex;align-items:center;gap:10px;background:var(--s1);border:1px solid var(--border);border-radius:16px;padding:14px 18px;transition:border-color .2s;margin-bottom:14px}
.search-box:focus-within{border-color:rgba(99,102,241,.4)}
.search-icon{font-size:18px;flex-shrink:0;color:var(--muted)}
.search-input{flex:1;background:none;border:none;color:var(--text);font-family:'DM Sans',sans-serif;font-size:16px;outline:none}
.search-input::placeholder{color:var(--muted)}
.search-btn{padding:9px 22px;background:linear-gradient(135deg,var(--a1),var(--a2));border:none;border-radius:10px;color:#fff;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:opacity .2s;white-space:nowrap}
.search-btn:hover{opacity:.85}
.search-btn:disabled{opacity:.5;cursor:not-allowed}

/* Tabs */
.tabs{display:flex;gap:6px;background:var(--s1);border:1px solid var(--border);border-radius:12px;padding:4px;width:fit-content}
.tab{padding:8px 18px;border:none;background:none;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;border-radius:9px;cursor:pointer;transition:all .2s}
.tab.active{background:linear-gradient(135deg,var(--a1),var(--a2));color:#fff}

/* Results */
.results{margin-top:28px}
.results-meta{font-size:12px;color:var(--muted);margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--border)}

/* Web results */
.web-result{padding:18px 0;border-bottom:1px solid var(--border)}
.web-result:last-child{border-bottom:none}
.wr-source{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.wr-favicon{width:16px;height:16px;border-radius:3px;background:rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0}
.wr-domain{font-size:12px;color:var(--muted)}
.wr-title{font-size:16px;font-weight:600;color:#a78bfa;text-decoration:none;display:block;margin-bottom:5px;line-height:1.4;transition:color .2s}
.wr-title:hover{color:#c4b5fd}
.wr-snippet{font-size:13px;color:var(--muted);line-height:1.6}
.wr-snippet em{color:var(--text);font-style:normal;font-weight:500}

/* News results */
.news-result{display:flex;gap:14px;padding:16px 0;border-bottom:1px solid var(--border)}
.news-result:last-child{border-bottom:none}
.nr-img{width:80px;height:60px;border-radius:10px;background:var(--s2);flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:24px}
.nr-img img{width:100%;height:100%;object-fit:cover}
.nr-info{flex:1;min-width:0}
.nr-title{font-size:14px;font-weight:600;color:#a78bfa;text-decoration:none;display:block;margin-bottom:5px;line-height:1.4;transition:color .2s}
.nr-title:hover{color:#c4b5fd}
.nr-meta{font-size:11px;color:var(--muted);margin-bottom:4px}
.nr-snippet{font-size:12px;color:var(--muted);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}

/* Image results */
.img-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px}
.img-item{aspect-ratio:4/3;border-radius:10px;overflow:hidden;cursor:pointer;background:var(--s2);transition:transform .2s}
.img-item:hover{transform:scale(1.03)}
.img-item img{width:100%;height:100%;object-fit:cover}

/* Empty / Loading */
.state-center{text-align:center;padding:60px 20px;color:var(--muted)}
.state-icon{font-size:48px;margin-bottom:16px;opacity:.5}
.state-title{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;color:var(--text);margin-bottom:8px}
.state-sub{font-size:13px;line-height:1.6}
.loading-dots{display:flex;justify-content:center;gap:6px;margin-top:20px}
.loading-dots span{width:8px;height:8px;border-radius:50%;background:var(--a1);animation:ld .7s ease-in-out infinite}
.loading-dots span:nth-child(2){animation-delay:.15s}
.loading-dots span:nth-child(3){animation-delay:.3s}
@keyframes ld{0%,60%,100%{transform:scale(.6);opacity:.4}30%{transform:scale(1);opacity:1}}

/* Related */
.related{margin-top:28px}
.related-title{font-size:11px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:12px;font-weight:700}
.related-chips{display:flex;flex-wrap:wrap;gap:8px}
.related-chip{padding:7px 14px;background:var(--s1);border:1px solid var(--border);border-radius:999px;font-size:12px;cursor:pointer;transition:all .2s}
.related-chip:hover{border-color:rgba(99,102,241,.3);color:#a78bfa;background:rgba(99,102,241,.06)}
</style>
</head>
<body>
<nav>
  <a href="dashboard.html" class="n-logo">
    <div class="n-icon">🔍</div>
    <span class="n-title">Highly Arama</span>
  </a>
  <div class="n-right">
    <a href="dashboard.html" class="n-user">
      <div class="n-avatar" id="navAvatar">?</div>
      <span id="navName">...</span>
    </a>
    <a href="dashboard.html" class="n-back">← Dashboard</a>
  </div>
</nav>

<main>
  <div class="search-wrap">
    <div class="search-box">
      <span class="search-icon">🔍</span>
      <input class="search-input" id="searchInput" placeholder="Ne aramak istiyorsun?" autofocus/>
      <button class="search-btn" id="searchBtn">Ara</button>
    </div>
    <div class="tabs">
      <button class="tab active" data-type="search">🌐 Web</button>
      <button class="tab" data-type="news">📰 Haberler</button>
      <button class="tab" data-type="images">🖼 Görseller</button>
    </div>
  </div>

  <div id="resultsArea">
    <div class="state-center">
      <div class="state-icon">🔍</div>
      <div class="state-title">Highly Arama</div>
      <div class="state-sub">Web'de, haberlerde ve görsellerde ara.<br>Cloudflare Worker ile güvenli.</div>
    </div>
  </div>
</main>

<script>
const WORKER = 'https://highly-ai-proxy.emrir41.workers.dev/search';

const saved = localStorage.getItem('highly_user');
if (!saved) location.href = 'highly-id.html';
const user = JSON.parse(saved || '{"name":"?"}');
document.getElementById('navAvatar').textContent = user.name[0].toUpperCase();
document.getElementById('navName').textContent   = user.name.split(' ')[0];

let activeType = 'search';

document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    activeType = tab.dataset.type;
    const q = document.getElementById('searchInput').value.trim();
    if (q) doSearch(q, activeType);
  });
});

document.getElementById('searchBtn').addEventListener('click', () => {
  const q = document.getElementById('searchInput').value.trim();
  if (q) doSearch(q, activeType);
});

document.getElementById('searchInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    const q = e.target.value.trim();
    if (q) doSearch(q, activeType);
  }
});

function showLoading() {
  document.getElementById('resultsArea').innerHTML = `
    <div class="state-center">
      <div class="state-icon">🔍</div>
      <div class="state-title">Aranıyor...</div>
      <div class="loading-dots"><span></span><span></span><span></span></div>
    </div>`;
}

async function doSearch(q, type) {
  showLoading();
  document.getElementById('searchBtn').disabled = true;
  try {
    const body = { q };
    if (type === 'images') body.type = 'images';
    if (type === 'news')   body.type = 'news';

    const res  = await fetch(WORKER, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    const data = await res.json();

    if (type === 'search') renderWeb(data, q);
    else if (type === 'news') renderNews(data, q);
    else if (type === 'images') renderImages(data, q);
  } catch(e) {
    document.getElementById('resultsArea').innerHTML = `
      <div class="state-center">
        <div class="state-icon">❌</div>
        <div class="state-title">Hata oluştu</div>
        <div class="state-sub">Worker'a bağlanılamadı.<br>Serper API key'i kontrol et.</div>
      </div>`;
  } finally {
    document.getElementById('searchBtn').disabled = false;
  }
}

function renderWeb(data, q) {
  const results = data.organic || [];
  const related = data.relatedSearches || [];
  if (!results.length) { showEmpty(); return; }

  let html = `<div class="results-meta">~${data.searchInformation?.totalResults || results.length} sonuç</div>`;
  results.forEach(r => {
    const domain = r.link ? new URL(r.link).hostname.replace('www.','') : '';
    html += `
      <div class="web-result">
        <div class="wr-source">
          <div class="wr-favicon">🌐</div>
          <span class="wr-domain">${domain}</span>
        </div>
        <a href="${r.link}" target="_blank" class="wr-title">${r.title || ''}</a>
        <div class="wr-snippet">${r.snippet || ''}</div>
      </div>`;
  });

  if (related.length) {
    html += `<div class="related"><div class="related-title">İlgili aramalar</div><div class="related-chips">`;
    related.slice(0,8).forEach(r => {
      html += `<div class="related-chip" onclick="relSearch('${r.query}')">${r.query}</div>`;
    });
    html += `</div></div>`;
  }

  document.getElementById('resultsArea').innerHTML = `<div class="results">${html}</div>`;
}

function renderNews(data, q) {
  const results = data.news || [];
  if (!results.length) { showEmpty(); return; }

  let html = `<div class="results-meta">${results.length} haber bulundu</div>`;
  results.forEach(r => {
    html += `
      <div class="news-result">
        <div class="nr-img">${r.imageUrl ? `<img src="${r.imageUrl}" alt="" onerror="this.parentElement.textContent='📰'"/>` : '📰'}</div>
        <div class="nr-info">
          <a href="${r.link}" target="_blank" class="nr-title">${r.title || ''}</a>
          <div class="nr-meta">${r.source || ''} · ${r.date || ''}</div>
          <div class="nr-snippet">${r.snippet || ''}</div>
        </div>
      </div>`;
  });

  document.getElementById('resultsArea').innerHTML = `<div class="results">${html}</div>`;
}

function renderImages(data, q) {
  const results = data.images || [];
  if (!results.length) { showEmpty(); return; }

  let html = `<div class="results-meta">${results.length} görsel bulundu</div><div class="img-grid">`;
  results.forEach(r => {
    html += `<div class="img-item"><img src="${r.imageUrl || r.thumbnailUrl}" alt="${r.title||''}" loading="lazy" onerror="this.parentElement.style.display='none'" onclick="window.open('${r.link}','_blank')"/></div>`;
  });
  html += `</div>`;

  document.getElementById('resultsArea').innerHTML = `<div class="results">${html}</div>`;
}

function showEmpty() {
  document.getElementById('resultsArea').innerHTML = `
    <div class="state-center">
      <div class="state-icon">🤷</div>
      <div class="state-title">Sonuç bulunamadı</div>
      <div class="state-sub">Farklı bir arama terimi dene.</div>
    </div>`;
}

function relSearch(q) {
  document.getElementById('searchInput').value = q;
  doSearch(q, activeType);
}
</script>
</body>
</html>
