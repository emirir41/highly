<!DOCTYPE html>
<html lang="tr" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Highly Hava</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

/* ===== TEMALAR ===== */
[data-theme="dark"]{
  --bg:#06070f;--s1:#0b0d1c;--s2:#0f1125;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);
  --text:#e8e8ff;--muted:#4a4d6a;--text2:#9ca3c8;
  --nav-bg:rgba(6,7,15,0.95);--card-bg:#0b0d1c;
  --accent:#38bdf8;--accent2:#818cf8;
  --orb1:rgba(56,189,248,0.07);--orb2:rgba(99,102,241,0.05);
}
[data-theme="glass"]{
  --bg:linear-gradient(135deg,#0a0f2e 0%,#0d1635 50%,#0a1628 100%);
  --s1:rgba(255,255,255,0.06);--s2:rgba(255,255,255,0.1);
  --border:rgba(255,255,255,0.12);--border2:rgba(255,255,255,0.2);
  --text:#f0f4ff;--muted:rgba(255,255,255,0.45);--text2:rgba(255,255,255,0.7);
  --nav-bg:rgba(10,15,46,0.7);--card-bg:rgba(255,255,255,0.05);
  --accent:#7dd3fc;--accent2:#c4b5fd;
  --orb1:rgba(56,189,248,0.12);--orb2:rgba(99,102,241,0.08);
}
[data-theme="light"]{
  --bg:#f0f4f8;--s1:#ffffff;--s2:#e8ecf4;
  --border:rgba(0,0,0,0.08);--border2:rgba(0,0,0,0.14);
  --text:#1a1b2e;--muted:#8892b0;--text2:#5a6480;
  --nav-bg:rgba(240,244,248,0.95);--card-bg:#ffffff;
  --accent:#0284c7;--accent2:#4f46e5;
  --orb1:rgba(56,189,248,0.08);--orb2:rgba(99,102,241,0.05);
}

body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden;transition:background .3s,color .3s}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse at 15% 20%,var(--orb1) 0%,transparent 50%),
             radial-gradient(ellipse at 85% 80%,var(--orb2) 0%,transparent 50%)}

[data-theme="glass"] .card,[data-theme="glass"] .hour-card,[data-theme="glass"] .day-row-wrap{
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  box-shadow:0 8px 32px rgba(0,0,0,0.2),inset 0 1px 0 rgba(255,255,255,0.08);
}
[data-theme="glass"] nav{backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px);}

/* NAV */
nav{position:sticky;top:0;z-index:50;display:flex;align-items:center;justify-content:space-between;padding:12px 28px;background:var(--nav-bg);border-bottom:1px solid var(--border);backdrop-filter:blur(20px);transition:background .3s}
.n-logo{display:flex;align-items:center;gap:10px;text-decoration:none;color:var(--text)}
.n-mark{width:32px;height:32px;border-radius:9px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:14px;color:#fff}
.n-brand{font-family:'Syne',sans-serif;font-weight:800;font-size:18px}
.n-right{display:flex;align-items:center;gap:10px}
.n-user{display:flex;align-items:center;gap:8px;background:var(--s1);border:1px solid var(--border);border-radius:999px;padding:5px 12px 5px 5px;font-size:13px;text-decoration:none;color:var(--text)}
.n-avatar{width:26px;height:26px;border-radius:50%;background:linear-gradient(135deg,#6366f1,#4f46e5);display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:12px;color:#fff}
.n-back{color:var(--muted);text-decoration:none;font-size:13px;padding:7px 14px;border:1px solid var(--border);border-radius:8px;transition:all .2s}
.n-back:hover{color:var(--text);border-color:var(--border2)}

main{max-width:960px;margin:0 auto;padding:32px 20px 80px;position:relative;z-index:2}

/* ARAMA */
.search-wrap{display:flex;gap:10px;margin-bottom:32px}
.search-box{flex:1;display:flex;align-items:center;gap:10px;background:var(--s1);border:1px solid var(--border);border-radius:14px;padding:13px 18px;transition:border-color .2s,box-shadow .2s}
.search-box:focus-within{border-color:rgba(56,189,248,.4);box-shadow:0 0 0 3px rgba(56,189,248,.08)}
.search-box input{flex:1;background:none;border:none;color:var(--text);font-family:'DM Sans',sans-serif;font-size:15px;outline:none}
.search-box input::placeholder{color:var(--muted)}
.loc-btn{padding:13px 16px;background:rgba(56,189,248,.08);border:1px solid rgba(56,189,248,.2);border-radius:12px;color:var(--accent);font-size:18px;cursor:pointer;transition:all .2s;flex-shrink:0}
.loc-btn:hover{background:rgba(56,189,248,.15)}
.search-btn{padding:13px 24px;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:12px;color:#fff;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;transition:all .2s;flex-shrink:0}
.search-btn:hover{opacity:.9;transform:translateY(-1px)}

/* HATA/YÜKLENİYOR */
.err{background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.2);color:#f87171;border-radius:12px;padding:12px 18px;font-size:13px;margin-bottom:20px;display:none}
.loading{text-align:center;padding:60px;display:none}
.spinner{width:36px;height:36px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 14px}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}

/* BOŞ DURUM */
.empty{text-align:center;padding:80px 24px;animation:fadeUp .4s ease}
.empty-icon{font-size:56px;margin-bottom:16px;display:block}
.empty h2{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;margin-bottom:8px}
.empty p{color:var(--muted);font-size:14px}

/* ANA KART */
.card{background:var(--s1);border:1px solid var(--border);border-radius:20px;padding:28px;margin-bottom:16px;animation:fadeUp .4s ease;transition:background .3s,border .3s}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:16px;margin-bottom:24px}
.city-name{font-size:12px;font-weight:700;color:var(--accent);letter-spacing:2px;text-transform:uppercase;margin-bottom:6px;display:flex;align-items:center;gap:6px}
.temp-big{font-family:'Syne',sans-serif;font-size:clamp(60px,10vw,96px);font-weight:800;line-height:1;letter-spacing:-3px}
.temp-unit{font-size:24px;color:var(--muted);vertical-align:super;font-weight:400}
.weather-desc{font-size:16px;color:var(--muted);font-weight:400;margin-top:6px;text-transform:capitalize}
.feels{font-size:12px;color:var(--muted);margin-top:3px}
.weather-icon-big{font-size:80px;line-height:1;filter:drop-shadow(0 4px 16px rgba(56,189,248,.25))}

/* STAT KARTLARI */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;margin-top:20px;padding-top:20px;border-top:1px solid var(--border)}
.stat-card{background:var(--s2);border-radius:12px;padding:14px;text-align:center;transition:background .3s}
.stat-icon{font-size:20px;margin-bottom:6px}
.stat-val{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;margin-bottom:2px}
.stat-lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.stat-sub{font-size:10px;color:var(--muted);margin-top:2px}

/* YOL DURUMU */
.road-badge{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:999px;font-size:12px;font-weight:700;margin-top:12px}
.road-kuru{background:rgba(52,211,153,.12);color:#34d399;border:1px solid rgba(52,211,153,.25)}
.road-islak{background:rgba(56,189,248,.12);color:#38bdf8;border:1px solid rgba(56,189,248,.25)}
.road-buzlu{background:rgba(248,113,113,.12);color:#f87171;border:1px solid rgba(248,113,113,.25)}
.road-karlı{background:rgba(167,139,250,.12);color:#a78bfa;border:1px solid rgba(167,139,250,.25)}

/* UV İNDEKSİ */
.uv-bar{height:8px;border-radius:4px;margin:8px 0 4px;background:linear-gradient(90deg,#34d399,#fbbf24,#f87171);position:relative;overflow:visible}
.uv-dot{width:14px;height:14px;border-radius:50%;background:#fff;border:2px solid var(--s1);position:absolute;top:50%;transform:translateY(-50%);transition:left .4s}

/* BÖLÜM BAŞLIĞI */
.sec-title{font-family:'Syne',sans-serif;font-size:11px;font-weight:700;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin:24px 0 12px;display:flex;align-items:center;gap:8px}
.sec-title::after{content:'';flex:1;height:1px;background:var(--border)}

/* SAATLİK */
.hourly-wrap{display:flex;gap:8px;overflow-x:auto;padding-bottom:6px;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
.hour-card{background:var(--s1);border:1px solid var(--border);border-radius:14px;padding:12px 14px;text-align:center;min-width:70px;flex-shrink:0;transition:all .2s;cursor:pointer}
.hour-card:hover{border-color:rgba(56,189,248,.3);transform:translateY(-2px)}
.hour-card.now{border-color:var(--accent);background:rgba(56,189,248,.06)}
.hour-time{font-size:10px;color:var(--muted);margin-bottom:6px;letter-spacing:.5px}
.hour-icon{font-size:20px;margin-bottom:6px}
.hour-temp{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;margin-bottom:4px}
.hour-rain{font-size:10px;color:#38bdf8;margin-bottom:2px}
.hour-wind{font-size:10px;color:var(--muted)}

/* GÜNLÜK */
.daily-wrap{display:flex;flex-direction:column;gap:8px}
.day-row-wrap{background:var(--s1);border:1px solid var(--border);border-radius:14px;padding:14px 18px;display:grid;grid-template-columns:100px 36px 1fr 1fr 80px;align-items:center;gap:12px;transition:all .2s}
.day-row-wrap:hover{border-color:var(--border2)}
.day-name{font-weight:600;font-size:14px}
.day-icon{font-size:22px;text-align:center}
.day-desc{font-size:12px;color:var(--muted);text-transform:capitalize}
.day-rain-bar{display:flex;align-items:center;gap:6px}
.day-rain-track{flex:1;height:4px;background:var(--s2);border-radius:2px;overflow:hidden}
.day-rain-fill{height:100%;background:#38bdf8;border-radius:2px}
.day-rain-pct{font-size:11px;color:#38bdf8;min-width:28px}
.day-temps{display:flex;gap:8px;align-items:center;font-family:'Syne',sans-serif;font-weight:700;justify-content:flex-end}
.day-high{font-size:15px}
.day-low{font-size:13px;color:var(--muted)}

@media(max-width:600px){
  .day-row-wrap{grid-template-columns:70px 30px 1fr 60px;}.day-rain-bar{display:none}
  .stats-grid{grid-template-columns:repeat(3,1fr)}
  nav{padding:12px 16px}.search-btn{padding:13px 16px;font-size:12px}
}
</style>
</head>
<body>

<nav>
  <a href="dashboard.html" class="n-logo">
    <div class="n-mark">☀️</div>
    <span class="n-brand">Hava Durumu</span>
  </a>
  <div class="n-right">
    <a href="dashboard.html" class="n-user">
      <div class="n-avatar" id="navAvatar">?</div>
      <span id="navName">...</span>
    </a>
    <a href="dashboard.html" class="n-back">← Dashboard</a>
  </div>
</nav>

<main>
  <div class="search-wrap">
    <div class="search-box">
      <span style="font-size:16px">🔍</span>
      <input type="text" id="cityInput" placeholder="Şehir ara... (İstanbul, Ankara, Bursa)"/>
    </div>
    <button class="loc-btn" onclick="getLocation()" title="Konumumu kullan">📍</button>
    <button class="search-btn" onclick="search()">Ara</button>
  </div>
  <div class="err" id="errMsg"></div>
  <div class="loading" id="loadingEl"><div class="spinner"></div><p style="color:var(--muted);font-size:13px">Yükleniyor...</p></div>
  <div id="content">
    <div class="empty">
      <span class="empty-icon">🌍</span>
      <h2>Hava Durumunu Öğren</h2>
      <p>Bir şehir adı gir veya konumunu kullan.</p>
    </div>
  </div>
</main>

<script>
const API_KEY = 'bd5e378503939ddaee76f12ad7a97608';

// Tema
const theme = localStorage.getItem('highly_theme') || 'dark';
document.documentElement.setAttribute('data-theme', theme);

// Kullanıcı
const saved = localStorage.getItem('highly_user');
if (!saved) location.href = 'highly-id.html';
const user = JSON.parse(saved || '{}');
const navAv = document.getElementById('navAvatar');
if (user.avatarEmoji) { navAv.textContent = user.avatarEmoji; navAv.style.background = 'transparent'; navAv.style.fontSize = '16px'; }
else { navAv.textContent = user.name[0].toUpperCase(); if (user.avatarBg) navAv.style.background = user.avatarBg; }
document.getElementById('navName').textContent = user.name.split(' ')[0];

const cityInput = document.getElementById('cityInput');
const content   = document.getElementById('content');
const loadingEl = document.getElementById('loadingEl');
const errMsg    = document.getElementById('errMsg');

cityInput.addEventListener('keydown', e => { if (e.key === 'Enter') search(); });

function showErr(msg) { errMsg.textContent = msg; errMsg.style.display = 'block'; setTimeout(() => errMsg.style.display = 'none', 4000); }
function showLoad(v)  { loadingEl.style.display = v ? 'block' : 'none'; if (v) content.innerHTML = ''; }

async function search() {
  const city = cityInput.value.trim();
  if (!city) return showErr('Lütfen bir şehir adı girin.');
  await fetchWeather('q=' + encodeURIComponent(city));
}

async function getLocation() {
  if (!navigator.geolocation) return showErr('Konum desteklenmiyor.');
  navigator.geolocation.getCurrentPosition(
    pos => fetchWeather('lat=' + pos.coords.latitude + '&lon=' + pos.coords.longitude),
    () => showErr('Konum alınamadı.')
  );
}

async function fetchWeather(query) {
  showLoad(true);
  try {
    const [wRes, fRes, uvRes] = await Promise.all([
      fetch('https://api.openweathermap.org/data/2.5/weather?' + query + '&appid=' + API_KEY + '&units=metric&lang=tr'),
      fetch('https://api.openweathermap.org/data/2.5/forecast?' + query + '&appid=' + API_KEY + '&units=metric&lang=tr&cnt=48'),
      fetch('https://api.openweathermap.org/data/2.5/weather?' + query + '&appid=' + API_KEY + '&units=metric&lang=tr')
    ]);
    const w = await wRes.json();
    const f = await fRes.json();
    if (w.cod !== 200) { showLoad(false); return showErr('Şehir bulunamadı.'); }
    showLoad(false);
    renderWeather(w, f);
  } catch(e) { showLoad(false); showErr('Bağlantı hatası.'); }
}

function wIcon(id, icon) {
  var n = icon && icon.includes('n');
  if (id >= 200 && id < 300) return '⛈️';
  if (id >= 300 && id < 400) return '🌦️';
  if (id >= 500 && id < 600) return id >= 511 ? '🌨️' : '🌧️';
  if (id >= 600 && id < 700) return id === 611 || id === 612 ? '🌨️' : '❄️';
  if (id >= 700 && id < 800) return '🌫️';
  if (id === 800) return n ? '🌙' : '☀️';
  if (id === 801) return n ? '🌙' : '🌤️';
  if (id <= 804) return '☁️';
  return '🌡️';
}

function uvLevel(uv) {
  if (uv <= 2) return { label: 'Düşük', color: '#34d399', pct: 10 };
  if (uv <= 5) return { label: 'Orta', color: '#fbbf24', pct: 35 };
  if (uv <= 7) return { label: 'Yüksek', color: '#f97316', pct: 60 };
  if (uv <= 10) return { label: 'Çok Yüksek', color: '#f87171', pct: 82 };
  return { label: 'Aşırı', color: '#dc2626', pct: 100 };
}

function roadCondition(temp, rain, snow) {
  if (snow > 0 || temp < -2) return { label: '❄️ Karlı / Buzlu Yol', cls: 'road-buzlu' };
  if (temp < 2) return { label: '🧊 Buzlanma Riski', cls: 'road-buzlu' };
  if (rain > 0.5) return { label: '💧 Islak Yol', cls: 'road-islak' };
  if (rain > 0) return { label: '🌦 Hafif Islak', cls: 'road-islak' };
  return { label: '✅ Kuru Yol', cls: 'road-kuru' };
}

function renderWeather(w, f) {
  const temp    = Math.round(w.main.temp);
  const feels   = Math.round(w.main.feels_like);
  const icon    = wIcon(w.weather[0].id, w.weather[0].icon);
  const sunrise = new Date(w.sys.sunrise * 1000).toLocaleTimeString('tr-TR', { hour: '2-digit', minute: '2-digit' });
  const sunset  = new Date(w.sys.sunset  * 1000).toLocaleTimeString('tr-TR', { hour: '2-digit', minute: '2-digit' });
  const rain    = w.rain ? (w.rain['1h'] || 0) : 0;
  const snow    = w.snow ? (w.snow['1h'] || 0) : 0;
  const uv      = Math.round(w.uvi || 0);
  const uvInfo  = uvLevel(uv);
  const road    = roadCondition(w.main.temp, rain, snow);
  const vis     = (w.visibility / 1000).toFixed(1);
  const pressure= w.main.pressure;
  const windKmh = Math.round(w.wind.speed * 3.6);
  const windDir = ['K','KD','D','GD','G','GB','B','KB'][Math.round(((w.wind.deg || 0) % 360) / 45) % 8];

  // Saatlik (her saat)
  const hourlyHTML = f.list.map((h, i) => {
    const t    = new Date(h.dt * 1000).toLocaleTimeString('tr-TR', { hour: '2-digit', minute: '2-digit', timeZone: 'Europe/Istanbul' });
    const ic   = wIcon(h.weather[0].id, h.weather[0].icon);
    const rainP= Math.round((h.pop || 0) * 100);
    const wnd  = Math.round(h.wind.speed * 3.6);
    return '<div class="hour-card' + (i === 0 ? ' now' : '') + '">' +
      '<div class="hour-time">' + (i === 0 ? 'Şimdi' : t) + '</div>' +
      '<div class="hour-icon">' + ic + '</div>' +
      '<div class="hour-temp">' + Math.round(h.main.temp) + '°</div>' +
      (rainP > 0 ? '<div class="hour-rain">💧 ' + rainP + '%</div>' : '<div class="hour-rain" style="opacity:0">-</div>') +
      '<div class="hour-wind">' + wnd + ' km/s</div>' +
      '</div>';
  }).join('');

  // Günlük (5 gün)
  const days = {};
  f.list.forEach(h => {
    const d = new Date(h.dt * 1000).toLocaleDateString('tr-TR', { weekday: 'long', timeZone: 'Europe/Istanbul' });
    if (!days[d]) days[d] = { temps: [], icons: [], ids: [], descs: [], pops: [], rains: [] };
    days[d].temps.push(h.main.temp);
    days[d].icons.push(wIcon(h.weather[0].id, h.weather[0].icon));
    days[d].ids.push(h.weather[0].id);
    days[d].descs.push(h.weather[0].description);
    days[d].pops.push(h.pop || 0);
    days[d].rains.push(h.rain ? (h.rain['3h'] || 0) : 0);
  });

  const dailyHTML = Object.entries(days).slice(1, 6).map(([day, v]) => {
    const high  = Math.round(Math.max(...v.temps));
    const low   = Math.round(Math.min(...v.temps));
    const ic    = v.icons[Math.floor(v.icons.length / 2)];
    const desc  = v.descs[Math.floor(v.descs.length / 2)];
    const rainP = Math.round(Math.max(...v.pops) * 100);
    const rainMm= v.rains.reduce((a, b) => a + b, 0).toFixed(1);
    return '<div class="day-row-wrap">' +
      '<div class="day-name">' + day.charAt(0).toUpperCase() + day.slice(1) + '</div>' +
      '<div class="day-icon">' + ic + '</div>' +
      '<div class="day-desc">' + desc + (parseFloat(rainMm) > 0 ? '<br><span style="color:#38bdf8;font-size:11px">🌧 ' + rainMm + ' mm</span>' : '') + '</div>' +
      '<div class="day-rain-bar"><div class="day-rain-track"><div class="day-rain-fill" style="width:' + rainP + '%"></div></div><span class="day-rain-pct">' + rainP + '%</span></div>' +
      '<div class="day-temps"><span class="day-high">' + high + '°</span><span class="day-low">' + low + '°</span></div>' +
      '</div>';
  }).join('');

  content.innerHTML =
    // Ana kart
    '<div class="card">' +
      '<div class="card-top">' +
        '<div>' +
          '<div class="city-name">📍 ' + w.name + ', ' + w.sys.country + '</div>' +
          '<div class="temp-big">' + temp + '<span class="temp-unit">°C</span></div>' +
          '<div class="weather-desc">' + w.weather[0].description + '</div>' +
          '<div class="feels">Hissedilen: ' + feels + '°C</div>' +
          '<div class="road-badge ' + road.cls + '">' + road.label + '</div>' +
        '</div>' +
        '<div class="weather-icon-big">' + icon + '</div>' +
      '</div>' +

      // İstatistikler
      '<div class="stats-grid">' +
        '<div class="stat-card"><div class="stat-icon">💧</div><div class="stat-val">' + w.main.humidity + '%</div><div class="stat-lbl">Nem</div></div>' +
        '<div class="stat-card"><div class="stat-icon">💨</div><div class="stat-val">' + windKmh + ' km/s</div><div class="stat-lbl">Rüzgar</div><div class="stat-sub">' + windDir + '</div></div>' +
        '<div class="stat-card"><div class="stat-icon">🌡</div><div class="stat-val">' + pressure + '</div><div class="stat-lbl">Basınç (hPa)</div></div>' +
        '<div class="stat-card"><div class="stat-icon">👁</div><div class="stat-val">' + vis + ' km</div><div class="stat-lbl">Görüş</div></div>' +
        '<div class="stat-card"><div class="stat-icon">🌧</div><div class="stat-val">' + rain.toFixed(1) + ' mm</div><div class="stat-lbl">Yağış (1s)</div></div>' +
        '<div class="stat-card"><div class="stat-icon">🌅</div><div class="stat-val">' + sunrise + '</div><div class="stat-lbl">Gün Doğumu</div></div>' +
        '<div class="stat-card"><div class="stat-icon">🌇</div><div class="stat-val">' + sunset + '</div><div class="stat-lbl">Gün Batımı</div></div>' +
        '<div class="stat-card"><div class="stat-icon">☀️</div><div class="stat-val">' + uv + '</div><div class="stat-lbl">UV İndeksi</div><div class="stat-sub" style="color:' + uvInfo.color + '">' + uvInfo.label + '</div>' +
          '<div class="uv-bar"><div class="uv-dot" style="left:calc(' + uvInfo.pct + '% - 7px)"></div></div>' +
        '</div>' +
      '</div>' +
    '</div>' +

    // Saatlik
    '<div class="sec-title">Saatlik Tahmin</div>' +
    '<div class="hourly-wrap">' + hourlyHTML + '</div>' +

    // Günlük
    '<div class="sec-title">5 Günlük Tahmin</div>' +
    '<div class="daily-wrap">' + dailyHTML + '</div>';
}

getLocation();
</script>
</body>
</html>
