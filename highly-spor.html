<html lang="tr">
<head>
<meta charset="UTF-8"/>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#06070f;--s1:#0b0d1c;--s2:#0f1125;--border:rgba(255,255,255,0.07);--a1:#34d399;--a2:#059669;--text:#e8e8ff;--muted:#4a4d6a}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse at 20% 20%,rgba(52,211,153,0.07) 0%,transparent 50%),
             radial-gradient(ellipse at 80% 80%,rgba(5,150,105,0.04) 0%,transparent 50%)}
nav{position:relative;z-index:20;display:flex;align-items:center;justify-content:space-between;
    padding:12px 24px;background:rgba(6,7,15,0.95);border-bottom:1px solid var(--border);backdrop-filter:blur(20px)}
.n-logo{display:flex;align-items:center;gap:9px;text-decoration:none;color:var(--text)}
.n-icon{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,var(--a1),var(--a2));display:flex;align-items:center;justify-content:center;font-size:16px}
.n-title{font-family:'Syne',sans-serif;font-weight:800;font-size:17px}
.n-right{display:flex;align-items:center;gap:10px}
.n-user{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:999px;padding:5px 12px 5px 6px;text-decoration:none;color:var(--text);font-size:13px}
.n-avatar{width:24px;height:24px;border-radius:50%;background:linear-gradient(135deg,var(--a1),var(--a2));display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:11px;color:#000}
.n-back{color:var(--muted);text-decoration:none;font-size:13px;transition:color .2s}
.n-back:hover{color:var(--text)}

main{position:relative;z-index:2;max-width:900px;margin:0 auto;padding:36px 24px 80px}

.page-header{margin-bottom:28px}
.page-title{font-family:'Syne',sans-serif;font-size:28px;font-weight:800;letter-spacing:-.5px;margin-bottom:6px}
.page-sub{font-size:13px;color:var(--muted)}

/* League tabs */
.league-tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:28px}
.ltab{display:flex;align-items:center;gap:7px;padding:9px 16px;background:var(--s1);border:1px solid var(--border);border-radius:999px;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;font-family:'DM Sans',sans-serif;color:var(--muted)}
.ltab:hover{border-color:rgba(255,255,255,.14);color:var(--text)}
.ltab.active{background:linear-gradient(135deg,var(--a1),var(--a2));border-color:transparent;color:#000;font-weight:700}

/* Content area */
.league-content{display:none}
.league-content.active{display:block}

/* Section title */
.sec-title{font-family:'Syne',sans-serif;font-size:12px;font-weight:700;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:14px;margin-top:28px;display:flex;align-items:center;gap:8px}
.sec-title::after{content:'';flex:1;height:1px;background:var(--border)}
.sec-title:first-child{margin-top:0}

/* Match card */
.matches{display:flex;flex-direction:column;gap:10px;margin-bottom:8px}
.match-card{background:var(--s1);border:1px solid var(--border);border-radius:14px;padding:16px 20px;transition:all .2s}
.match-card:hover{border-color:rgba(52,211,153,.2)}
.match-meta{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.match-league{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;font-weight:700}
.match-time{font-size:11px;color:var(--muted)}
.match-status{font-size:10px;padding:3px 8px;border-radius:999px;font-weight:700}
.status-live{background:rgba(248,113,113,.15);color:#f87171;border:1px solid rgba(248,113,113,.3)}
.status-done{background:rgba(52,211,153,.1);color:#34d399;border:1px solid rgba(52,211,153,.2)}
.status-soon{background:rgba(245,158,11,.1);color:#f59e0b;border:1px solid rgba(245,158,11,.2)}
.match-teams{display:flex;align-items:center;justify-content:space-between;gap:12px}
.team{display:flex;flex-direction:column;align-items:center;gap:6px;flex:1}
.team-home{align-items:flex-start}
.team-away{align-items:flex-end}
.team-name{font-family:'Syne',sans-serif;font-size:14px;font-weight:700}
.team-flag{font-size:24px}
.score-wrap{display:flex;flex-direction:column;align-items:center;gap:4px;flex-shrink:0}
.score{font-family:'Syne',sans-serif;font-size:28px;font-weight:800;letter-spacing:2px}
.score-min{font-size:10px;color:var(--muted)}

/* Standings table */
.standings{background:var(--s1);border:1px solid var(--border);border-radius:14px;overflow:hidden}
.st-header{display:grid;grid-template-columns:40px 1fr 40px 40px 40px 40px 50px;padding:10px 16px;border-bottom:1px solid var(--border);font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;font-weight:700;gap:4px}
.st-row{display:grid;grid-template-columns:40px 1fr 40px 40px 40px 40px 50px;padding:11px 16px;border-bottom:1px solid var(--border);font-size:13px;gap:4px;align-items:center;transition:background .15s}
.st-row:last-child{border-bottom:none}
.st-row:hover{background:rgba(255,255,255,.03)}
.st-pos{font-family:'Syne',sans-serif;font-weight:800;font-size:14px;color:var(--muted)}
.st-pos.top3{color:var(--a1)}
.st-pos.rel{color:#f87171}
.st-team{display:flex;align-items:center;gap:8px;font-weight:600}
.st-pts{font-family:'Syne',sans-serif;font-weight:800;color:var(--text)}
.st-num{color:var(--muted);text-align:center}

/* Driver standings (F1) */
.driver-row{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid var(--border);transition:background .15s}
.driver-row:last-child{border-bottom:none}
.driver-row:hover{background:rgba(255,255,255,.03)}
.dr-pos{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;color:var(--muted);min-width:30px}
.dr-pos.p1{color:#f59e0b}
.dr-pos.p2{color:#94a3b8}
.dr-pos.p3{color:#b45309}
.dr-info{flex:1}
.dr-name{font-weight:700;font-size:14px}
.dr-team{font-size:11px;color:var(--muted)}
.dr-pts{font-family:'Syne',sans-serif;font-weight:800;font-size:16px;color:var(--a1)}
.dr-flag{font-size:18px}

/* Tennis */
.tennis-match{background:var(--s1);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:10px}
.tennis-round{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px;font-weight:700}
.tennis-players{display:flex;flex-direction:column;gap:8px}
.tennis-player{display:flex;align-items:center;justify-content:space-between}
.tp-name{font-weight:600;font-size:14px;display:flex;align-items:center;gap:8px}
.tp-name.winner{color:var(--a1)}
.tp-sets{display:flex;gap:6px}
.tp-set{width:28px;height:28px;border-radius:6px;background:rgba(255,255,255,.05);display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-size:13px;font-weight:700}
.tp-set.won{background:rgba(52,211,153,.15);color:var(--a1)}

.no-data{text-align:center;padding:40px 20px;color:var(--muted);font-size:13px}
.no-data-icon{font-size:40px;margin-bottom:12px;opacity:.4}
</style>

function matchCard(m) {
  const statusClass = m.status === 'live' ? 'status-live' : m.status === 'done' ? 'status-done' : 'status-soon';
  const statusText  = m.status === 'live' ? '🔴 CANLI' : m.status === 'done' ? '✓ Bitti' : '🕐 Yakında';
  const score = m.scoreH !== null ? `<div class="score">${m.scoreH} — ${m.scoreA}</div>` : `<div class="score" style="font-size:18px;color:var(--muted)">vs</div>`;
  return `
    <div class="match-card">
      <div class="match-meta">
        <span class="match-league">${m.league}</span>
        <span class="match-status ${statusClass}">${statusText}</span>
        <span class="match-time">${m.time}</span>
      </div>
      <div class="match-teams">
        <div class="team team-home"><div class="team-name">${m.home}</div></div>
        <div class="score-wrap">${score}<div class="score-min">${m.status==='live'?'45+2\'' : ''}</div></div>
        <div class="team team-away"><div class="team-name">${m.away}</div></div>
      </div>
    </div>`;
}

function standingsTable(data, type='football') {
  const header = `<div class="st-header"><div>#</div><div>Takım</div><div>O</div><div>G</div><div>B</div><div>M</div><div>Puan</div></div>`;
  const rows = data.map(t => {
    const posClass = t.pos <= 3 ? 'top3' : t.rel ? 'rel' : '';
    return `<div class="st-row">
      <div class="st-pos ${posClass}">${t.pos}</div>
      <div class="st-team">${t.flag} ${t.team}</div>
      <div class="st-num">${t.g}</div>
      <div class="st-num">${t.w}</div>
      <div class="st-num">${t.d}</div>
      <div class="st-num">${t.l}</div>
      <div class="st-pts">${t.pts}</div>
    </div>`;
  }).join('');
  return header + rows;
}

  }
});

// Tennis
const tennisEl = document.getElementById('matches-tenis');
tennisEl.innerHTML = TENNIS_MATCHES.map(m => `
  <div class="tennis-match">
    <div class="tennis-round">🎾 ${m.round}</div>
    <div class="tennis-players">
      <div class="tennis-player">
        <div class="tp-name ${m.winner===1?'winner':''}">${m.winner===1?'🏆 ':''} ${m.p1}</div>
        <div class="tp-sets">${m.sets1.map((s,i)=>`<div class="tp-set ${s>m.sets2[i]?'won':''}">${s}</div>`).join('')}</div>
      </div>
      <div class="tennis-player">
        <div class="tp-name ${m.winner===2?'winner':''}">${m.winner===2?'🏆 ':''} ${m.p2}</div>
        <div class="tp-sets">${m.sets2.map((s,i)=>`<div class="tp-set ${s>m.sets1[i]?'won':''}">${s}</div>`).join('')}</div>
      </div>
    </div>
  </div>`).join('');
