<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Highly Gene 3.0</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#06070f;--s1:#0b0d1c;--s2:#0f1125;--border:rgba(255,255,255,0.07);--a1:#6366f1;--a2:#4f46e5;--text:#e8e8ff;--muted:#4a4d6a}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse at 20% 20%,rgba(99,102,241,0.08) 0%,transparent 50%),
             radial-gradient(ellipse at 80% 80%,rgba(167,139,250,0.06) 0%,transparent 50%)}
nav{position:relative;z-index:20;display:flex;align-items:center;justify-content:space-between;padding:12px 24px;background:rgba(6,7,15,0.95);border-bottom:1px solid var(--border);backdrop-filter:blur(20px);flex-shrink:0}
.n-logo{display:flex;align-items:center;gap:9px;text-decoration:none;color:var(--text)}
.n-icon{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,var(--a1),var(--a2));display:flex;align-items:center;justify-content:center;font-size:16px}
.n-title{font-family:'Syne',sans-serif;font-weight:800;font-size:17px}
.n-badge{background:linear-gradient(135deg,#f59e0b,#ef4444);color:#fff;font-size:10px;font-weight:800;padding:2px 8px;border-radius:999px;font-family:'Syne',sans-serif}
.n-right{display:flex;align-items:center;gap:10px}
.n-user{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:999px;padding:5px 12px 5px 6px;text-decoration:none;color:var(--text);font-size:13px}
.n-avatar{width:24px;height:24px;border-radius:50%;background:linear-gradient(135deg,var(--a1),var(--a2));display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:11px}
.n-back{color:var(--muted);text-decoration:none;font-size:13px;transition:color .2s}
.n-back:hover{color:var(--text)}
.n-clear{background:none;border:1px solid var(--border);border-radius:8px;color:var(--muted);font-size:12px;padding:5px 12px;cursor:pointer;transition:all .2s;font-family:'DM Sans',sans-serif}
.n-clear:hover{border-color:rgba(248,113,113,.4);color:#f87171}
.chat-wrap{flex:1;overflow-y:auto;padding:24px;display:flex;flex-direction:column;gap:16px;position:relative;z-index:2;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
.welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;text-align:center;padding:40px;gap:16px}
.welcome-icon{width:80px;height:80px;border-radius:22px;background:linear-gradient(135deg,#f59e0b,#ef4444,#6366f1);display:flex;align-items:center;justify-content:center;font-size:40px;box-shadow:0 8px 32px rgba(245,158,11,.3);animation:pulse 3s ease-in-out infinite}
@keyframes pulse{0%,100%{box-shadow:0 8px 32px rgba(245,158,11,.3)}50%{box-shadow:0 8px 48px rgba(245,158,11,.5)}}
.welcome h2{font-family:'Syne',sans-serif;font-size:26px;font-weight:800}
.welcome p{color:var(--muted);font-size:14px;max-width:420px;line-height:1.7}
.welcome-badge{display:flex;align-items:center;gap:8px;background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.2);border-radius:999px;padding:7px 16px;font-size:12px;color:#f59e0b;margin-top:4px}
.suggestions{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:8px;max-width:500px}
.sug-btn{padding:8px 14px;background:var(--s1);border:1px solid var(--border);border-radius:999px;color:var(--text);font-size:12px;cursor:pointer;transition:all .2s;font-family:'DM Sans',sans-serif}
.sug-btn:hover{background:rgba(99,102,241,.1);border-color:rgba(99,102,241,.3);color:#a78bfa}
.msg{display:flex;gap:12px;max-width:780px;animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.msg.user{flex-direction:row-reverse;margin-left:auto}
.msg-avatar{width:32px;height:32px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;font-family:'Syne',sans-serif}
.msg.user .msg-avatar{background:linear-gradient(135deg,var(--a1),var(--a2))}
.msg.ai .msg-avatar{background:linear-gradient(135deg,#92400e,#b45309);border:1px solid rgba(245,158,11,.3);font-size:18px}
.msg-bubble{padding:14px 18px;border-radius:16px;font-size:14px;line-height:1.7;max-width:100%}
.msg.user .msg-bubble{background:linear-gradient(135deg,var(--a1),var(--a2));color:#fff;border-radius:16px 4px 16px 16px}
.msg.ai .msg-bubble{background:var(--s1);border:1px solid var(--border);border-radius:4px 16px 16px 16px}
.typing{display:flex;align-items:center;gap:5px;padding:6px 0}
.typing span{width:7px;height:7px;border-radius:50%;background:var(--muted);animation:t .9s ease-in-out infinite}
.typing span:nth-child(2){animation-delay:.15s}
.typing span:nth-child(3){animation-delay:.3s}
@keyframes t{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-6px);opacity:1}}
.input-wrap{position:relative;z-index:10;padding:16px 24px;background:rgba(6,7,15,0.95);border-top:1px solid var(--border);flex-shrink:0}
.input-box{display:flex;align-items:flex-end;gap:10px;background:var(--s1);border:1px solid var(--border);border-radius:16px;padding:12px 14px;transition:border-color .2s}
.input-box:focus-within{border-color:rgba(245,158,11,.4)}
.msg-input{flex:1;background:none;border:none;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;line-height:1.6;outline:none;resize:none;max-height:120px;min-height:24px}
.msg-input::placeholder{color:var(--muted)}
.send-btn{width:38px;height:38px;border-radius:10px;border:none;background:linear-gradient(135deg,#f59e0b,#ef4444);color:#fff;font-size:16px;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.send-btn:hover{opacity:.9;transform:scale(1.05)}
.send-btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
.input-hint{text-align:center;font-size:11px;color:var(--muted);margin-top:8px}
</style>
</head>
<body>
<nav>
  <a href="dashboard.html" class="n-logo">
    <div class="n-icon">🔥</div>
    <span class="n-title">Highly AI</span>
    <span class="n-badge">Gene 3.0</span>
  </a>
  <div class="n-right">
    <button class="n-clear" id="clearBtn">🗑 Temizle</button>
    <a href="highly-profil.html" class="n-user">
      <div class="n-avatar" id="navAvatar">?</div>
      <span id="navName">...</span>
    </a>
    <a href="dashboard.html" class="n-back">← Dashboard</a>
  </div>
</nav>

<div class="chat-wrap" id="chatWrap">
  <div class="welcome" id="welcome">
    <div class="welcome-icon">🔥</div>
    <h2>Highly Gene 3.0</h2>
    <p>Seninle gerçekten konuşabilen, anlayan ve hisseden bir asistan. Her konuda buradayım!</p>
    <div class="welcome-badge">🔥 Gene 3.0 · Zengin Sohbet · Duygu Algılama</div>
    <div class="suggestions">
      <button class="sug-btn" onclick="suggest(this)">😊 Nasılsın?</button>
      <button class="sug-btn" onclick="suggest(this)">😄 Şaka yap</button>
      <button class="sug-btn" onclick="suggest(this)">💡 Motivasyon sözü ver</button>
      <button class="sug-btn" onclick="suggest(this)">🤔 İlginç bir şey söyle</button>
      <button class="sug-btn" onclick="suggest(this)">🌤 Hava durumu</button>
      <button class="sug-btn" onclick="suggest(this)">💵 Dolar kaç TL?</button>
    </div>
  </div>
</div>

<div class="input-wrap">
  <div class="input-box">
    <textarea class="msg-input" id="msgInput" placeholder="Bir şey söyle... dertleş, sor, anlat 😊" rows="1"></textarea>
    <button class="send-btn" id="sendBtn">↑</button>
  </div>
  <div class="input-hint">Gene 3.0 hata yapabilir. Sonuçları kontrol edin.</div>
</div>

<script>

function suggest(btn) {
  msgInput.value = btn.textContent.replace(/^[^\w\s]/,'').trim();
  send();
}

// ============================================================
// HIGHLY GENE 3.0 — ANA SCRIPT
// ============================================================

const saved = localStorage.getItem('highly_user');
if (!saved) { location.href = 'highly-id.html'; }
const user = JSON.parse(saved || '{"name":"?"}');
const firstName = user.name.split(' ')[0];

// Avatar
const navAv = document.getElementById('navAvatar');
if (user.avatarEmoji) { navAv.textContent = user.avatarEmoji; navAv.style.background = 'transparent'; navAv.style.fontSize = '18px'; }
else { navAv.textContent = user.name[0].toUpperCase(); if (user.avatarBg) navAv.style.background = user.avatarBg; }
document.getElementById('navName').textContent = firstName;

const chatWrap = document.getElementById('chatWrap');
const msgInput = document.getElementById('msgInput');
const sendBtn  = document.getElementById('sendBtn');
const welcome  = document.getElementById('welcome');

// Hafıza
let mesajGecmisi = [];     // son 10 mesaj
let sonIntent    = null;   // son intent
let sonKonu      = null;   // son konuşulan konu
let recentReplies = [];    // tekrar etmemek için

// ============================================================
// UI
// ============================================================
msgInput.addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 120) + 'px';
});
msgInput.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
});
sendBtn.addEventListener('click', function() { send(); });
document.getElementById('clearBtn').addEventListener('click', function() {
  mesajGecmisi = []; sonIntent = null; sonKonu = null; recentReplies = [];
  chatWrap.innerHTML = ''; chatWrap.appendChild(welcome); welcome.style.display = 'flex';
});

function rmTyping() { var t = document.getElementById('typing'); if (t) t.remove(); }
function addTyping() {
  welcome.style.display = 'none'; rmTyping();
  var d = document.createElement('div'); d.className = 'msg ai'; d.id = 'typing';
  d.innerHTML = '<div class="msg-avatar">🤖</div><div class="msg-bubble"><div class="typing"><span></span><span></span><span></span></div></div>';
  chatWrap.appendChild(d); chatWrap.scrollTop = chatWrap.scrollHeight;
}
function addMsg(role, text) {
  welcome.style.display = 'none';
  var d = document.createElement('div'); d.className = 'msg ' + role;
  var av = role === 'user' ? (user.avatarEmoji || user.name[0].toUpperCase()) : '🤖';
  d.innerHTML = '<div class="msg-avatar">' + av + '</div><div class="msg-bubble">' + (role === 'ai' ? fmt(text) : esc(text)) + '</div>';
  chatWrap.appendChild(d); chatWrap.scrollTop = chatWrap.scrollHeight;
  // Hafızaya ekle
  mesajGecmisi.push({ role: role, text: text });
  if (mesajGecmisi.length > 20) mesajGecmisi.shift();
}
function fmt(t) {
  return esc(t)
    .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
    .replace(/\*([^*]+)\*/g, '<em>$1</em>')
    .replace(/\n/g, '<br>');
}
function esc(t) { return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// Tekrarsız seç
function pick(arr) {
  if (!arr || !arr.length) return '😊';
  var filtered = arr.filter(function(x) { return recentReplies.indexOf(x) === -1; });
  if (!filtered.length) { recentReplies = []; filtered = arr; }
  var r = filtered[Math.floor(Math.random() * filtered.length)];
  recentReplies.push(r); if (recentReplies.length > 6) recentReplies.shift();
  return r;
}

// ============================================================
// DUYGU ANALİZİ
// ============================================================
var OLUMLU_KW = ['mutlu','sevin','harika','muhteşem','süper','iyi','güzel','sevdim','bayıldım','tatlı','hoş','memnun','başardım','kazandım','seviyorum','aşk','güldüm','eğlendim','keyif','çok iyi','heyecanlı','müthiş','aferin','bravo','sevindim','mükemmel','yuhu','yey','yaşasın'];
var OLUMSUZ_KW = ['üzgün','üzüldüm','kötü','berbat','rezalet','ağladım','ağlıyorum','moralim','bunaldım','stres','gergin','sıkıldım','bitik','yorgun','yoruldum','halsiz','dermansız','zor gün','nefret','iğrenç','öfke','kızgın','sinirli','korktum','kaygı','endişe','panik','pişman','hata yaptım','yanlış','kötüyüm','kötü hissediyorum','mahvoldu','mahvettim','berbattı','kötüydü'];

function duyguAnaliz(text) {
  if (!text || typeof text !== 'string') return 'notr';
  try {
    var tl = text.toLowerCase();
    var olumlu = 0, olumsuz = 0;
    for (var i = 0; i < OLUMLU_KW.length; i++) { if (tl.indexOf(OLUMLU_KW[i]) !== -1) olumlu++; }
    for (var j = 0; j < OLUMSUZ_KW.length; j++) { if (tl.indexOf(OLUMSUZ_KW[j]) !== -1) olumsuz++; }
    if (olumsuz > olumlu) return 'olumsuz';
    if (olumlu > olumsuz) return 'olumlu';
    return 'notr';
  } catch(e) { return 'notr'; }
}

// ============================================================
// INTENT TESPİTİ
// ============================================================
var INTENT_MAP = {
  // Fonksiyonel
  tarih:      ['saat kaç','bugün ne','bugün hangi','hangi gün','tarih ne','ay kaç','yıl kaç','günlerden'],
  matematik:  ['kaç eder','hesapla','topla','çıkar','çarp','böl'],
  hava:       ['hava durumu','hava nasıl','kaç derece','yağmur yağacak mı','kar yağacak mı','bugün hava'],
  doviz:      ['dolar kaç','euro kaç','sterlin kaç','döviz kuru','kur nedir','kaç tl','tl kaç'],
  muzik:      ['müzik aç','şarkı aç','çal ','müzik çal','youtube aç'],
  harita:     ['rota oluştur','yol tarifi','haritayı aç','haritada','navigasyon'],
  kimsin:     ['sen kimsin','adın ne','ne yapabilirsin','neler yapabilirsin','highly ai','gene 3','hakkında'],

  // Sohbet/Duygu
  selam:      ['selam','merhaba','hey','naber','ne haber','ne var ne yok','nbr','yo ','heyy'],
  nasilsin:   ['nasılsın','nasıl gidiyor','nasıl geçiyor','iyi misin','ne haber'],
  gunaydın:   ['günaydın','sabah','iyi sabah','hayırlı sabah'],
  geceler:    ['iyi geceler','gece','uyuyacağım','yatıyorum','uyku zamanı','hayırlı geceler'],
  tesekkur:   ['teşekkür','sağ ol','eyvallah','çok sağ ol','mersi','thanks'],
  yorgunluk:  ['yoruldum','yorgunum','bitik','takatim','enerjim yok','halsiz','dermansız','uyku','uyumak istiyorum','çok yoruldum','uyuya'],
  mutluluk:   ['mutluyum','sevindim','çok mutlu','harika hissediyorum','iyi hissediyorum','mutlu hissediyorum','keyifliyim'],
  uzuntu:     ['üzgünüm','üzüldüm','moralim yok','kötü hissediyorum','berbat hissediyorum','ağladım','ağlıyorum','üzgün'],
  stres:      ['stresim','stresli','gerginim','bunaldım','kafam şişti','kafam karışık','panik','endişeliyim','kaygılıyım'],
  sikinti:    ['sıkıldım','can sıkıntısı','ne yapsam','boş boş','vaktim var','yapacak bir şey'],
  motivasyon: ['motive ol','motivasyon','çalışmak istiyorum','hedefim','azim','pes etmek','denemek istiyorum'],
  espri:      ['şaka yap','fıkra anlat','güldür beni','komik bir şey','espri yap'],
  motivsoz:   ['motivasyon sözü','ilham ver','güzel söz','hayat sözü','bana bir söz','söz söyle'],
  ilginc:     ['ilginç bir şey','şaşırt beni','bilmiyordum','garip gerçek','ilginç bilgi','bana bir şey öğret'],
  ask:        ['aşık oldum','seviyorum onu','özledim','aşk','sevgili','kalp kırıklığı','ayrıldım'],
  saglik:     ['spor yapıyorum','egzersiz','sağlıklı yaşam','diyet','koşuyorum','yürüyüş','kilo'],
  sinir:      ['çok sinirlendim','sinirli','kızgınım','öfkeliyim','çıldırıyorum','deliriyorum','dayanamıyorum'],
  korku:      ['korktum','korkuyorum','endişeleniyorum','tedirginim','kaygılıyım','bir şey olur mu'],
  ozgüven:    ['kendime güvenmiyorum','özgüvenim yok','başaramam','yetersiz','beceremiyorum'],
  yalnizlik:  ['yalnızım','kimsem yok','arkadaşım yok','anlamıyorlar beni','hep yalnız'],
};

function detectIntent(text) {
  if (!text || typeof text !== 'string') return 'dinle';
  var tl = text.toLowerCase().trim();

  // Önce fonksiyonel kontroller
  for (var i = 0; i < INTENT_MAP.tarih.length; i++)    { if (tl.indexOf(INTENT_MAP.tarih[i]) !== -1)    return 'tarih'; }
  for (var i = 0; i < INTENT_MAP.muzik.length; i++)    { if (tl.indexOf(INTENT_MAP.muzik[i]) !== -1)    return 'muzik'; }
  for (var i = 0; i < INTENT_MAP.harita.length; i++)   { if (tl.indexOf(INTENT_MAP.harita[i]) !== -1)   return 'harita'; }
  for (var i = 0; i < INTENT_MAP.kimsin.length; i++)   { if (tl.indexOf(INTENT_MAP.kimsin[i]) !== -1)   return 'kimsin'; }
  for (var i = 0; i < INTENT_MAP.doviz.length; i++)    { if (tl.indexOf(INTENT_MAP.doviz[i]) !== -1)    return 'doviz'; }
  for (var i = 0; i < INTENT_MAP.hava.length; i++)     { if (tl.indexOf(INTENT_MAP.hava[i]) !== -1)     return 'hava'; }

  // Matematik kontrolü
  if (isMathExpr(text) || /karekök|\d+!/i.test(text)) return 'matematik';

  // Sohbet kategorileri
  var cats = ['selam','nasilsin','gunaydın','geceler','tesekkur','yorgunluk','mutluluk','uzuntu','stres','sikinti','motivasyon','espri','motivsoz','ilginc','ask','saglik','sinir','korku','ozgüven','yalnizlik'];
  for (var c = 0; c < cats.length; c++) {
    var cat = cats[c];
    var patterns = INTENT_MAP[cat];
    for (var p = 0; p < patterns.length; p++) {
      if (tl.indexOf(patterns[p]) !== -1) return cat;
    }
  }

  // Sohbet mi, bilgi sorusu mu?
  var kelime = tl.split(' ').length;
  var soruVar = /nedir|kimdir|ne zaman|nerede|nasıl yapılır|kaç yılında|hakkında bilgi|açıkla/i.test(tl);
  var duygusal = duyguAnaliz(text);

  // Uzun ve duygusal → dinle
  if (kelime > 8) return 'dinle';
  // Kısa soru değil → dinle
  if (!soruVar && kelime <= 5) return 'dinle';
  // Gerçek bilgi sorusu → araştır
  if (soruVar) return 'arama';

  return 'dinle';
}

// ============================================================
// MATEMATİK
// ============================================================
function isMathExpr(t) {
  var c = String(t).trim()
    .replace(/çarpı|kere/gi,'*').replace(/bölü/gi,'/').replace(/artı/gi,'+').replace(/eksi/gi,'-')
    .replace(/[x×]/g,'*').replace(/÷/g,'/').replace(/,/g,'.');
  return /^[\d\s+\-*\/.()%^]+$/.test(c) && /\d/.test(c) && /[+\-*\/^]/.test(c);
}
function solveMath(raw) {
  try {
    var e = String(raw).trim()
      .replace(/,/g,'.').replace(/[x×]/g,'*').replace(/÷/g,'/')
      .replace(/çarpı|kere/gi,'*').replace(/bölü/gi,'/').replace(/artı/gi,'+').replace(/eksi/gi,'-')
      .replace(/karekök\s*([\d.]+)/gi,'Math.sqrt($1)')
      .replace(/([\d.]+)\s*\^\s*([\d.]+)/g,'Math.pow($1,$2)')
      .replace(/pi/gi,'Math.PI');
    e = e.replace(/(\d+)!/g, function(_,n) {
      var num = parseInt(n); if (num > 20) return '2432902008176640000';
      var f = 1; for (var i = 2; i <= num; i++) f *= i; return f;
    });
    e = e.replace(/[^0-9+\-*\/.()% MathsqrpowPIE]/g,'').trim();
    if (!e) return null;
    var r = Function('"use strict"; return (' + e + ')')();
    if (typeof r !== 'number' || isNaN(r) || !isFinite(r)) return null;
    if (Number.isInteger(r)) return r.toLocaleString('tr-TR');
    return parseFloat(r.toFixed(8)).toString().replace('.',',');
  } catch(err) { return null; }
}

// ============================================================
// TARİH/SAAT
// ============================================================
function tarihCevap() {
  var n = new Date();
  var D = ['Pazar','Pazartesi','Salı','Çarşamba','Perşembe','Cuma','Cumartesi'];
  var M = ['Ocak','Şubat','Mart','Nisan','Mayıs','Haziran','Temmuz','Ağustos','Eylül','Ekim','Kasım','Aralık'];
  return '🕐 Şu an **' + String(n.getHours()).padStart(2,'0') + ':' + String(n.getMinutes()).padStart(2,'0') + ':' + String(n.getSeconds()).padStart(2,'0') + '**\n📅 **' + D[n.getDay()] + ', ' + n.getDate() + ' ' + M[n.getMonth()] + ' ' + n.getFullYear() + '**';
}

// ============================================================
// HAVA DURUMU
// ============================================================
var WICONS = {'01d':'☀️','01n':'🌙','02d':'⛅','02n':'⛅','03d':'☁️','03n':'☁️','04d':'☁️','04n':'☁️','09d':'🌧','09n':'🌧','10d':'🌦','10n':'🌦','11d':'⛈','11n':'⛈','13d':'❄️','13n':'❄️','50d':'🌫','50n':'🌫'};
function extractCity(text) {
  var pats = [
    /([A-Za-zğüşıöçĞÜŞİÖÇ][A-Za-zğüşıöçĞÜŞİÖÇ ]{1,20}?)\s*(?:kaç derece|hava durumu|hava nasıl)/i,
    /([A-Za-zğüşıöçĞÜŞİÖÇ][A-Za-zğüşıöçĞÜŞİÖÇ ]{1,20}?)\s*(?:hava|derece|sıcaklık)/i
  ];
  var skip = /^(bugün|şu an|hava|genel|dışarıda|nasıl)$/i;
  for (var i = 0; i < pats.length; i++) {
    var m = text.match(pats[i]);
    if (m && m[1]) { var c = m[1].trim(); if (c.length > 1 && c.length < 25 && !skip.test(c)) return c; }
  }
  return null;
}
async function havaCevap(city) {
  try {
    var url;
    if (city) { url = 'https://api.openweathermap.org/data/2.5/weather?q=' + encodeURIComponent(city) + '&appid=bd5e378503939ddaee76f12ad7a97608&units=metric&lang=tr'; }
    else { var gd = await (await fetch('https://ipapi.co/json/')).json(); url = 'https://api.openweathermap.org/data/2.5/weather?lat=' + gd.latitude + '&lon=' + gd.longitude + '&appid=bd5e378503939ddaee76f12ad7a97608&units=metric&lang=tr'; }
    var d = await (await fetch(url)).json();
    if (!d || d.cod === '404') return city ? '"' + city + '" bulunamadı.' : 'Hava bilgisi alınamadı.';
    if (!d.weather || !d.weather[0]) return 'Hava verisi alınamadı.';
    var icon = WICONS[d.weather[0].icon] || '🌤';
    return icon + ' **' + d.name + ' — ' + Math.round(d.main.temp) + '°C**\n\n🌡 Hissedilen: ' + Math.round(d.main.feels_like) + '°C\n☁️ ' + d.weather[0].description + '\n💧 Nem: %' + d.main.humidity + '\n💨 Rüzgar: ' + Math.round(d.wind.speed * 3.6) + ' km/s\n🌡 Min/Max: ' + Math.round(d.main.temp_min) + '°C / ' + Math.round(d.main.temp_max) + '°C';
  } catch(e) { return 'Hava bilgisi alınamadı: ' + e.message; }
}

async function dovizCevap(birim) {
  try {
    var data = await (await fetch('https://api.frankfurter.app/latest?from=USD&to=TRY,EUR,GBP,CHF,JPY')).json();
    var TRY = data.rates.TRY;
    var R = { usd:TRY, eur:TRY/data.rates.EUR, gbp:TRY/data.rates.GBP, chf:TRY/data.rates.CHF, jpy:TRY/data.rates.JPY };
    var saat = new Date().toLocaleTimeString('tr-TR',{hour:'2-digit',minute:'2-digit'});
    var ana = '💵 **1 Dolar = ' + R.usd.toFixed(2) + ' TL**';
    if (birim === 'eur') ana = '💶 **1 Euro = ' + R.eur.toFixed(2) + ' TL**';
    else if (birim === 'gbp') ana = '💷 **1 Sterlin = ' + R.gbp.toFixed(2) + ' TL**';
    else if (birim === 'chf') ana = '🇨🇭 **1 Frank = ' + R.chf.toFixed(2) + ' TL**';
    else if (birim === 'jpy') ana = '🇯🇵 **100 Yen = ' + (R.jpy*100).toFixed(2) + ' TL**';
    return ana + '\n\n💵 Dolar: ' + R.usd.toFixed(2) + ' TL\n💶 Euro: ' + R.eur.toFixed(2) + ' TL\n💷 Sterlin: ' + R.gbp.toFixed(2) + ' TL\n🇨🇭 Frank: ' + R.chf.toFixed(2) + ' TL\n\n🕐 ' + saat + ' — frankfurter.app';
  } catch(e) { return 'Döviz bilgisi alınamadı.'; }
}

async function searchWiki(q) {
  try {
    var trS = await (await fetch('https://tr.wikipedia.org/w/api.php?action=query&list=search&srsearch=' + encodeURIComponent(q) + '&format=json&origin=*&srlimit=1')).json();
    var trR = trS.query && trS.query.search;
    var lang = 'tr', title;
    if (trR && trR.length) { title = trR[0].title; }
    else {
      var enS = await (await fetch('https://en.wikipedia.org/w/api.php?action=query&list=search&srsearch=' + encodeURIComponent(q) + '&format=json&origin=*&srlimit=1')).json();
      var enR = enS.query && enS.query.search;
      if (!enR || !enR.length) return null;
      title = enR[0].title; lang = 'en';
    }
    var base = lang === 'tr' ? 'https://tr.wikipedia.org' : 'https://en.wikipedia.org';
    var ext = await (await fetch(base + '/w/api.php?action=query&titles=' + encodeURIComponent(title) + '&prop=extracts&exintro=true&explaintext=true&format=json&origin=*')).json();
    var page = Object.values(ext.query.pages)[0];
    if (!page || !page.extract) return null;
    return { title:title, text:page.extract.slice(0,700).trim(), url:base+'/wiki/'+encodeURIComponent(title) };
  } catch(e) { return null; }
}

function muzikAc(text) {
  var tl = text.toLowerCase();
  var query = tl
    .replace(/müzik aç|şarkı aç|müzik çal|çal |youtube aç/gi, '')
    .replace(/bana|lütfen/gi, '')
    .trim();
  if (!query) return 'Ne müzik açayım? Sanatçı veya şarkı adı söyle! 🎵';
  var ytUrl = 'https://www.youtube.com/results?search_query=' + encodeURIComponent(query);
  window.open(ytUrl, '_blank');
  return '🎵 **"' + query + '"** için YouTube açıldı!\n\nMüzik arka planda çalıyor, sen burada kalmaya devam edebilirsin. 😊';
}

// ============================================================
// HARİTA / ROTA
// ============================================================
function haritaAc(text) {
  var tl = text.toLowerCase();
  // Rota oluştur X → Y
  var rotaMatch = text.match(/rota oluştur\s+(.+?)\s*(?:→|->|'den|'dan|'ten|'tan|den|dan)\s*(.+)/i);
  if (rotaMatch) {
    var baslangic = rotaMatch[1].trim();
    var varis = rotaMatch[2].trim();
    var url = 'highly-harita.html?start=' + encodeURIComponent(baslangic) + '&end=' + encodeURIComponent(varis);
    location.href = url;
    return 'Haritaya yönlendiriliyorsun... 🗺';
  }
  // Sadece haritayı aç
  location.href = 'highly-harita.html';
  return 'Harita açılıyor... 🗺';
}

// ============================================================
// ANA CEVAP FONKSİYONU
// ============================================================
async function getReply(text) {
  if (!text || typeof text !== 'string') return 'Bir şeyler ters gitti. 😔';

  var intent = detectIntent(text);
  sonIntent = intent;

  // Fonksiyonel
  if (intent === 'tarih')    return tarihCevap();
  if (intent === 'muzik')    return muzikAc(text);
  if (intent === 'harita')   return haritaAc(text);

  if (intent === 'matematik') {
    var expr = text.replace(/çarpı|kere/gi,'*').replace(/bölü/gi,'/').replace(/artı/gi,'+').replace(/eksi/gi,'-').replace(/,/g,'.');
    var r = solveMath(expr);
    if (r !== null) return '🧮 **' + text.trim() + ' = ' + r + '**';
    return '🧮 Bu işlemi çözemedim. Örnek: **(15 + 3) * 200**';
  }

  if (intent === 'hava') {
    var city = extractCity(text);
    return await havaCevap(city);
  }

  if (intent === 'doviz') {
    var b = 'usd';
    if (/euro|eur/i.test(text)) b = 'eur';
    else if (/sterlin|gbp/i.test(text)) b = 'gbp';
    else if (/frank|chf/i.test(text)) b = 'chf';
    else if (/yen|jpy/i.test(text)) b = 'jpy';
    return await dovizCevap(b);
  }

  // Sohbet
  var pools = {
    selam: CEVAPLAR.selam, nasilsin: CEVAPLAR.nasilsin,
    gunaydın: CEVAPLAR.gunaydın, geceler: CEVAPLAR.geceler,
    tesekkur: CEVAPLAR.tesekkur, yorgunluk: CEVAPLAR.yorgunluk,
    mutluluk: CEVAPLAR.mutluluk, uzuntu: CEVAPLAR.uzuntu,
    stres: CEVAPLAR.stres, sikinti: CEVAPLAR.sikinti,
    motivasyon: CEVAPLAR.motivasyon, espri: CEVAPLAR.espri,
    motivsoz: CEVAPLAR.motivsoz, ilginc: CEVAPLAR.ilginc,
    ask: CEVAPLAR.ask, saglik: CEVAPLAR.saglik,
    sinir: CEVAPLAR.sinir, korku: CEVAPLAR.korku,
    ozgüven: CEVAPLAR.ozgüven, yalnizlik: CEVAPLAR.yalnizlik,
    kimsin: CEVAPLAR.kimsin
  };

  if (pools[intent]) return pick(pools[intent]);

  // Dinle — duygu analizi
  if (intent === 'dinle') {
    var duygu = duyguAnaliz(text);
    if (duygu === 'olumsuz') return pick(CEVAPLAR.dinle_olumsuz);
    if (duygu === 'olumlu')  return pick(CEVAPLAR.dinle_olumlu);
    return pick(CEVAPLAR.dinle_notr);
  }

  // Araştırma
  if (intent === 'arama') {
    var w = await searchWiki(text);
    if (w) return '📖 **' + w.title + '**\n\n' + w.text + '\n\n🔗 Wikipedia: ' + w.url;
    return pick(CEVAPLAR.dinle_notr);
  }

  return pick(CEVAPLAR.dinle_notr);
}

// ============================================================
// ANA SEND
// ============================================================
async function send() {
  var text = msgInput.value.trim();
  if (!text) return;
  msgInput.value = ''; msgInput.style.height = 'auto';
  sendBtn.disabled = true;
  addMsg('user', text);

  var needsApi = /hava|derece|dolar|euro|sterlin|döviz|nedir|kimdir/i.test(text);
  if (needsApi) addTyping();
  else { await new Promise(function(r){ setTimeout(r, 300); }); }

  try {
    var reply = await getReply(text);
    rmTyping();
    addMsg('ai', reply || 'Bir şeyler ters gitti. 😔');
  } catch(e) {
    rmTyping();
    addMsg('ai', 'Hata: ' + e.message);
  } finally {
    sendBtn.disabled = false;
    msgInput.focus();
  }
}

msgInput.focus();
