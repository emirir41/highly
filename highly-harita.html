<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Highly Harita</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #06080f;
      --surface: #0c0f1e;
      --border: rgba(255,255,255,0.07);
      --accent: #34d399;
      --accent2: #818cf8;
      --text: #e8f0ff;
      --muted: #4a5068;
      --card: #0d1020;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      height: 100vh; overflow: hidden;
      display: flex; flex-direction: column;
    }

    /* Nav */
    nav {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 28px;
      background: rgba(6,8,15,0.95);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(20px);
      z-index: 1000; position: relative;
      flex-shrink: 0;
    }
    .nav-logo { display:flex; align-items:center; gap:10px; text-decoration:none; color:var(--text); }
    .nav-logo-icon {
      width:30px; height:30px; border-radius:8px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display:flex; align-items:center; justify-content:center;
      font-family:'Syne',sans-serif; font-weight:800; font-size:14px; color:#fff;
    }
    .nav-logo-text { font-family:'Syne',sans-serif; font-weight:800; font-size:17px; }
    .nav-back { color:var(--muted); text-decoration:none; font-size:13px; transition:color 0.2s; }
    .nav-back:hover { color:var(--text); }

    /* Layout */
    .app-body {
      display: flex; flex: 1; overflow: hidden;
    }

    /* Sidebar */
    .sidebar {
      width: 340px; flex-shrink: 0;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      overflow: hidden; z-index: 100;
    }

    .sidebar-header {
      padding: 20px 20px 16px;
      border-bottom: 1px solid var(--border);
    }
    .sidebar-title {
      font-family: 'Syne', sans-serif; font-size: 11px;
      font-weight: 700; letter-spacing: 2px;
      text-transform: uppercase; color: var(--muted);
      margin-bottom: 12px;
    }

    /* Search */
    .search-row { display: flex; gap: 8px; }
    .search-input {
      flex: 1;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 11px 14px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif; font-size: 14px;
      outline: none; transition: border-color 0.2s;
    }
    .search-input:focus { border-color: var(--accent); }
    .search-input::placeholder { color: var(--muted); }
    .icon-btn {
      width: 40px; height: 40px;
      background: rgba(52,211,153,0.1);
      border: 1px solid rgba(52,211,153,0.2);
      border-radius: 10px;
      color: var(--accent); font-size: 16px;
      cursor: pointer; transition: background 0.2s;
      display: flex; align-items: center; justify-content: center;
    }
    .icon-btn:hover { background: rgba(52,211,153,0.2); }

    /* Map styles toggle */
    .style-row {
      display: flex; gap: 6px; margin-top: 12px;
    }
    .style-btn {
      flex: 1; padding: 7px;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--muted); font-size: 11px;
      font-family: 'DM Sans', sans-serif; font-weight: 500;
      cursor: pointer; transition: all 0.2s;
      text-align: center;
    }
    .style-btn.active {
      background: rgba(52,211,153,0.1);
      border-color: rgba(52,211,153,0.3);
      color: var(--accent);
    }

    /* Results */
    .results { flex: 1; overflow-y: auto; padding: 12px; scrollbar-width: thin; scrollbar-color: var(--border) transparent; }

    .result-item {
      display: flex; align-items: flex-start; gap: 12px;
      padding: 12px; border-radius: 12px;
      cursor: pointer; transition: background 0.2s;
      border: 1px solid transparent;
    }
    .result-item:hover { background: rgba(255,255,255,0.04); border-color: var(--border); }
    .result-item.active { background: rgba(52,211,153,0.07); border-color: rgba(52,211,153,0.2); }
    .result-icon {
      width: 36px; height: 36px; border-radius: 10px;
      background: rgba(52,211,153,0.1);
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; flex-shrink: 0;
    }
    .result-name { font-weight: 600; font-size: 14px; margin-bottom: 2px; }
    .result-addr { font-size: 12px; color: var(--muted); line-height: 1.4; }

    /* Info panel */
    .info-panel {
      padding: 16px 20px;
      border-top: 1px solid var(--border);
      background: rgba(0,0,0,0.2);
      display: none;
    }
    .info-panel.show { display: block; }
    .info-name { font-family:'Syne',sans-serif; font-size:16px; font-weight:700; margin-bottom:4px; }
    .info-coords { font-size:12px; color:var(--muted); font-family:monospace; margin-bottom:12px; }
    .info-btn {
      width: 100%; padding: 10px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none; border-radius: 10px;
      color: #fff; font-family:'Syne',sans-serif;
      font-size:13px; font-weight:700;
      cursor:pointer; transition:opacity 0.2s;
    }
    .info-btn:hover { opacity:0.9; }

    /* Map */
    #map { flex: 1; }

    /* Leaflet dark overrides */
    .leaflet-tile { filter: brightness(0.7) saturate(0.8) hue-rotate(180deg) invert(1); }
    .leaflet-container { background: var(--bg); }

    /* Zoom controls */
    .leaflet-control-zoom { border: 1px solid var(--border) !important; border-radius: 10px !important; overflow: hidden; }
    .leaflet-control-zoom a { background: var(--surface) !important; color: var(--text) !important; border-color: var(--border) !important; }
    .leaflet-control-zoom a:hover { background: rgba(52,211,153,0.1) !important; color: var(--accent) !important; }

    /* Popup */
    .leaflet-popup-content-wrapper {
      background: var(--surface) !important;
      border: 1px solid var(--border) !important;
      border-radius: 12px !important;
      color: var(--text) !important;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5) !important;
    }
    .leaflet-popup-tip { background: var(--surface) !important; }

    /* Toast */
    .toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(20px);
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; padding: 12px 20px;
      font-size: 13px; opacity: 0; z-index: 9999;
      transition: all 0.3s; pointer-events: none; white-space: nowrap;
    }
    .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
    .toast.ok { border-color: var(--accent); color: var(--accent); }

    @media (max-width: 640px) {
      .sidebar { width: 100%; height: 220px; border-right: none; border-bottom: 1px solid var(--border); }
      .app-body { flex-direction: column; }
    }
  </style>
</head>
<body>

<nav>
  <a href="highly-anasayfa.html" class="nav-logo">
    <div class="nav-logo-icon">H</div>
    <span class="nav-logo-text">Highly Harita</span>
  </a>
  <a href="highly-anasayfa.html" class="nav-back">← Ana Sayfa</a>
</nav>

<div class="app-body">
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-title">Konum Ara</div>
      <div class="search-row">
        <input class="search-input" id="searchInput" type="text" placeholder="Şehir, adres, yer..."/>
        <button class="icon-btn" onclick="geoLocate()" title="Konumumu bul">📍</button>
      </div>
      <div class="style-row">
        <button class="style-btn active" onclick="setStyle('street',this)">🗺 Sokak</button>
        <button class="style-btn" onclick="setStyle('satellite',this)">🛰 Uydu</button>
        <button class="style-btn" onclick="setStyle('topo',this)">⛰ Topo</button>
      </div>
    </div>

    <div class="results" id="results">
      <div style="text-align:center;padding:40px 20px;color:var(--muted);font-size:13px;">
        <div style="font-size:36px;margin-bottom:12px;">🗺️</div>
        Bir konum ara veya haritaya tıkla
      </div>
    </div>

    <div class="info-panel" id="infoPanel">
      <div class="info-name" id="infoName">—</div>
      <div class="info-coords" id="infoCoords">—</div>
      <button class="info-btn" onclick="copyCoords()">📋 Koordinatları Kopyala</button>
    </div>
  </div>

  <!-- Map -->
  <div id="map"></div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
  // Map init — Türkiye merkezi
  const map = L.map('map', { zoomControl: true }).setView([39.0, 35.0], 6);

  const tiles = {
    street:    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution:'© OpenStreetMap', maxZoom:19 }),
    satellite: L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { attribution:'© Esri', maxZoom:19 }),
    topo:      L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', { attribution:'© OpenTopoMap', maxZoom:17 })
  };
  tiles.street.addTo(map);
  let currentTile = 'street';

  function setStyle(style, btn) {
    map.removeLayer(tiles[currentTile]);
    tiles[style].addTo(map);
    currentTile = style;
    document.querySelectorAll('.style-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  }

  // Custom marker
  const markerIcon = L.divIcon({
    className: '',
    html: `<div style="width:32px;height:32px;background:linear-gradient(135deg,#34d399,#818cf8);border-radius:50% 50% 50% 0;transform:rotate(-45deg);border:2px solid #fff;box-shadow:0 4px 12px rgba(52,211,153,0.5)"></div>`,
    iconSize: [32,32], iconAnchor: [16,32], popupAnchor: [0,-36]
  });

  let marker = null;
  let selectedCoords = null;

  function placeMarker(lat, lon, name) {
    if (marker) map.removeLayer(marker);
    marker = L.marker([lat, lon], { icon: markerIcon })
      .addTo(map)
      .bindPopup(`<b style="font-family:Syne,sans-serif">${name}</b><br><small style="color:#6b7280">${lat.toFixed(5)}, ${lon.toFixed(5)}</small>`)
      .openPopup();
    map.flyTo([lat, lon], 14, { duration: 1.2 });
    selectedCoords = { lat, lon, name };
    document.getElementById('infoName').textContent = name;
    document.getElementById('infoCoords').textContent = `${lat.toFixed(6)}, ${lon.toFixed(6)}`;
    document.getElementById('infoPanel').classList.add('show');
  }

  // Map click
  map.on('click', async e => {
    const { lat, lng } = e.latlng;
    try {
      const res  = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json`);
      const data = await res.json();
      const name = data.display_name ? data.display_name.split(',').slice(0,2).join(', ') : `${lat.toFixed(4)}, ${lng.toFixed(4)}`;
      placeMarker(lat, lng, name);
    } catch {
      placeMarker(lat, lng, `${lat.toFixed(4)}, ${lng.toFixed(4)}`);
    }
  });

  // Search
  document.getElementById('searchInput').addEventListener('keydown', e => { if(e.key==='Enter') doSearch(); });

  async function doSearch() {
    const q = document.getElementById('searchInput').value.trim();
    if (!q) return;
    const resultsEl = document.getElementById('results');
    resultsEl.innerHTML = `<div style="text-align:center;padding:30px;color:var(--muted);font-size:13px;"><div class="spinner" style="width:28px;height:28px;border:2px solid rgba(255,255,255,0.07);border-top-color:#34d399;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 12px;"></div>Aranıyor...</div>`;
    try {
      const res  = await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&limit=8&accept-language=tr`);
      const data = await res.json();
      if (!data.length) {
        resultsEl.innerHTML = `<div style="text-align:center;padding:40px 20px;color:var(--muted);font-size:13px;"><div style="font-size:32px;margin-bottom:10px">🔍</div>Sonuç bulunamadı</div>`;
        return;
      }
      resultsEl.innerHTML = data.map((r,i) => `
        <div class="result-item" onclick="selectResult(${r.lat},${r.lon},'${r.display_name.replace(/'/g,"&#39;").split(',').slice(0,2).join(', ')}',this)">
          <div class="result-icon">${getTypeIcon(r.type, r.class)}</div>
          <div>
            <div class="result-name">${r.display_name.split(',')[0]}</div>
            <div class="result-addr">${r.display_name.split(',').slice(1,3).join(', ')}</div>
          </div>
        </div>`).join('');
    } catch {
      resultsEl.innerHTML = `<div style="text-align:center;padding:30px;color:#f87171;font-size:13px;">Bağlantı hatası</div>`;
    }
  }

  function selectResult(lat, lon, name, el) {
    document.querySelectorAll('.result-item').forEach(r => r.classList.remove('active'));
    el.classList.add('active');
    placeMarker(parseFloat(lat), parseFloat(lon), name);
  }

  function getTypeIcon(type, cls) {
    if (cls === 'place') return '🏙️';
    if (cls === 'amenity') return '📍';
    if (cls === 'highway') return '🛣️';
    if (cls === 'natural') return '🌿';
    if (cls === 'tourism') return '🏛️';
    if (cls === 'shop') return '🛍️';
    return '📌';
  }

  function geoLocate() {
    if (!navigator.geolocation) return showToast('Konum desteklenmiyor', false);
    navigator.geolocation.getCurrentPosition(pos => {
      placeMarker(pos.coords.latitude, pos.coords.longitude, 'Konumun');
      showToast('Konumun bulundu! 📍', true);
    }, () => showToast('Konum alınamadı', false));
  }

  function copyCoords() {
    if (!selectedCoords) return;
    navigator.clipboard.writeText(`${selectedCoords.lat.toFixed(6)}, ${selectedCoords.lon.toFixed(6)}`);
    showToast('Koordinatlar kopyalandı! 📋', true);
  }

  function showToast(msg, ok) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = `toast show ${ok ? 'ok' : ''}`;
    setTimeout(() => t.classList.remove('show'), 2800);
  }

  // CSS for spinner
  const style = document.createElement('style');
  style.textContent = '@keyframes spin{to{transform:rotate(360deg)}}';
  document.head.appendChild(style);
</script>
</body>
</html>
