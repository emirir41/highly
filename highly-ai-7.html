<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Highly AI</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#06070f;--s1:#0b0d1c;--s2:#0f1125;--border:rgba(255,255,255,0.07);--a1:#6366f1;--a2:#4f46e5;--text:#e8e8ff;--muted:#4a4d6a}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;background:radial-gradient(ellipse at 20% 20%,rgba(99,102,241,0.08) 0%,transparent 50%),radial-gradient(ellipse at 80% 80%,rgba(167,139,250,0.06) 0%,transparent 50%)}
nav{position:relative;z-index:20;display:flex;align-items:center;justify-content:space-between;padding:12px 24px;background:rgba(6,7,15,0.95);border-bottom:1px solid var(--border);backdrop-filter:blur(20px);flex-shrink:0}
.n-logo{display:flex;align-items:center;gap:9px;text-decoration:none;color:var(--text)}
.n-icon{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,var(--a1),var(--a2));display:flex;align-items:center;justify-content:center;font-size:16px}
.n-title{font-family:'Syne',sans-serif;font-weight:800;font-size:17px}
.n-right{display:flex;align-items:center;gap:10px}
.n-user{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:999px;padding:5px 12px 5px 6px;text-decoration:none;color:var(--text);font-size:13px}
.n-avatar{width:24px;height:24px;border-radius:50%;background:linear-gradient(135deg,var(--a1),var(--a2));display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:11px}
.n-back{color:var(--muted);text-decoration:none;font-size:13px;transition:color .2s}
.n-back:hover{color:var(--text)}
.n-clear{background:none;border:1px solid var(--border);border-radius:8px;color:var(--muted);font-size:12px;padding:5px 12px;cursor:pointer;transition:all .2s;font-family:'DM Sans',sans-serif}
.n-clear:hover{border-color:rgba(248,113,113,.4);color:#f87171}
.chat-wrap{flex:1;overflow-y:auto;padding:24px;display:flex;flex-direction:column;gap:16px;position:relative;z-index:2;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
.welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;text-align:center;padding:40px;gap:16px}
.welcome-icon{width:72px;height:72px;border-radius:20px;background:linear-gradient(135deg,var(--a1),var(--a2));display:flex;align-items:center;justify-content:center;font-size:36px;box-shadow:0 8px 32px rgba(99,102,241,.3)}
.welcome h2{font-family:'Syne',sans-serif;font-size:24px;font-weight:800}
.welcome p{color:var(--muted);font-size:14px;max-width:400px;line-height:1.7}
.suggestions{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:8px}
.sug-btn{padding:9px 16px;background:var(--s1);border:1px solid var(--border);border-radius:999px;color:var(--text);font-size:13px;cursor:pointer;transition:all .2s;font-family:'DM Sans',sans-serif}
.sug-btn:hover{background:rgba(99,102,241,.1);border-color:rgba(99,102,241,.3);color:#a78bfa}
.msg{display:flex;gap:12px;max-width:780px;animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.msg.user{flex-direction:row-reverse;margin-left:auto}
.msg-avatar{width:32px;height:32px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;font-family:'Syne',sans-serif}
.msg.user .msg-avatar{background:linear-gradient(135deg,var(--a1),var(--a2))}
.msg.ai .msg-avatar{background:linear-gradient(135deg,#1e1b4b,#312e81);border:1px solid rgba(99,102,241,.3);font-size:18px}
.msg-bubble{padding:14px 18px;border-radius:16px;font-size:14px;line-height:1.7;max-width:100%}
.msg.user .msg-bubble{background:linear-gradient(135deg,var(--a1),var(--a2));color:#fff;border-radius:16px 4px 16px 16px}
.msg.ai .msg-bubble{background:var(--s1);border:1px solid var(--border);border-radius:4px 16px 16px 16px}
.msg.ai .msg-bubble pre{background:rgba(0,0,0,.3);border-radius:8px;padding:12px;overflow-x:auto;margin:10px 0;font-size:13px}
.msg.ai .msg-bubble code{background:rgba(99,102,241,.15);padding:2px 6px;border-radius:4px;font-size:13px}
.typing{display:flex;align-items:center;gap:5px;padding:6px 0}
.typing span{width:7px;height:7px;border-radius:50%;background:var(--muted);animation:t .9s ease-in-out infinite}
.typing span:nth-child(2){animation-delay:.15s}
.typing span:nth-child(3){animation-delay:.3s}
@keyframes t{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-6px);opacity:1}}
.input-wrap{position:relative;z-index:10;padding:16px 24px;background:rgba(6,7,15,0.95);border-top:1px solid var(--border);flex-shrink:0}
.input-box{display:flex;align-items:flex-end;gap:10px;background:var(--s1);border:1px solid var(--border);border-radius:16px;padding:12px 14px;transition:border-color .2s}
.input-box:focus-within{border-color:rgba(99,102,241,.4)}
.msg-input{flex:1;background:none;border:none;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;line-height:1.6;outline:none;resize:none;max-height:120px;min-height:24px}
.msg-input::placeholder{color:var(--muted)}
.send-btn{width:38px;height:38px;border-radius:10px;border:none;background:linear-gradient(135deg,var(--a1),var(--a2));color:#fff;font-size:16px;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.send-btn:hover{opacity:.9;transform:scale(1.05)}
.send-btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
.input-hint{text-align:center;font-size:11px;color:var(--muted);margin-top:8px}
</style>
</head>
<body>
<nav>
  <a href="dashboard.html" class="n-logo">
    <div class="n-icon">🤖</div>
    <span class="n-title">Highly AI</span>
  </a>
  <div class="n-right">
    <div style="display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:8px;padding:5px 12px;font-size:12px;color:var(--muted)">🧠 <select id="modelSel" style="background:transparent;border:none;color:#e8e8ff;font-family:DM Sans,sans-serif;font-size:12px;outline:none;cursor:pointer"><option value="wiki">Gene 1.0</option><option value="gene2">Gene 2.0 ✨</option></select></div><button class="n-clear" id="clearBtn">🗑 Temizle</button>
    <a href="dashboard.html" class="n-user">
      <div class="n-avatar" id="navAvatar">?</div>
      <span id="navName">...</span>
    </a>
    <a href="dashboard.html" class="n-back">← Dashboard</a>
  </div>
</nav>

<div class="chat-wrap" id="chatWrap">
  <div class="welcome" id="welcome">
    <div class="welcome-icon">🤖</div>
    <h2>Highly AI'ya hoş geldin!</h2>
    <p>Herhangi bir konuyu sor, Wikipedia'dan araştırayım!</p>
    <div style="display:flex;align-items:center;gap:8px;background:rgba(99,102,241,.08);border:1px solid rgba(99,102,241,.2);border-radius:999px;padding:7px 16px;font-size:12px;color:#a78bfa;margin-top:4px">
      🧠 <strong id="modelBadge">Gene 1.0</strong> · <span id="modelDesc">Wikipedia destekli</span>
    </div>
  </div>
</div>

<div class="input-wrap">
  <div class="input-box">
    <textarea class="msg-input" id="msgInput" placeholder="Bir şey sor... (Enter ile gönder)" rows="1"></textarea>
    <button class="send-btn" id="sendBtn">↑</button>
  </div>
  <div class="input-hint">Highly AI hata yapabilir. Sonuçları kontrol edin.</div>
</div>

<script>
const saved = localStorage.getItem('highly_user');
if (!saved) location.href = 'highly-id.html';
const user = JSON.parse(saved || '{"name":"?"}');
document.getElementById('navAvatar').textContent = user.avatarEmoji || user.name[0].toUpperCase();
document.getElementById('navName').textContent   = user.name.split(' ')[0];

const chatWrap = document.getElementById('chatWrap');
const msgInput = document.getElementById('msgInput');
const sendBtn  = document.getElementById('sendBtn');
const welcome  = document.getElementById('welcome');
let history = [];

msgInput.addEventListener('input', () => {
  msgInput.style.height = 'auto';
  msgInput.style.height = Math.min(msgInput.scrollHeight, 120) + 'px';
});
msgInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
});
sendBtn.addEventListener('click', send);

document.getElementById('clearBtn').addEventListener('click', () => {
  history = [];
  chatWrap.innerHTML = '';
  chatWrap.appendChild(welcome);
  welcome.style.display = 'flex';
});

document.getElementById('modelSel').addEventListener('change', function() {
  const g2 = this.value === 'gene2';
  const b = document.getElementById('modelBadge');
  const d = document.getElementById('modelDesc');
  if (b) b.textContent = g2 ? 'Gene 2.0' : 'Gene 1.0';
  if (d) d.textContent = g2 ? 'Matematik · Hava · Döviz · Sohbet · Araştırma' : 'Wikipedia destekli';
  history = []; chatWrap.innerHTML = ''; chatWrap.appendChild(welcome); welcome.style.display = 'flex';
});

// UI
function rmTyping() { const t = document.getElementById('typing'); if (t) t.remove(); }
function addTyping() {
  welcome.style.display = 'none';
  rmTyping();
  const d = document.createElement('div');
  d.className = 'msg ai'; d.id = 'typing';
  d.innerHTML = '<div class="msg-avatar">🤖</div><div class="msg-bubble"><div class="typing"><span></span><span></span><span></span></div></div>';
  chatWrap.appendChild(d); chatWrap.scrollTop = chatWrap.scrollHeight;
}
function addMsg(role, text) {
  welcome.style.display = 'none';
  const d = document.createElement('div');
  d.className = 'msg ' + role;
  d.innerHTML = '<div class="msg-avatar">' + (role === 'user' ? (user.avatarEmoji || user.name[0].toUpperCase()) : '🤖') + '</div>'
    + '<div class="msg-bubble">' + (role === 'ai' ? fmt(text) : esc(text)) + '</div>';
  chatWrap.appendChild(d); chatWrap.scrollTop = chatWrap.scrollHeight;
}
function fmt(t) {
  return esc(t)
    .replace(/```[\w]*\n?([\s\S]*?)```/g, '<pre><code>$1</code></pre>')
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
    .replace(/\*([^*]+)\*/g, '<em>$1</em>')
    .replace(/\n/g, '<br>');
}
function esc(t) { return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ===== 1. SOHBET =====
const SOHBET = {
  selam:    ['Selam! 👋', 'Merhaba! 😊', 'Hey! Ne öğrenmek istiyorsun? 👋', 'Selam ' + user.name.split(' ')[0] + '! Nasıl yardımcı olabilirim? 😊'],
  nasilsin: ['İyiyim teşekkürler, sen nasılsın? 😊', 'Gayet iyiyim! Sana yardımcı olmaya hazırım 🚀', 'İyi sayılırım 😄 Sen?', 'Süper! Bugün ne öğrenmek istiyorsun?'],
  tesekkur: ['Rica ederim! 😊', 'Ne demek! 🙌', 'Her zaman! 😄', 'Tabii tabii! 🙏'],
  gunaydın: ['Günaydın! ☀️ Güzel bir gün olsun!', 'Günaydın! ☀️ Bugün sana nasıl yardımcı olabilirim?'],
  iyi:      ['Teşekkürler! 😊', 'Sağ ol! 🙏', 'Çok naziksin! 😄'],
  geceler:  ['İyi geceler! 🌙', 'İyi geceler, yarın görüşürüz! 🌙', 'Umarım iyi uyursun! 🌙'],
  evet:     ['Tamam! 😊 Başka bir şey var mı?', 'Harika! 🎉', 'Anladım! 👍'],
  hayir:    ['Tamam! 😊', 'Peki, başka bir konuda yardımcı olabilir miyim?', 'Anladım! 👍'],
  haha:     ['😄', 'Haha 😂', '😂 İyi ki keyiflisin!'],
  default:  ['Anlıyorum! 😊 Başka bir şey sorabilirsin.', 'Tamam! 🙂', 'Sana nasıl yardımcı olabilirim?', 'Başka sorun var mı? 😊']
};
function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

function isSohbet(t) {
  return /^(selam|merhaba|hey|hi|hello|nasılsın|naber|ne haber|ne var|teşekkür|sağol|eyvallah|tamam|iyi|günaydın|iyi gece|iyi akşam|iyi günler|evet|ee|yep|hayır|yok|haha|hehe|😀|😂|👍|❤|🙂|👋|aferin|bravo|süper|harika)/i.test(t.trim());
}
function sohbetCevap(t) {
  const tl = t.toLowerCase().trim();
  if (/selam|merhaba|hey|^hi|^hello/.test(tl)) return pick(SOHBET.selam);
  if (/nasılsın|naber|ne haber|ne var/.test(tl)) return pick(SOHBET.nasilsin);
  if (/teşekkür|sağol|eyvallah|thanks/.test(tl)) return pick(SOHBET.tesekkur);
  if (/günaydın/.test(tl)) return pick(SOHBET.gunaydın);
  if (/iyi gece|gece|geceler/.test(tl)) return pick(SOHBET.geceler);
  if (/^(evet|ee|yep|yes|tamam|ok|olur)/.test(tl)) return pick(SOHBET.evet);
  if (/^(hayır|yok|no|nope|olmaz)/.test(tl)) return pick(SOHBET.hayir);
  if (/haha|hehe|😂|lol/.test(tl)) return pick(SOHBET.haha);
  if (/^(iyi|süper|harika|güzel|aferin|bravo)/.test(tl)) return pick(SOHBET.iyi);
  return pick(SOHBET.default);
}

// ===== 2. MATEMATİK - GERÇEK HESAPLAMA =====
function isMath(t) {
  const c = t.trim();
  // Sadece sayı ve operatör varsa
  if (/^[\d\s\+\-\*\/x×÷\^\.\(\)%,]+$/.test(c) && /\d/.test(c) && /[\+\-\*\/x×÷\^%]/.test(c)) return true;
  // "kaç" ile biten sayısal ifade
  if (/\d.*(kaç|nedir|eşit|sonuç)/.test(c)) return true;
  // karekök, faktöriyel
  if (/^(karekök|sqrt)\s*\d/i.test(c)) return true;
  if (/^\d+\s*!/.test(c)) return true;
  return false;
}

function solveMath(raw) {
  try {
    let e = raw.trim()
      .replace(/,/g, '.')
      .replace(/[x×]/g, '*')
      .replace(/÷/g, '/')
      .replace(/karekök\s*([\d.]+)/gi, 'Math.sqrt($1)')
      .replace(/sqrt\s*([\d.]+)/gi, 'Math.sqrt($1)')
      .replace(/([\d.]+)\s*\^\s*([\d.]+)/g, 'Math.pow($1,$2)')
      .replace(/\s*(kaç|nedir|eşit|sonuç)\s*$/i, '');

    // Faktöriyel
    e = e.replace(/(\d+)\s*!/g, function(_, n) {
      const num = parseInt(n);
      if (num > 20) return 'null'; // çok büyük
      let f = 1; for (let i = 2; i <= num; i++) f *= i; return f;
    });

    // Sadece güvenli karakterler
    e = e.replace(/[^0-9+\-*\/.()\sMathsqrpow%E]/g, '').trim();
    if (!e || e.length === 0) return null;

    const result = Function('"use strict"; return (' + e + ')')();
    if (typeof result !== 'number' || isNaN(result) || !isFinite(result)) return null;
    // Güzel format
    if (Number.isInteger(result)) return result.toLocaleString('tr-TR');
    return parseFloat(result.toFixed(10)).toString().replace('.', ',');
  } catch(err) { return null; }
}

function mathCevap(t) {
  const r = solveMath(t);
  if (r !== null) {
    // İfadeyi temizleyip göster
    const display = t.trim().replace(/\s*(kaç|nedir|eşit|sonuç)\s*$/i, '').trim();
    return '🧮 **' + display + ' = ' + r + '**';
  }
  return null;
}

// ===== 3. TARİH & SAAT =====
function isTarih(t) {
  return /(saat kaç|bugün ne|bugün hangi|hangi gün|günlerden ne|tarih ne|ay kaç|yıl kaç|gün kaç)/i.test(t);
}
function tarihCevap() {
  const n = new Date();
  const D = ['Pazar','Pazartesi','Salı','Çarşamba','Perşembe','Cuma','Cumartesi'];
  const M = ['Ocak','Şubat','Mart','Nisan','Mayıs','Haziran','Temmuz','Ağustos','Eylül','Ekim','Kasım','Aralık'];
  const hh = String(n.getHours()).padStart(2,'0');
  const mm = String(n.getMinutes()).padStart(2,'0');
  const ss = String(n.getSeconds()).padStart(2,'0');
  return '🕐 Şu an **' + hh + ':' + mm + ':' + ss + '**\n📅 **' + D[n.getDay()] + ', ' + n.getDate() + ' ' + M[n.getMonth()] + ' ' + n.getFullYear() + '**';
}

// ===== 4. HAVA - ŞEHİR ALGILAMALI =====
function isHava(t) {
  return /(hava|derece|sıcaklık|yağmur|kar yağ|fırtına|iklim|nem)/i.test(t);
}
function extractSehir(t) {
  // Şehir adı pattern'leri - önce spesifik pattern'ler
  const patterns = [
    /([A-Za-züçğışöÜÇĞİŞÖ][a-züçğışöA-ZÜÇĞİŞÖ ]{1,20}?)\s+(?:kaç\s+derece|hava\s+durumu|hava\s+nasıl)/i,
    /([A-Za-züçğışöÜÇĞİŞÖ][a-züçğışöA-ZÜÇĞİŞÖ ]{1,20}?)(?:'de|'da|'te|'ta|'de|'da|'de|'da)\s+(?:hava|derece|sıcaklık)/i,
    /(?:hava\s+durumu|hava)\s+([A-Za-züçğışöÜÇĞİŞÖ][a-züçğışöA-ZÜÇĞİŞÖ ]{1,20}?)(?:'de|'da|'te|'ta)?\s*(?:nasıl|kaç|ne)/i,
  ];
  const SKIP = /^(bugün|şu an|şimdi|dışarıda|burada|orada|benim|genel|hava|derece)$/i;
  for (const p of patterns) {
    const m = t.match(p);
    if (m && m[1]) {
      const city = m[1].trim();
      if (city.length > 1 && city.length < 25 && !SKIP.test(city)) return city;
    }
  }
  return null;
}
async function havaCevap(t) {
  const ICONS = {'01d':'☀️','01n':'🌙','02d':'⛅','02n':'⛅','03d':'☁️','03n':'☁️','04d':'☁️','04n':'☁️',
    '09d':'🌧','09n':'🌧','10d':'🌦','10n':'🌦','11d':'⛈','11n':'⛈','13d':'❄️','13n':'❄️','50d':'🌫','50n':'🌫'};
  try {
    const sehir = extractSehir(t);
    let url;
    if (sehir) {
      url = 'https://api.openweathermap.org/data/2.5/weather?q=' + encodeURIComponent(sehir) + '&appid=bd5e378503939ddaee76f12ad7a97608&units=metric&lang=tr';
    } else {
      const gd = await (await fetch('https://ipapi.co/json/')).json();
      url = 'https://api.openweathermap.org/data/2.5/weather?lat=' + gd.latitude + '&lon=' + gd.longitude + '&appid=bd5e378503939ddaee76f12ad7a97608&units=metric&lang=tr';
    }
    const d = await (await fetch(url)).json();
    if (d.cod === '404') return '❌ "' + sehir + '" bulunamadı. Şehir adını kontrol et.';
    const icon = ICONS[d.weather[0].icon] || '🌤';
    return icon + ' **' + d.name + ' — ' + Math.round(d.main.temp) + '°C**\n\n'
      + '🌡 Hissedilen: ' + Math.round(d.main.feels_like) + '°C\n'
      + '☁️ ' + d.weather[0].description + '\n'
      + '💧 Nem: %' + d.main.humidity + '\n'
      + '💨 Rüzgar: ' + Math.round(d.wind.speed * 3.6) + ' km/s\n'
      + '🌡 Min/Max: ' + Math.round(d.main.temp_min) + '°C / ' + Math.round(d.main.temp_max) + '°C';
  } catch(e) { return '❌ Hava bilgisi alınamadı.'; }
}

// ===== 5. DÖVİZ - CANLI =====
function isDoviz(t) {
  return /(dolar|dollar|usd|euro|eur|sterlin|pound|gbp|frank|chf|yen|jpy|döviz|kur|kaç tl|tl kaç)/i.test(t);
}
async function dovizCevap(t) {
  try {
    const data = await (await fetch('https://api.frankfurter.app/latest?from=USD&to=TRY,EUR,GBP,CHF,JPY')).json();
    const TRY = data.rates.TRY;
    const rates = {
      USD: TRY,
      EUR: TRY / data.rates.EUR,
      GBP: TRY / data.rates.GBP,
      CHF: TRY / data.rates.CHF,
      JPY: TRY / data.rates.JPY,
    };
    const tl = t.toLowerCase();
    const saat = new Date().toLocaleTimeString('tr-TR', {hour:'2-digit', minute:'2-digit'});
    let ana = '';
    if (/euro|eur/.test(tl)) ana = '💶 **1 Euro = ' + rates.EUR.toFixed(2) + ' TL**';
    else if (/sterlin|pound|gbp/.test(tl)) ana = '💷 **1 Sterlin = ' + rates.GBP.toFixed(2) + ' TL**';
    else if (/frank|chf/.test(tl)) ana = '🇨🇭 **1 Frank = ' + rates.CHF.toFixed(2) + ' TL**';
    else if (/yen|jpy/.test(tl)) ana = '🇯🇵 **1 Yen = ' + rates.JPY.toFixed(4) + ' TL**';
    else ana = '💵 **1 Dolar = ' + rates.USD.toFixed(2) + ' TL**';
    return ana + '\n\n'
      + '💵 Dolar: ' + rates.USD.toFixed(2) + ' TL\n'
      + '💶 Euro: ' + rates.EUR.toFixed(2) + ' TL\n'
      + '💷 Sterlin: ' + rates.GBP.toFixed(2) + ' TL\n'
      + '🇨🇭 Frank: ' + rates.CHF.toFixed(2) + ' TL\n\n'
      + '🕐 _' + saat + ' itibarıyla — frankfurter.app_';
  } catch(e) { return '❌ Döviz bilgisi alınamadı: ' + e.message; }
}

// ===== 6. KİMLİK =====
function isKimlik(t) {
  return /^(sen kimsin|adın ne|highly ai|gene 2|ne yapabilirsin|neler yapabilirsin|bana yardım|nasıl kullan)/i.test(t.trim());
}
function kimlikCevap() {
  return 'Ben **Highly AI** — Gene 2.0! 🤖\n\nŞunlarda yardımcı olabilirim:\n\n🧮 **Matematik** — 2737 * 7382, karekök 144, 5!\n🌤 **Hava** — "New York kaç derece?", "İstanbul hava nasıl?"\n💵 **Döviz** — "Dolar kaç TL?", "Euro kaç?"\n📅 **Tarih/Saat** — "Saat kaç?", "Bugün ne günü?"\n📖 **Araştırma** — Wikipedia\'dan bilgi getiririm\n💬 **Sohbet** — Sana eşlik ederim 😊';
}

// ===== 7. WİKİPEDİA =====
async function searchWiki(q) {
  try {
    const trS = await (await fetch('https://tr.wikipedia.org/w/api.php?action=query&list=search&srsearch=' + encodeURIComponent(q) + '&format=json&origin=*&srlimit=1')).json();
    const trR = trS.query && trS.query.search;
    const lang = (trR && trR.length) ? 'tr' : 'en';
    let title;
    if (lang === 'tr') {
      title = trR[0].title;
    } else {
      const enS = await (await fetch('https://en.wikipedia.org/w/api.php?action=query&list=search&srsearch=' + encodeURIComponent(q) + '&format=json&origin=*&srlimit=1')).json();
      const enR = enS.query && enS.query.search;
      if (!enR || !enR.length) return null;
      title = enR[0].title;
    }
    const base = lang === 'tr' ? 'https://tr.wikipedia.org' : 'https://en.wikipedia.org';
    const ext = await (await fetch(base + '/w/api.php?action=query&titles=' + encodeURIComponent(title) + '&prop=extracts&exintro=true&explaintext=true&format=json&origin=*')).json();
    const page = Object.values(ext.query.pages)[0];
    if (!page || !page.extract) return null;
    return { title, text: page.extract.slice(0, 700).trim(), url: base + '/wiki/' + encodeURIComponent(title) };
  } catch(e) { return null; }
}

// ===== ANA SEND =====
async function send() {
  const text = msgInput.value.trim();
  if (!text) return;
  msgInput.value = ''; msgInput.style.height = 'auto';
  sendBtn.disabled = true;
  addMsg('user', text);
  addTyping();
  const model = document.getElementById('modelSel').value;

  try {
    await new Promise(r => setTimeout(r, 350));
    rmTyping();
    let reply = null;

    // GENE 1.0
    if (model === 'wiki') {
      if (isSohbet(text)) {
        reply = sohbetCevap(text);
      } else {
        addTyping();
        const w = await searchWiki(text);
        rmTyping();
        reply = w ? '📖 **' + w.title + '**\n\n' + w.text + '\n\n🔗 [Wikipedia\'da oku](' + w.url + ')'
                  : '❌ "' + text + '" hakkında bilgi bulunamadı. Farklı sormayı dene!';
      }
    }

    // GENE 2.0
    else {
      if      (isSohbet(text))  reply = sohbetCevap(text);
      else if (isKimlik(text))  reply = kimlikCevap();
      else if (isTarih(text))   reply = tarihCevap();
      else if (isMath(text))    reply = mathCevap(text);
      else if (isHava(text))  { addTyping(); reply = await havaCevap(text);  rmTyping(); }
      else if (isDoviz(text)) { addTyping(); reply = await dovizCevap(text); rmTyping(); }

      if (!reply) {
        addTyping();
        const w = await searchWiki(text);
        rmTyping();
        reply = w ? '📖 **' + w.title + '**\n\n' + w.text + '\n\n🔗 [Wikipedia\'da oku](' + w.url + ')'
                  : '🤔 Bunu anlayamadım. Şunları deneyebilirsin:\n\n🧮 **2737 * 7382**\n🌤 **"New York kaç derece?"**\n💵 **"Dolar kaç TL?"**\n📅 **"Saat kaç?"**\n📖 **"Einstein kimdir?"**';
      }
    }

    addMsg('ai', reply);
  } catch(e) {
    rmTyping();
    addMsg('ai', '❌ Hata oluştu: ' + e.message);
  } finally {
    sendBtn.disabled = false;
    msgInput.focus();
  }
}

msgInput.focus();
